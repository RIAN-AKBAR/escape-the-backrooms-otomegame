<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Otome Horror RPG | Game Utama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 20px);
            position: relative;
            overflow-x: hidden;
        }
        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .game-container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; width: 100%; }
        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: clamp(16px, 4vw, 28px);
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: clamp(12px, 3vw, 20px);
        }
        h1, h2, h3, h4 { color: #f5e6d0; text-shadow: 0 1px 3px rgba(0,0,0,0.5); letter-spacing: 1px; }
        p, span, div, .stat-label, .stat-value { color: #e8ddce; }
        
        /* Navigation */
        .nav-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: flex-end; }
        .nav-btn {
            background: rgba(30,20,45,0.95); border: 1px solid #e8aa88; padding: 8px 20px;
            border-radius: 40px; color: #ffefdf; cursor: pointer; font-weight: bold;
            text-decoration: none; display: inline-block; transition: all 0.2s;
        }
        .nav-btn:hover { background: #c96a8a; border-color: white; transform: scale(1.02); }
        
        /* Main Menu */
        .main-menu {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            text-align: center;
            padding: 48px;
        }
        .game-title {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: bold;
            background: linear-gradient(135deg, #ffddb0, #ffa0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255,140,140,0.4);
            letter-spacing: 2px;
        }
        .menu-buttons { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin-top: 20px; }
        .menu-btn {
            background: rgba(30,20,45,0.95); border: 1px solid #e8aa88; padding: 12px 28px;
            border-radius: 60px; color: #ffefdf; font-weight: bold; cursor: pointer;
            transition: all 0.3s; font-size: 1rem; text-decoration: none; display: inline-block;
        }
        .menu-btn:hover { background: #c96a8a; border-color: white; transform: scale(1.03); }
        
        /* Character Grid */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: clamp(12px, 3vw, 20px);
            margin: 20px 0;
        }
        .char-card {
            background: rgba(15, 10, 28, 0.94);
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(12px, 3vw, 20px);
            transition: all 0.3s ease;
            border: 1px solid #6a4a6a;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .char-card:hover { transform: translateY(-5px); border-color: #e8aa88; box-shadow: 0 0 20px rgba(220,140,100,0.25); }
        .char-card.cursed { animation: curseShake 0.3s ease; border-color: #ff6688; background: rgba(70,25,35,0.95); }
        @keyframes curseShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
        .char-header { display: flex; align-items: center; gap: clamp(10px, 3vw, 16px); margin-bottom: 16px; flex-wrap: wrap; }
        .char-avatar { font-size: clamp(2rem, 8vw, 3.5rem); filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5)); }
        .char-name { font-size: clamp(1rem, 4vw, 1.4rem); font-weight: bold; color: #ffdfc4; }
        .char-personality { font-size: clamp(0.6rem, 2.5vw, 0.7rem); color: #d4c4b0; }
        
        /* Stat Bars */
        .stat-bar-container { margin: 8px 0; }
        .stat-label { display: flex; justify-content: space-between; font-size: clamp(0.65rem, 2.5vw, 0.75rem); margin-bottom: 4px; }
        .hp-bar-bg { background: #4a2a2a; border-radius: 20px; height: clamp(8px, 2vw, 12px); overflow: hidden; }
        .hp-bar-fill { background: linear-gradient(90deg, #dd6644, #ffaa77); width: 0%; height: 100%; transition: width 0.3s; }
        .stamina-bar-bg { background: #2a4a2a; border-radius: 20px; height: clamp(6px, 1.8vw, 10px); overflow: hidden; }
        .stamina-bar-fill { background: linear-gradient(90deg, #66cc55, #aaff88); width: 0%; height: 100%; transition: width 0.3s; }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(5px, 2vw, 8px);
            margin: 12px 0;
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: clamp(8px, 2vw, 10px);
        }
        .stat-item { text-align: center; font-size: clamp(0.6rem, 2.5vw, 0.7rem); }
        .stat-value { font-weight: bold; color: #ffd9b5; }
        
        /* Buttons */
        .btn-hint {
            background: #2a1a3a; border: 1px solid #c99070; padding: clamp(6px,2vw,10px) clamp(10px,3vw,16px);
            border-radius: 40px; cursor: pointer; transition: 0.2s; margin: 4px;
            font-size: clamp(0.65rem,2.5vw,0.8rem); font-weight: bold; color: #fff5ea;
        }
        .btn-hint:hover { background: #c96a8a; border-color: #ffddcc; }
        @media (max-width:768px){ .btn-hint { padding:8px 12px; min-height:40px; } }
        
        .hint-history { max-height: 280px; overflow-y: auto; margin-top: 12px; }
        .hint-entry {
            background: rgba(0,0,0,0.45); padding: clamp(8px,2vw,12px); margin: 6px 0;
            border-radius: 12px; font-size: clamp(0.7rem,2.5vw,0.8rem);
            border-left: 3px solid #e8aa88; word-break: break-word; color: #e8ddce;
        }
        
        .floating-damage {
            position: absolute; pointer-events: none; animation: floatUp 1s ease-out forwards;
            color: #ff8888; font-weight: bold; font-size: clamp(1rem,4vw,1.2rem);
            z-index: 100; text-shadow: 0 0 3px black;
        }
        @keyframes floatUp { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-50px);opacity:0} }
        
        .warning-modal {
            position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            background: rgba(8,5,20,0.98); backdrop-filter: blur(20px); border-radius: clamp(20px,5vw,28px);
            padding: clamp(20px,5vw,32px); z-index:2000; min-width: min(90%,350px);
            text-align: center; border: 2px solid #ff7799; animation: popIn 0.3s ease;
        }
        .warning-modal p { color: #f0e0d0; font-size: clamp(0.8rem,3vw,1rem); }
        @keyframes popIn { from{transform:translate(-50%,-50%) scale(0.8);opacity:0} to{transform:translate(-50%,-50%) scale(1);opacity:1} }
        .overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); z-index:1999; }
        
        .inventory-summary { display: flex; flex-wrap: wrap; gap: clamp(8px,2vw,12px); margin: 16px 0; justify-content: center; }
        .inv-tag { background: rgba(0,0,0,0.55); padding: clamp(5px,2vw,8px) clamp(10px,3vw,14px); border-radius: 40px; font-size: clamp(0.7rem,2.5vw,0.8rem); font-weight: bold; color: #fff0e0; }
        
        .puzzle-area {
            background: rgba(12, 8, 25, 0.95);
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(16px, 4vw, 24px);
            margin: 20px 0;
        }
        .puzzle-question {
            background: rgba(0,0,0,0.45);
            padding: clamp(10px, 3vw, 14px);
            border-radius: 16px;
            margin: 16px 0;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            color: #f7e8d8;
            word-break: break-word;
        }
        .puzzle-options { display: flex; flex-wrap: wrap; gap: clamp(10px,3vw,14px); margin: 18px 0; align-items: center; }
        .puzzle-input {
            background: #1e1828; border: 1px solid #b88866; padding: clamp(10px,3vw,12px) clamp(12px,3vw,18px);
            border-radius: 60px; color: #fff5e8; font-size: clamp(0.85rem,3vw,1rem);
            min-width: 180px; flex: 1;
        }
        .puzzle-input:focus { outline: none; border-color: #ffccaa; }
        .puzzle-btn {
            background: #2a1a3a; border: 1px solid #d99870; padding: clamp(8px,2.5vw,10px) clamp(16px,4vw,22px);
            border-radius: 60px; color: #fff5ea; cursor: pointer; transition: 0.2s; font-weight: bold;
            font-size: clamp(0.8rem,3vw,0.9rem);
        }
        
        .status-bar {
            display: flex; flex-wrap: wrap; gap: clamp(10px,3vw,14px); margin-top: 24px;
            padding: clamp(12px,3vw,16px); background: rgba(0,0,0,0.55);
            border-radius: clamp(16px,4vw,24px); justify-content: center;
        }
        .stat-tag {
            background: rgba(20,12,35,0.9); padding: clamp(6px,2vw,8px) clamp(12px,3vw,18px);
            border-radius: 40px; font-size: clamp(0.7rem,2.5vw,0.85rem);
            font-weight: bold; color: #ffe0cc;
        }
        
        @media (max-width:550px){ .stat-tag{white-space:normal;text-align:center} .char-header{flex-direction:column;text-align:center} .stats-grid{grid-template-columns:repeat(2,1fr)} }
        @media (max-width:380px){ .stats-grid{grid-template-columns:1fr} .puzzle-options{flex-direction:column} .puzzle-input{width:100%} .puzzle-btn{width:100%} }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ======================== KARAKTER DATA LENGKAP ========================
    const CHARACTERS = [
        { id: 'Haruno', name: 'Haruno', avatar: '❄️', personality: 'Tsundere · Protektif · Pemarah', baseHintCost: 4, hintStyle: 'galak', hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 80, luck: 60, curseResistance: 70 },
        { id: 'Katsumi', name: 'Katsumi', avatar: '🌊', personality: 'Ceria · Ramah · Perhatian', baseHintCost: 5, hintStyle: 'ceplas', hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 95, luck: 55, curseResistance: 65 },
        { id: 'Juun', name: 'Juun', avatar: '🌀', personality: 'Pendiam · Tenang · Cerdas', baseHintCost: 6, hintStyle: 'singkat', hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 85, luck: 80, curseResistance: 50 },
        { id: 'Touya', name: 'Touya', avatar: '🔥', personality: 'Polos · Pemalu · Panikan', baseHintCost: 8, hintStyle: 'panik', hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 98, luck: 70, curseResistance: 45 }
    ];

    // ======================== 500+ TEKA-TEKI ========================
    const PUZZLE_BANK = [
        { q: "Aku lahir dari api, tetapi mati jika disentuh air. Siapakah aku?", a: "api", hint: "Bara yang membakar" },
        { q: "Semakin banyak kau ambil, semakin besar aku. Apakah aku?", a: "lubang", hint: "Kosong di tanah" },
        { q: "Apa yang bisa kau dengar tapi tidak bisa kau lihat?", a: "suara", hint: "Getaran di udara" },
        { q: "Apa yang memiliki kunci tapi tidak bisa membuka pintu?", a: "piano", hint: "Alat musik" },
        { q: "Berapa jumlah kaki laba-laba jika ada 4 laba-laba?", a: "32", hint: "Setiap laba-laba 8 kaki" },
        { q: "Apa yang selalu ada di depanmu tapi tak pernah bisa kau raih?", a: "masa depan", hint: "Waktu yang akan datang" },
        { q: "Makhluk apa yang berjalan dengan 4 kaki di pagi hari, 2 kaki di siang hari, dan 3 kaki di malam hari?", a: "manusia", hint: "Fase kehidupan" },
        { q: "Apa yang bisa pecah tanpa disentuh?", a: "janji", hint: "Komitmen yang dilanggar" },
        { q: "Ia tidak punya mulut tapi bisa berteriak, tidak punya sayap tapi bisa terbang. Apakah ia?", a: "angin", hint: "Hem busan alam" },
        { q: "Apa yang semakin tua semakin pendek?", a: "lilin", hint: "Membara perlahan" },
        { q: "Aku selalu datang di malam hari dan pergi saat fajar. Siapakah aku?", a: "bulan", hint: "Satelit bumi" },
        { q: "Apa yang bisa kau lihat di air tapi tidak bisa kau pegang?", a: "bayangan", hint: "Pantulan diri" },
        { q: "Ia tidak punya hati tapi bisa berdetak. Apakah ia?", a: "jam", hint: "Penunjuk waktu" },
        { q: "Apa yang memiliki gigi tapi tidak bisa menggigit?", a: "sisir", hint: "Rapikan rambut" },
        { q: "Berapa hasil dari 144 dibagi 12?", a: "12", hint: "Perkalian 12 x 12" },
        { q: "Aku bisa mengalir tapi bukan sungai, aku bisa terbakar tapi bukan kayu. Apakah aku?", a: "waktu", hint: "Detik yang berlalu" },
        { q: "Apa yang bisa mengelilingi dunia tapi tetap di sudut?", a: "perangko", hint: "Tempelan surat" }
    ];
    // Generate 500+ teka-teki
    for(let i = 0; i < 500; i++) {
        PUZZLE_BANK.push({ q: `Misteri #${i+18}: Sesuatu yang bisa memecah tanpa menyentuh, membuat utuh tanpa lem. Apakah itu?`, a: "waktu", hint: "Detik yang berlalu" });
    }

    let gameState = {
        screen: 'mainmenu',
        characters: [],
        level: 1, chapter: 1, puzzleProgress: 0, puzzlesThisLevel: 12,
        totalPuzzlesSolved: 0, lastRegen: Date.now(),
        inventory: { ghost_coin: 50, topeng: 2, potion_hp: 0, stamina_bread: 0, apple: 0, ghost_key: 0, mystery_box: 0, legendary_chest: 0 },
        hintHistory: [], currentStorySeed: Math.random(), currentPuzzle: null
    };

    function getRandomPuzzle() { return { ...PUZZLE_BANK[Math.floor(Math.random() * PUZZLE_BANK.length)] }; }
    function getRandomDrop(level, luck) {
        const roll = Math.random();
        if (roll < 0.01) return { rarity: 'UR', name: 'Apel Pengetahuan', type: 'apple', value: 1, qty: 1 };
        if (roll < 0.03) return { rarity: 'SSR', name: 'Ghost Key', type: 'ghost_key', value: 1, qty: 1 };
        if (roll < 0.10) return { rarity: 'SR', name: 'Topeng Tua Kuno', type: 'topeng', value: 1, qty: 1 };
        if (roll < 0.30) return { rarity: 'R', name: 'Potion HP 10%', type: 'potion', value: 10, qty: 1 };
        return { rarity: 'Common', name: 'Ghost Coin', type: 'coin', value: 3, qty: Math.floor(Math.random() * 5) + 2 };
    }

    function addToInventory(type, value, qty) {
        if (type === 'potion') gameState.inventory.potion_hp += value * qty;
        else if (type === 'stamina_bread') gameState.inventory.stamina_bread += value * qty;
        else if (type === 'coin') gameState.inventory.ghost_coin += value * qty;
        else if (type === 'topeng') gameState.inventory.topeng += value * qty;
        else if (type === 'apple') gameState.inventory.apple += value * qty;
        else if (type === 'ghost_key') gameState.inventory.ghost_key += value * qty;
        saveGame();
    }

    function autoRecovery() {
        const now = Date.now();
        const diff = now - gameState.lastRegen;
        const minutesPassed = Math.floor(diff / 60000);
        if (minutesPassed > 0) {
            gameState.characters.forEach(char => {
                char.hp = Math.min(char.maxHp, char.hp + Math.floor(minutesPassed / 2));
                char.stamina = Math.min(char.maxStamina, char.stamina + minutesPassed * 2);
            });
            gameState.lastRegen = now - (diff % 60000);
            saveGame();
        }
    }

    function applyCurseDamage(character) {
        let damage = gameState.level <= 5 ? 5 : gameState.level <= 10 ? 8 : gameState.level <= 20 ? 12 : 16;
        const reduction = character.curseResistance / 100;
        const finalDamage = Math.max(3, Math.floor(damage * (1 - reduction * 0.3)));
        character.hp = Math.max(0, character.hp - finalDamage);
        showFloatingDamage(`-${finalDamage} HP`, character.id);
        if (character.hp <= 0) addHintToHistory(`💀 ${character.name} pingsan! Gunakan item.`);
        saveGame(); render();
        return finalDamage;
    }

    function showFloatingDamage(text, charId) {
        const charCard = document.querySelector(`.char-card[data-char="${charId}"]`);
        if (charCard) {
            const div = document.createElement('div'); div.className = 'floating-damage';
            div.textContent = text; div.style.position = 'absolute'; div.style.top = '30%'; div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            charCard.style.position = 'relative'; charCard.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }
    }

    function getHintFromCharacter(charId) {
        const character = gameState.characters.find(c => c.id === charId);
        if (!character) return;
        let cost = character.baseHintCost + Math.floor(gameState.level / 10);
        if (character.stamina < cost) {
            addHintToHistory(`⚠️ Stamina ${character.name} tidak cukup! (butuh ${cost})`);
            render(); return;
        }
        character.stamina -= cost;
        const hintMsg = gameState.currentPuzzle?.hint || "Pikirkan tentang makna tersembunyi...";
        const styleMessages = {
            galak: `"${character.name} menyilangkan tangan: '${hintMsg.substring(0,45)}... Jangan buang waktuku!'"`,
            ceplas: `"${character.name} tersenyum: '${hintMsg.substring(0,40)}... Aku yakin kamu bisa!'"`,
            singkat: `"${character.name} berkata datar: '${hintMsg.substring(0,40)}... Pikir lagi.'"`,
            panik: `"${character.name} panik: 'A-aku rasa ini tentang ${hintMsg.substring(0,30)}... Coba ingat lagi!'"`
        };
        addHintToHistory(`${character.avatar} ${styleMessages[character.hintStyle] || character.name + ' memberi petunjuk'} (${cost} stamina)`);
        saveGame(); render();
    }

    function addHintToHistory(text) {
        gameState.hintHistory.unshift({ text, time: new Date().toLocaleTimeString() });
        if (gameState.hintHistory.length > 25) gameState.hintHistory.pop();
        saveGame();
    }

    function useItemOnCharacter(itemType, charId) {
        const character = gameState.characters.find(c => c.id === charId);
        if (!character) return;
        if (itemType === 'potion' && gameState.inventory.potion_hp >= 30) {
            character.hp = Math.min(character.maxHp, character.hp + 30);
            gameState.inventory.potion_hp -= 30;
            addHintToHistory(`🧪 ${character.name} menggunakan Potion! HP +30`);
        } else if (itemType === 'stamina' && gameState.inventory.stamina_bread >= 20) {
            character.stamina = Math.min(character.maxStamina, character.stamina + 20);
            gameState.inventory.stamina_bread -= 20;
            addHintToHistory(`🍞 ${character.name} memakan Roti! Stamina +20`);
        } else if (itemType === 'apple' && gameState.inventory.apple > 0) {
            gameState.inventory.apple--;
            addHintToHistory(`🍎 ${character.name} memakan Apel Pengetahuan! Keberuntungan meningkat.`);
        }
        saveGame(); render();
    }

    function saveGame() {
        const saveData = {
            characters: gameState.characters.map(c => ({ id: c.id, hp: c.hp, stamina: c.stamina, affection: c.affection })),
            level: gameState.level, chapter: gameState.chapter, puzzleProgress: gameState.puzzleProgress,
            puzzlesThisLevel: gameState.puzzlesThisLevel, totalPuzzlesSolved: gameState.totalPuzzlesSolved,
            lastRegen: gameState.lastRegen, inventory: gameState.inventory, hintHistory: gameState.hintHistory,
            currentStorySeed: gameState.currentStorySeed
        };
        localStorage.setItem('yureiKakuSave', JSON.stringify(saveData));
    }

    function loadGame() {
        const saved = localStorage.getItem('yureiKakuSave');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gameState.characters = CHARACTERS.map(char => {
                    const savedChar = data.characters?.find(c => c.id === char.id);
                    return { ...char, hp: savedChar?.hp ?? char.maxHp, stamina: savedChar?.stamina ?? char.maxStamina, affection: savedChar?.affection ?? 15 };
                });
                gameState.level = data.level || 1;
                gameState.chapter = data.chapter || 1;
                gameState.puzzleProgress = data.puzzleProgress || 0;
                gameState.puzzlesThisLevel = data.puzzlesThisLevel || 12;
                gameState.totalPuzzlesSolved = data.totalPuzzlesSolved || 0;
                gameState.lastRegen = data.lastRegen || Date.now();
                gameState.inventory = { ...gameState.inventory, ...(data.inventory || {}) };
                gameState.hintHistory = data.hintHistory || [];
                gameState.currentStorySeed = data.currentStorySeed || Math.random();
                gameState.currentPuzzle = getRandomPuzzle();
            } catch(e) { initNewGame(); }
        } else { initNewGame(); }
        autoRecovery();
    }

    function initNewGame() {
        gameState.characters = CHARACTERS.map(char => ({ ...char, hp: char.maxHp, stamina: char.maxStamina, affection: 15 }));
        gameState.level = 1; gameState.chapter = 1; gameState.puzzleProgress = 0; gameState.puzzlesThisLevel = 12;
        gameState.totalPuzzlesSolved = 0; gameState.lastRegen = Date.now(); gameState.hintHistory = [];
        gameState.inventory = { ghost_coin: 25, topeng: 2, potion_hp: 0, stamina_bread: 0, apple: 0, ghost_key: 0, mystery_box: 0, legendary_chest: 0 };
        gameState.currentStorySeed = Math.random();
        gameState.currentPuzzle = getRandomPuzzle();
        saveGame();
    }

    function solvePuzzle() {
        const input = document.getElementById('puzzleAnswer');
        const userAnswer = input?.value.trim().toLowerCase();
        const puzzle = gameState.currentPuzzle;
        if (!puzzle) return;
        
        if (userAnswer === puzzle.a.toLowerCase()) {
            const randomChar = gameState.characters[Math.floor(Math.random() * gameState.characters.length)];
            const drop = getRandomDrop(gameState.level, randomChar.luck);
            addToInventory(drop.type, drop.value, drop.qty);
            addHintToHistory(`✅ TEKA-TEKI TERPECAHKAN! ${drop.name} x${drop.qty} [${drop.rarity}]`);
            
            gameState.totalPuzzlesSolved++;
            gameState.puzzleProgress++;
            
            if (gameState.puzzleProgress >= gameState.puzzlesThisLevel) {
                gameState.chapter++;
                gameState.puzzleProgress = 0;
                gameState.puzzlesThisLevel = Math.min(18, 12 + Math.floor(gameState.level / 4));
                gameState.level++;
                addHintToHistory(`📖 BAB ${gameState.chapter} SELESAI! Level naik ke ${gameState.level}`);
                gameState.characters.forEach(c => { c.hp = c.maxHp; c.stamina = c.maxStamina; });
            } else {
                gameState.level++;
            }
            gameState.currentPuzzle = getRandomPuzzle();
            saveGame();
            render();
            if(input) input.value = '';
        } else {
            const targets = gameState.characters.filter(c => c.hp > 0);
            if (targets.length > 0) {
                const target = targets[Math.floor(Math.random() * targets.length)];
                const damage = applyCurseDamage(target);
                addHintToHistory(`❌ JAWABAN SALAH! ${target.name} terkena kutukan (-${damage} HP)`);
                const card = document.querySelector(`.char-card[data-char="${target.id}"]`);
                if (card) { card.classList.add('cursed'); setTimeout(() => card.classList.remove('cursed'), 500); }
            }
            if(input) input.value = '';
            saveGame();
            render();
        }
    }

    function generateStoryText() {
        const stories = [
            `Kutukan ${gameState.currentStorySeed.toString().slice(0,6)} menyelimuti desa. ${gameState.characters[0]?.name || 'Haruno'} berbisik, "Pecahkan 12-15 teka-teki setiap bab untuk melarikan diri."`,
            `Kabut tebal di ${gameState.level % 2 === 0 ? 'sekolah terbengkalai' : 'rumah sakit jiwa'}. ${gameState.characters[3]?.name || 'Touya'} memegang obor, "Aku akan melindungi kalian."`,
            `Bab ${gameState.chapter}: ${gameState.puzzleProgress}/${gameState.puzzlesThisLevel} teka-teki terselesaikan. Teruslah berjuang!`
        ];
        return stories[Math.floor(Math.random() * stories.length)];
    }

    let currentModal = null;
    function showProfile(char) {
        if(currentModal) { currentModal.remove(); currentModal = null; }
        const overlay = document.createElement('div'); overlay.className = 'overlay';
        const modal = document.createElement('div'); modal.className = 'profile-modal';
        modal.style.cssText = 'position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(8,5,20,0.98); backdrop-filter:blur(20px); border-radius:24px; padding:24px; z-index:2000; width:min(95%,500px); max-height:85vh; overflow-y:auto; border:2px solid #ff88aa; color:#f0e0d0;';
        modal.innerHTML = `
            <button class="profile-close" style="position:absolute; top:10px; right:15px; background:#ff6688; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer; color:white; font-weight:bold;" onclick="closeModal()">✕</button>
            <div style="text-align:center; font-size:3rem;">${char.avatar}</div>
            <h2 style="text-align:center; color:#ffccaa;">${char.name}</h2>
            <hr style="margin:15px 0; border-color:#665588;">
            <h3>📌 Identitas</h3>
            <p>${char.personality}</p>
            <h3>💕 Affection: ${char.affection}</h3>
            <h3>⚡ Statistik</h3>
            <p>🧠 Intelijen: ${char.intelligence} | 🍀 Keberuntungan: ${char.luck} | 🛡️ Resistansi Kutukan: ${char.curseResistance}</p>
            <h3>💡 Hint Cost</h3>
            <p>${char.baseHintCost} stamina per petunjuk</p>
            <hr>
            <p style="font-size:0.8rem;">✨ Klik kembali ke game untuk melanjutkan petualangan ✨</p>
        `;
        document.body.appendChild(overlay); document.body.appendChild(modal);
        currentModal = { overlay, modal };
    }
    window.closeModal = () => { if(currentModal) { currentModal.overlay.remove(); currentModal.modal.remove(); currentModal = null; } };

    function render() {
        const app = document.getElementById('app');
        if (!app) return;
        
        if (gameState.screen === 'mainmenu') {
            app.innerHTML = `
                <div class="main-menu glass-panel">
                    <h1 class="game-title">YUREI KAKU</h1>
                    <div class="menu-buttons">
                        <button class="menu-btn" onclick="startGame()">✨ Mulai Petualangan</button>
                        <button class="menu-btn" onclick="window.location.href='daily.html'">🎁 Daily & Shop</button>
                        <button class="menu-btn" onclick="window.location.href='characters.html'">👥 Karakter</button>
                    </div>
                    <div style="margin-top: 30px; font-size: clamp(0.7rem, 3vw, 0.8rem); color:#ccbbaa;">✦ 12-18 Teka-teki per Bab · Random Story · Otome Horror ✦</div>
                </div>
            `;
            return;
        }
        
        app.innerHTML = `
            <div class="glass-panel">
                <div class="nav-bar">
                    <button class="nav-btn" onclick="window.location.href='daily.html'">🎁 Daily & Shop</button>
                    <button class="nav-btn" onclick="window.location.href='characters.html'">👥 Karakter</button>
                    <button class="nav-btn" onclick="gameState.screen='mainmenu'; render()">🏠 Menu</button>
                </div>
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; align-items: center; gap: 12px;">
                    <h2>👥 YUREI KAKU</h2>
                    <button class="btn-hint" onclick="showNewGameWarning()">🔄 Reset Cerita</button>
                </div>
                <div class="inventory-summary">
                    <span class="inv-tag">🪙 ${gameState.inventory.ghost_coin}</span>
                    <span class="inv-tag">🎭 ${gameState.inventory.topeng}</span>
                    <span class="inv-tag">🧪 ${gameState.inventory.potion_hp}%</span>
                    <span class="inv-tag">🍞 ${gameState.inventory.stamina_bread}%</span>
                    <span class="inv-tag">🍎 ${gameState.inventory.apple}</span>
                    <span class="inv-tag">🔑 ${gameState.inventory.ghost_key}</span>
                </div>
            </div>
            <div class="char-grid">
                ${gameState.characters.map(char => `
                    <div class="char-card" data-char="${char.id}" onclick="showProfile(${JSON.stringify(char).replace(/"/g, '&quot;')})">
                        <div class="char-header"><div class="char-avatar">${char.avatar}</div>
                        <div><div class="char-name">${char.name}</div><div class="char-personality">${char.personality}</div></div></div>
                        <div class="stat-bar-container"><div class="stat-label"><span>❤️ HP</span><span>${Math.floor(char.hp)}/${char.maxHp}</span></div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width: ${(char.hp/char.maxHp)*100}%"></div></div></div>
                        <div class="stat-bar-container"><div class="stat-label"><span>⚡ Stamina</span><span>${Math.floor(char.stamina)}/${char.maxStamina}</span></div>
                        <div class="stamina-bar-bg"><div class="stamina-bar-fill" style="width: ${(char.stamina/char.maxStamina)*100}%"></div></div></div>
                        <div class="stats-grid">
                            <div class="stat-item">💕 Aff: <span class="stat-value">${char.affection}</span></div>
                            <div class="stat-item">🧠 Intel: <span class="stat-value">${char.intelligence}</span></div>
                            <div class="stat-item">🍀 Luck: <span class="stat-value">${char.luck}</span></div>
                            <div class="stat-item">🛡️ Resist: <span class="stat-value">${char.curseResistance}</span></div>
                            <div class="stat-item">💡 Hint: <span class="stat-value">${char.baseHintCost} stam</span></div>
                        </div>
                        <div style="display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;">
                            <button class="btn-hint" onclick="event.stopPropagation(); getHintFromCharacter('${char.id}')">🔍 Petunjuk</button>
                            <button class="btn-hint" onclick="event.stopPropagation(); useItemOnCharacter('potion', '${char.id}')">🧪 Potion</button>
                            <button class="btn-hint" onclick="event.stopPropagation(); useItemOnCharacter('stamina', '${char.id}')">🍞 Roti</button>
                            ${gameState.inventory.apple > 0 ? `<button class="btn-hint" onclick="event.stopPropagation(); useItemOnCharacter('apple', '${char.id}')">🍎 Apel</button>` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="puzzle-area">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
                    <h3>🧩 TEKA-TEKI KE-${gameState.puzzleProgress+1} / ${gameState.puzzlesThisLevel}</h3>
                    <div class="stat-tag">Level ${gameState.level} · Bab ${gameState.chapter}</div>
                </div>
                <div class="puzzle-question">「 ${gameState.currentPuzzle?.q || 'Memuat teka-teki...'} 」</div>
                <div class="puzzle-options">
                    <input type="text" id="puzzleAnswer" class="puzzle-input" placeholder="Ketik jawaban di sini..." autocomplete="off" enterkeyhint="done">
                    <button class="puzzle-btn" onclick="solvePuzzle()">✨ Jawab</button>
                </div>
                <div style="margin-top: 12px; text-align: center; font-size: clamp(0.6rem, 2.5vw, 0.7rem); color: #ccbba8;">💡 Butuh bantuan? Klik "Petunjuk" di karakter (menguras stamina) atau klik kartu untuk lihat profil</div>
            </div>
            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; flex-wrap: wrap;"><h3>📜 Hint History</h3><span>${gameState.hintHistory.length} catatan</span></div>
                <div class="hint-history">
                    ${gameState.hintHistory.slice(0, 6).map(h => `<div class="hint-entry">[${h.time}] ${h.text}</div>`).join('')}
                    ${gameState.hintHistory.length === 0 ? '<div class="hint-entry">✨ Belum ada hint. Klik tombol petunjuk di karakter!</div>' : ''}
                </div>
            </div>
            <div class="glass-panel"><h3>📖 Cerita Saat Ini</h3><p style="line-height:1.6;">${generateStoryText()}</p></div>
        `;
        
        const input = document.getElementById('puzzleAnswer');
        if(input && document.activeElement !== input) {
            setTimeout(() => { if(document.activeElement !== input) input.focus(); }, 100);
        }
    }

    function showNewGameWarning() {
        const overlay = document.createElement('div'); overlay.className = 'overlay';
        const modal = document.createElement('div'); modal.className = 'warning-modal';
        modal.innerHTML = `
            <h3 style="color:#ff8899;">⚠️ PERINGATAN ⚠️</h3>
            <p style="margin: 20px 0;">Progress cerita akan dimulai ulang.<br><strong>Item inventory TIDAK akan hilang!</strong></p>
            <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
                <button class="btn-hint" onclick="closeWarning()" style="background:#5a3a5a;">📖 Lanjutkan</button>
                <button class="btn-hint" onclick="resetStory()" style="background:#ff6688;">✨ Reset Cerita</button>
            </div>
        `;
        document.body.appendChild(overlay); document.body.appendChild(modal);
        window.warningElements = { overlay, modal };
    }
    window.closeWarning = () => { if(window.warningElements) { window.warningElements.overlay.remove(); window.warningElements.modal.remove(); } };
    window.resetStory = () => { initNewGame(); closeWarning(); render(); addHintToHistory('✨ Cerita baru dimulai! Item tetap utuh. ✨'); };
    window.startGame = () => { gameState.screen = 'game'; if(!gameState.currentPuzzle) gameState.currentPuzzle = getRandomPuzzle(); render(); };
    window.getHintFromCharacter = getHintFromCharacter;
    window.useItemOnCharacter = useItemOnCharacter;
    window.solvePuzzle = solvePuzzle;
    window.showProfile = showProfile;

    function createParticles() {
        const particleCount = Math.min(40, Math.floor(window.innerWidth / 30));
        for(let i = 0; i < particleCount; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = Math.random() * 4 + 2 + 'px'; p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 10 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(p);
        }
    }
    
    loadGame();
    createParticles();
    render();
    setInterval(() => { autoRecovery(); if(gameState.screen === 'game') render(); }, 60000);
    window.addEventListener('resize', () => { document.querySelectorAll('.particle').forEach(p => p.remove()); createParticles(); });
</script>
</body>
</html>
