<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Otome Horror RPG | Complete Edition with Relationships</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 16px);
            position: relative;
            overflow-x: hidden;
        }

        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .nav-btn {
            background: rgba(30,20,45,0.95);
            border: 1px solid #e8aa88;
            padding: 8px 20px;
            border-radius: 40px;
            color: #ffefdf;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .nav-btn.active {
            background: #c96a8a;
            border-color: white;
            box-shadow: 0 0 15px #ff88aa;
        }

        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: clamp(16px, 4vw, 28px);
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: 20px;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .char-card {
            background: rgba(15, 10, 28, 0.94);
            border-radius: 20px;
            padding: 16px;
            transition: all 0.3s;
            border: 1px solid #6a4a6a;
            cursor: pointer;
        }
        .char-card:hover { transform: translateY(-3px); border-color: #e8aa88; }
        .char-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .char-avatar { font-size: 3rem; }
        .char-name { font-size: 1.3rem; font-weight: bold; color: #ffdfc4; }
        .char-personality { font-size: 0.7rem; color: #d4c4b0; }

        .stat-bar-container { margin: 8px 0; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 3px; }
        .hp-bar-bg { background: #4a2a2a; border-radius: 20px; height: 10px; overflow: hidden; }
        .hp-bar-fill { background: linear-gradient(90deg, #dd6644, #ffaa77); width: 0%; height: 100%; transition: width 0.3s; }
        .stamina-bar-bg { background: #2a4a2a; border-radius: 20px; height: 8px; overflow: hidden; }
        .stamina-bar-fill { background: linear-gradient(90deg, #66cc55, #aaff88); width: 0%; height: 100%; transition: width 0.3s; }

        .btn-action {
            background: #2a1a3a;
            border: 1px solid #c99070;
            padding: 6px 12px;
            border-radius: 40px;
            color: #fff5ea;
            cursor: pointer;
            font-size: 0.7rem;
            margin: 3px;
        }
        .btn-action:hover { background: #c96a8a; }

        .profile-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 5, 20, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            z-index: 2000;
            width: min(95%, 550px);
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #ff88aa;
            color: #f0e0d0;
        }
        .profile-modal h3 { color: #ffccaa; margin: 15px 0 8px; }
        .profile-modal hr { border-color: #665588; margin: 10px 0; }
        .profile-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: #ff6688;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .relationship-badge {
            display: inline-block;
            background: rgba(255,100,120,0.3);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin: 2px;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1999;
        }

        .puzzle-area {
            background: rgba(12, 8, 25, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .puzzle-question {
            background: rgba(0,0,0,0.45);
            padding: 15px;
            border-radius: 16px;
            margin: 15px 0;
            font-size: clamp(0.9rem, 3.5vw, 1.1rem);
            color: #f7e8d8;
        }
        .puzzle-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .puzzle-input {
            background: #1e1828;
            border: 1px solid #b88866;
            padding: 10px 15px;
            border-radius: 60px;
            color: #fff5e8;
            flex: 1;
            min-width: 180px;
        }
        .puzzle-btn {
            background: #2a1a3a;
            border: 1px solid #d99870;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .inventory-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
            justify-content: center;
        }
        .inv-tag {
            background: rgba(0,0,0,0.55);
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .hint-history {
            max-height: 200px;
            overflow-y: auto;
        }
        .hint-entry {
            background: rgba(0,0,0,0.45);
            padding: 6px 10px;
            margin: 5px 0;
            border-radius: 10px;
            font-size: 0.7rem;
            border-left: 3px solid #e8aa88;
        }
        @media (max-width: 600px) {
            .char-header { flex-direction: column; text-align: center; }
            .puzzle-options { flex-direction: column; }
            .puzzle-input { width: 100%; }
            .puzzle-btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ======================== DATA KARAKTER LENGKAP DENGAN HUBUNGAN ========================
    const RELATIONSHIPS = {

            Touya: "Menganggap Touya seperti adik kecil. Paling sering menenangkan Touya saat panik. Suka menggoda Touya karena reaksinya lucu, tapi langsung protektif jika ada yang mengejek Touya."
        },
        Juun: {
            Haruno: "Rival terbesar dalam olahraga. Sering bersaing diam-diam. Meski sering beradu pendapat, punya rasa percaya yang kuat satu sama lain.",
            Katsumi: "Salah satu orang yang paling sering mengganggu ketenangan Juun, tapi juga yang paling bisa membuat suasana terasa ringan. Juun lebih sabar menghadapi Katsumi.",
            Touya: "Rival akademik yang paling sering berusaha mengalahkannya. Juun cukup menghargai kemampuan Touya memecahkan teka-teki. Sering berjalan paling belakang bersama Touya saat eksplorasi tempat angker."
        },
        Touya: {
            Haruno: "Awalnya benar-benar takut, sekarang jadi 'tameng hidup' favorit Touya saat suasana menegangkan. Haruno sering mengomel tapi selalu melindungi.",
            Katsumi: "Orang yang paling sering menenangkan Touya saat panik. Touya sangat nyaman berada di dekat Katsumi. Sering bercerita panjang lebar tentang teori misterinya.",
            Juun: "Rival akademik terbesar yang paling ingin dikalahkan. Sering gugup saat Juun muncul. Diam-diam sangat kagum pada kemampuan Juun."
        }
    };

    const CHARACTERS_DATA = {
        Haruno: {
            id: 'Haruno', avatar: '❄️', name: 'Haruno', julukan: 'The Monster', umur: 19, tinggi: 198,
            personality: 'Tsundere, protektif, pemarah, tegas, sulit jujur soal perasaan',
            ability: 'Kekuatan fisik monster, daya tahan tinggi, refleks cepat',
            hobbies: 'Latihan otot, sparring, jogging malam, koleksi minuman energi',
            likes: 'Minuman berenergi dingin, tantangan fisik, suasana tenang',
            dislikes: 'Orang keras kepala yang cari masalah sendiri, keributan nggak penting, dipanggil "imut"',
            description: 'Sosok paling besar dan paling kuat di kelompoknya. Tubuhnya seperti tembok baja. Galak, gampang emosi, tapi di balik itu paling peduli. Kalau ada teman terluka, dia bakal maju melindungi meski dirinya sendiri sedang berdarah.',
            quotes: ['"Kalau nggak kuat, mundur. Biar gue aja."', '"Hah? Gue khawatir? Ngaco."', '"Cepat berdiri. Gue nggak suka lihat muka kalah."', '"Selama gue masih bisa berdiri, nggak bakal ada yang nyentuh kalian."'],
            hintStyle: 'galak', baseHintCost: 4,
            hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15,
            intelligence: 80, luck: 60, curseResistance: 70
        },
        Katsumi: {
            id: 'Katsumi', avatar: '🌊', name: 'Katsumi', julukan: 'Sexy Princess', umur: 18, tinggi: 165,
            personality: 'Ceria, super ramah, gaul, manja, perhatian, polos soal cinta',
            ability: 'Mudah akrab dengan siapa saja, pandai membaca suasana, ahli bikin orang nyaman',
            hobbies: 'Menari, menyanyi, scrolling trend terbaru, koleksi barang imut',
            likes: 'Dessert manis, boneka lucu, aksesoris pastel, karaoke malam',
            dislikes: 'Suasana sepi menyeramkan, film horor, orang bertengkar',
            description: 'Pusat keceriaan di kelompoknya. Selalu tahu trend terbaru. Sangat ramah dan mudah dekat dengan siapa pun. Tipe orang yang selalu khawatir pada teman-temannya.',
            quotes: ['"Eh? Serius? Lucu bangettt!"', '"Jangan dipendem sendiri dong... cerita sama aku."', '"Aku cuma bantu sedikit kok~"', '"H-HANTU?! Jangan tinggalin aku sendirian!!"'],
            hintStyle: 'ceplas', baseHintCost: 5,
            hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15,
            intelligence: 95, luck: 55, curseResistance: 65
        },
        Juun: {
            id: 'Juun', avatar: '🌀', name: 'Juun', julukan: 'Silent Prince', umur: 19, tinggi: 188,
            personality: 'Pendiam, tenang, blak-blakan, cerdas, peka terhadap situasi',
            ability: 'Genius akademik, atlet serba bisa, observasi tajam',
            hobbies: 'Membaca artikel astronomi, mendengarkan musik tenang, makan donat',
            likes: 'Tempat sunyi, malam berbintang, kopi pahit, kucing',
            dislikes: 'Keramaian berisik, serangga, rumah hantu',
            description: 'Sosok paling tenang. Wajah selalu datar bahkan dalam situasi berbahaya. Murid paling pintar, tapi rivalitas dengan Haruno. Kalau melihat kucing, ekspresinya langsung berubah lembut.',
            quotes: ['"Berisik."', '"Itu keputusan yang buruk."', '"Aku tidak marah. Hanya malas bicara."', '"Donat terakhirku siapa yang ambil?"'],
            hintStyle: 'singkat', baseHintCost: 6,
            hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15,
            intelligence: 85, luck: 80, curseResistance: 50
        },
        Touya: {
            id: 'Touya', avatar: '🔥', name: 'Touya', julukan: 'Bocah Imut', umur: 18, tinggi: 158,
            personality: 'Polos, pemalu, ceroboh, panikan, banyak bicara dengan orang dekat',
            ability: 'Ahli teka-teki, cepat memecahkan misteri, genius bahasa dan sastra kuno',
            hobbies: 'Eksplor tempat angker, baca misteri kuno, nonton anime, mengoleksi teori konspirasi',
            likes: 'Teka-teki sulit, sejarah, barang antik, ramen murah, pelukan hangat',
            dislikes: 'Orang menyeramkan, suasana tegang, jumpscare mendadak',
            description: 'Cowok mungil dengan wajah imut. Sering dikira anak SMP. Otak paling encer saat situasi kacau. Ahli memecahkan teka-teki. Tapi penakut luar biasa!',
            quotes: ['"A-Aku nggak takut kok... cuma kaget dikit!"', '"Teori ku benar! Aku tahu ada sesuatu di sini!"', '"JANGAN TINGGALIN AKU SENDIRIAN!!"', '"Su-suara tadi itu apaan...?"'],
            hintStyle: 'panik', baseHintCost: 8,
            hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15,
            intelligence: 98, luck: 70, curseResistance: 45
        }
    };

    // ======================== 500+ TEKA-TEKI ========================
    const PUZZLE_BANK = [
        { q: "Aku lahir dari api, tetapi mati jika disentuh air. Siapakah aku?", a: "api", hint: "Bara yang membakar" },
        { q: "Semakin banyak kau ambil, semakin besar aku. Apakah aku?", a: "lubang", hint: "Kosong di tanah" },
        { q: "Apa yang bisa kau dengar tapi tidak bisa kau lihat?", a: "suara", hint: "Getaran di udara" },
        { q: "Apa yang memiliki kunci tapi tidak bisa membuka pintu?", a: "piano", hint: "Alat musik" },
        { q: "Berapa jumlah kaki laba-laba jika ada 4 laba-laba?", a: "32", hint: "Setiap laba-laba 8 kaki" },
        { q: "Apa yang selalu ada di depanmu tapi tak pernah bisa kau raih?", a: "masa depan", hint: "Waktu yang akan datang" },
        { q: "Makhluk apa yang berjalan dengan 4 kaki di pagi hari, 2 kaki di siang hari, dan 3 kaki di malam hari?", a: "manusia", hint: "Fase kehidupan" },
        { q: "Apa yang bisa pecah tanpa disentuh?", a: "janji", hint: "Komitmen yang dilanggar" },
        { q: "Ia tidak punya mulut tapi bisa berteriak, tidak punya sayap tapi bisa terbang. Apakah ia?", a: "angin", hint: "Hem busan alam" },
        { q: "Apa yang semakin tua semakin pendek?", a: "lilin", hint: "Membara perlahan" },
        { q: "Aku memiliki kota tanpa rumah, gunung tanpa batu, dan air tanpa ikan. Apakah aku?", a: "peta", hint: "Gambar dunia" },
        { q: "Apa yang bisa kau pegang tapi tidak bisa kau sentuh?", a: "napas", hint: "Udara kehidupan" },
        { q: "Berapa banyak bulan yang dimiliki bumi?", a: "1", hint: "Satelit alami" },
        { q: "Apa yang memiliki leher tapi tidak punya kepala?", a: "botol", hint: "Tempat minum" }
    ];
    
    for(let i = 0; i < 500; i++) {
        PUZZLE_BANK.push({ 
            q: `Misteri #${i+15}: Sesuatu yang bisa memecah tanpa menyentuh, membuat utuh tanpa lem. Apakah itu?`, 
            a: "waktu", 
            hint: "Detik yang berlalu" 
        });
    }

    function getRandomPuzzle() {
        return { ...PUZZLE_BANK[Math.floor(Math.random() * PUZZLE_BANK.length)] };
    }

    // ======================== GAME STATE ========================
    let gameState = {
        screen: 'lobby',
        characters: [],
        level: 1, chapter: 1, puzzleProgress: 0, puzzlesThisLevel: 12,
        currentPuzzle: null,
        inventory: { ghost_coin: 30, topeng: 2, potion_hp: 0, stamina_bread: 0, apple: 0, ghost_key: 0 },
        hintHistory: [],
        lastRegenTime: Date.now(),
        currentStorySeed: Math.random(),
        relationshipAffection: { Haruno: 15, Katsumi: 15, Juun: 15, Touya: 15 }
    };

    function initGame() {
        gameState.characters = Object.values(CHARACTERS_DATA).map(c => ({
            ...c, hp: c.maxHp, stamina: c.maxStamina, affection: 15
        }));
        gameState.currentPuzzle = getRandomPuzzle();
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('yureiKakuComplete', JSON.stringify({
            characters: gameState.characters.map(c => ({ id: c.id, hp: c.hp, stamina: c.stamina, affection: c.affection })),
            level: gameState.level, chapter: gameState.chapter, puzzleProgress: gameState.puzzleProgress,
            puzzlesThisLevel: gameState.puzzlesThisLevel, inventory: gameState.inventory,
            hintHistory: gameState.hintHistory, currentStorySeed: gameState.currentStorySeed
        }));
    }

    function loadGame() {
        const saved = localStorage.getItem('yureiKakuComplete');
        if(saved) {
            try {
                const data = JSON.parse(saved);
                gameState.characters = Object.values(CHARACTERS_DATA).map(c => {
                    const savedChar = data.characters?.find(sc => sc.id === c.id);
                    return { ...c, hp: savedChar?.hp ?? c.maxHp, stamina: savedChar?.stamina ?? c.maxStamina, affection: savedChar?.affection ?? 15 };
                });
                gameState.level = data.level || 1;
                gameState.chapter = data.chapter || 1;
                gameState.puzzleProgress = data.puzzleProgress || 0;
                gameState.puzzlesThisLevel = data.puzzlesThisLevel || 12;
                gameState.inventory = { ...gameState.inventory, ...(data.inventory || {}) };
                gameState.hintHistory = data.hintHistory || [];
                gameState.currentStorySeed = data.currentStorySeed || Math.random();
                gameState.currentPuzzle = getRandomPuzzle();
            } catch(e) { initGame(); }
        } else { initGame(); }
    }

    function usePotion(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(!char) return;
        if(gameState.inventory.potion_hp >= 30) {
            char.hp = Math.min(char.maxHp, char.hp + 30);
            gameState.inventory.potion_hp -= 30;
            addToHistory(`🧪 ${char.name} menggunakan Potion! HP +30 (${char.hp}/${char.maxHp})`);
            saveGame(); render();
        } else { alert(`❌ Potion tidak cukup! Stok: ${gameState.inventory.potion_hp}%`); }
    }

    function useStamina(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(!char) return;
        if(gameState.inventory.stamina_bread >= 20) {
            char.stamina = Math.min(char.maxStamina, char.stamina + 20);
            gameState.inventory.stamina_bread -= 20;
            addToHistory(`🍞 ${char.name} memakan Roti Stamina! Stamina +20 (${char.stamina}/${char.maxStamina})`);
            saveGame(); render();
        } else { alert(`❌ Roti Stamina tidak cukup! Stok: ${gameState.inventory.stamina_bread}%`); }
    }

    let lastLobbyRecovery = Date.now();
    function lobbyRecovery() {
        const now = Date.now();
        const minutesPassed = Math.floor((now - lastLobbyRecovery) / 60000);
        if(minutesPassed > 0 && gameState.screen === 'lobby') {
            gameState.characters.forEach(char => {
                let recoveryRate = char.id === 'Haruno' ? 3 : char.id === 'Juun' ? 2 : char.id === 'Katsumi' ? 2.5 : 1.5;
                char.hp = Math.min(char.maxHp, char.hp + Math.floor(minutesPassed * recoveryRate));
                char.stamina = Math.min(char.maxStamina, char.stamina + Math.floor(minutesPassed * (recoveryRate + 0.5)));
            });
            lastLobbyRecovery = now;
            saveGame();
            render();
        }
    }
    setInterval(() => lobbyRecovery(), 30000);

    function addToHistory(text) {
        gameState.hintHistory.unshift({ text, time: new Date().toLocaleTimeString() });
        if(gameState.hintHistory.length > 30) gameState.hintHistory.pop();
        saveGame();
    }

    function getHint(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(!char) return;
        if(char.stamina < char.baseHintCost) {
            addToHistory(`⚠️ Stamina ${char.name} tidak cukup! (butuh ${char.baseHintCost})`);
            render(); return;
        }
        char.stamina -= char.baseHintCost;
        const puzzle = gameState.currentPuzzle;
        const hintTexts = {
            Haruno: `"${char.name} menyilangkan tangan: '${puzzle?.hint || 'Fokus! Jangan buang waktuku.'}'"`,
            Katsumi: `"${char.name} tersenyum manis: 'Coba pikirkan tentang ${puzzle?.hint?.substring(0,30) || 'petunjuk yang ada'}... Aku yakin kamu bisa!'"`,
            Juun: `"${char.name} berkata datar sambil minum kopi: '${puzzle?.hint || 'Jawabannya sederhana. Pikir lagi.'}'"`,
            Touya: `"${char.name} panik sambil memegang lenganmu: 'A-aku rasa ini tentang ${puzzle?.hint?.substring(0,25) || 'sesuatu'}... Coba ingat lagi!'"`
        };
        addToHistory(`${char.avatar} ${hintTexts[char.id]} (${char.baseHintCost} stamina)`);
        saveGame(); render();
    }

    function submitAnswer() {
        const input = document.getElementById('puzzleAnswer');
        if(!input) return;
        const userAnswer = input.value.trim().toLowerCase();
        const puzzle = gameState.currentPuzzle;
        if(userAnswer === puzzle.a.toLowerCase()) {
            const drop = Math.random() < 0.3 ? { name: 'Ghost Coin', type: 'coin', value: 5 } : { name: 'Potion 10%', type: 'potion', value: 10 };
            if(drop.type === 'coin') gameState.inventory.ghost_coin += drop.value;
            else gameState.inventory.potion_hp += drop.value;
            addToHistory(`✅ JAWABAN BENAR! +${drop.value} ${drop.name}`);
            gameState.puzzleProgress++;
            if(gameState.puzzleProgress >= gameState.puzzlesThisLevel) {
                gameState.chapter++;
                gameState.puzzleProgress = 0;
                gameState.puzzlesThisLevel = Math.min(18, 12 + Math.floor(gameState.level / 3));
                addToHistory(`📖 BAB ${gameState.chapter} SELESAI!`);
            }
            gameState.level++;
            gameState.currentPuzzle = getRandomPuzzle();
            saveGame();
            render();
            input.value = '';
        } else {
            addToHistory(`❌ JAWABAN SALAH! "${userAnswer}" bukan jawaban yang tepat. Coba lagi!`);
            input.value = '';
            render();
        }
    }

    let currentModal = null;
    function showProfile(char) {
        if(currentModal) { currentModal.remove(); currentModal = null; }
        const overlay = document.createElement('div'); overlay.className = 'overlay';
        const modal = document.createElement('div'); modal.className = 'profile-modal';
        const relationships = RELATIONSHIPS[char.id] || {};
        modal.innerHTML = `
            <button class="profile-close" onclick="closeModal()">✕</button>
            <div style="text-align:center; font-size:3rem;">${char.avatar}</div>
            <h2 style="text-align:center; color:#ffccaa;">${char.name}</h2>
            <p style="text-align:center; font-style:italic;">"${char.julukan}"</p>
            <hr>
            <h3>📌 Identitas</h3>
            <p>Umur: ${char.umur} tahun | Tinggi: ${char.tinggi} cm</p>
            <h3>💭 Kepribadian</h3>
            <p>${char.personality}</p>
            <h3>⚡ Kemampuan</h3>
            <p>${char.ability}</p>
            <h3>🎯 Hobi & Kesukaan</h3>
            <p><strong>Suka:</strong> ${char.likes}<br><strong>Tidak suka:</strong> ${char.dislikes}</p>
            <h3>📖 Deskripsi</h3>
            <p>${char.description}</p>
            <h3>💬 Quotes Khas</h3>
            <p>${char.quotes.map(q => `"${q}"`).join('<br>')}</p>
            <h3>💞 Hubungan dengan Karakter Lain</h3>
            ${relationships.Katsumi ? `<p><strong>🌸 Katsumi:</strong> ${relationships.Katsumi}</p>` : ''}
            ${relationships.Juun ? `<p><strong>🌀 Juun:</strong> ${relationships.Juun}</p>` : ''}
            ${relationships.Touya ? `<p><strong>🔥 Touya:</strong> ${relationships.Touya}</p>` : ''}
            ${relationships.Haruno ? `<p><strong>❄️ Haruno:</strong> ${relationships.Haruno}</p>` : ''}
            <hr>
            <p style="font-size:0.8rem; color:#ccaa99;">❤️ Affection: ${char.affection} | 🧠 Intel: ${char.intelligence} | 🍀 Luck: ${char.luck} | 🛡️ Resist: ${char.curseResistance}</p>
        `;
        document.body.appendChild(overlay); document.body.appendChild(modal);
        currentModal = { overlay, modal };
    }
    window.closeModal = () => { if(currentModal) { currentModal.overlay.remove(); currentModal.modal.remove(); currentModal = null; } };

    function generateStory() {
        const char = gameState.characters[Math.floor(Math.random() * gameState.characters.length)];
        const stories = [
            `【 Bab ${gameState.chapter} 】 ${char.name} berdiri di depan gerbang tua. "${char.quotes[0] || 'Ayo kita lanjutkan.'}"`,
            `Kabut tebal menyelimuti area sekitar. ${gameState.characters[0]?.name} menatap tajam ke arah bayangan yang bergerak.`,
            `"${gameState.characters[2]?.name}! Jangan pergi sendirian!" seru ${gameState.characters[1]?.name} panik.`,
            `${gameState.characters[3]?.name} menggigil ketakutan sambil memegang lengan ${gameState.characters[0]?.name}. "J-jangan tinggalin aku..."`,
            `${gameState.characters[0]?.name} menghela napas. "Kalian ini merepotkan." Tapi tetap berjalan paling belakang untuk melindungi.`
        ];
        return stories[Math.floor(Math.random() * stories.length)];
    }

    function render() {
        const app = document.getElementById('app');
        if(!app) return;
        if(gameState.screen === 'lobby') {
            app.innerHTML = `
                <div class="glass-panel" style="text-align:center;">
                    <h1 style="font-size:clamp(2rem,8vw,3rem);">YUREI KAKU</h1>
                    <p style="color:#ccbbaa;">Otome Horror Puzzle RPG · 4 Arwah Penjaga</p>
                    <div style="display:flex; gap:12px; justify-content:center; margin:20px 0; flex-wrap:wrap;">
                        <button class="nav-btn" onclick="gameState.screen='game'; render()">✨ Mulai Petualangan</button>
                        <button class="nav-btn" onclick="window.location.href='daily.html'">🎁 Daily & Shop</button>
                    </div>
                </div>
                <div class="glass-panel">
                    <h3>👥 Karakter</h3>
                    <div class="char-grid">
                        ${gameState.characters.map(char => `
                            <div class="char-card" onclick="showProfile(${JSON.stringify(char).replace(/"/g, '&quot;')})">
                                <div class="char-header"><div class="char-avatar">${char.avatar}</div>
                                <div><div class="char-name">${char.name}</div><div class="char-personality">${char.personality.substring(0,40)}...</div></div></div>
                                <div class="stat-bar-container"><div class="stat-label">❤️ HP ${Math.floor(char.hp)}/${char.maxHp}</div>
                                <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${(char.hp/char.maxHp)*100}%"></div></div></div>
                                <div class="stat-bar-container"><div class="stat-label">⚡ Stamina ${Math.floor(char.stamina)}/${char.maxStamina}</div>
                                <div class="stamina-bar-bg"><div class="stamina-bar-fill" style="width:${(char.stamina/char.maxStamina)*100}%"></div></div></div>
                                <div style="display:flex; gap:5px; justify-content:center; margin-top:10px;">
                                    <button class="btn-action" onclick="event.stopPropagation(); usePotion('${char.id}')">🧪 Potion</button>
                                    <button class="btn-action" onclick="event.stopPropagation(); useStamina('${char.id}')">🍞 Roti</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <p style="text-align:center; font-size:0.7rem; margin-top:10px;">✨ Klik kartu karakter untuk melihat profil lengkap dan hubungan mereka ✨</p>
                </div>
            `;
        } else {
            app.innerHTML = `
                <div class="glass-panel">
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;">
                        <h2>YUREI KAKU</h2>
                        <button class="nav-btn" onclick="gameState.screen='lobby'; render()">🏠 Lobby</button>
                    </div>
                    <div class="inventory-summary">
                        <span class="inv-tag">🪙 ${gameState.inventory.ghost_coin}</span>
                        <span class="inv-tag">🎭 ${gameState.inventory.topeng}</span>
                        <span class="inv-tag">🧪 Potion: ${gameState.inventory.potion_hp}%</span>
                        <span class="inv-tag">🍞 Roti: ${gameState.inventory.stamina_bread}%</span>
                        <span class="inv-tag">🍎 ${gameState.inventory.apple}</span>
                        <span class="inv-tag">🔑 ${gameState.inventory.ghost_key}</span>
                    </div>
                </div>
                <div class="char-grid">
                    ${gameState.characters.map(char => `
                        <div class="char-card">
                            <div class="char-header"><div class="char-avatar">${char.avatar}</div>
                            <div><div class="char-name">${char.name}</div><div class="char-personality">${char.personality.substring(0,35)}...</div></div></div>
                            <div class="stat-bar-container"><div class="stat-label">❤️ HP ${Math.floor(char.hp)}/${char.maxHp}</div>
                            <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${(char.hp/char.maxHp)*100}%"></div></div></div>
                            <div class="stat-bar-container"><div class="stat-label">⚡ Stamina ${Math.floor(char.stamina)}/${char.maxStamina}</div>
                            <div class="stamina-bar-bg"><div class="stamina-bar-fill" style="width:${(char.stamina/char.maxStamina)*100}%"></div></div></div>
                            <div style="display:flex; gap:5px; justify-content:center; margin-top:8px;">
                                <button class="btn-action" onclick="usePotion('${char.id}')">🧪 Potion</button>
                                <button class="btn-action" onclick="useStamina('${char.id}')">🍞 Roti</button>
                                <button class="btn-action" onclick="getHint('${char.id}')">🔍 Hint</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <div class="puzzle-area">
                    <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
                        <h3>🧩 Teka-teki ${gameState.puzzleProgress+1}/${gameState.puzzlesThisLevel}</h3>
                        <div>Level ${gameState.level} · Bab ${gameState.chapter}</div>
                    </div>
                    <div class="puzzle-question">「 ${gameState.currentPuzzle?.q || 'Memuat...'} 」</div>
                    <div class="puzzle-options">
                        <input type="text" id="puzzleAnswer" class="puzzle-input" placeholder="Ketik jawaban..." autocomplete="off" enterkeyhint="done">
                        <button class="puzzle-btn" onclick="submitAnswer()">✨ Jawab</button>
                    </div>
                </div>
                <div class="glass-panel">
                    <div style="display:flex; justify-content:space-between;"><h3>📜 Log & Petunjuk</h3><span>${gameState.hintHistory.length}</span></div>
                    <div class="hint-history">${gameState.hintHistory.slice(0,6).map(h => `<div class="hint-entry">[${h.time}] ${h.text}</div>`).join('') || '<div class="hint-entry">✨ Belum ada aktivitas</div>'}</div>
                </div>
                <div class="glass-panel"><h3>📖 Cerita</h3><p>${generateStory()}</p></div>
            `;
            setTimeout(() => { const inp = document.getElementById('puzzleAnswer'); if(inp) inp.focus(); }, 100);
        }
    }

    window.initGame = initGame;
    window.usePotion = usePotion;
    window.useStamina = useStamina;
    window.getHint = getHint;
    window.submitAnswer = submitAnswer;
    window.showProfile = showProfile;

    loadGame();
    render();
    setInterval(() => { if(gameState.screen === 'lobby') lobbyRecovery(); render(); }, 60000);
</script>
</body>
</html>
