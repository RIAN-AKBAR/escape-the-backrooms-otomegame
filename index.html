<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Otome Horror Puzzle RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            background: rgba(255,200,150,0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        .game-app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 2;
        }

        /* Glassmorphism UI - Kontras Tinggi */
        .glass-panel {
            background: rgba(8, 5, 20, 0.88);
            backdrop-filter: blur(14px);
            border-radius: 28px;
            border: 1px solid rgba(255, 180, 120, 0.35);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Main Menu */
        .main-menu {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            text-align: center;
            padding: 48px;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd4a8, #ff8eb5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 25px rgba(255,120,120,0.4);
            letter-spacing: 4px;
        }

        .game-subtitle {
            color: #e8d5c0;
            font-size: 0.9rem;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
        }

        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
        }

        .menu-btn {
            background: rgba(30, 20, 40, 0.9);
            border: 1px solid #ffaa88;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffefdf;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        .menu-btn:hover {
            background: #ff6b9d;
            border-color: white;
            transform: scale(1.03);
            box-shadow: 0 0 18px #ff6b9d;
            color: white;
        }

        /* Character Grid */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 22px;
            margin: 25px 0;
        }

        .char-card {
            background: rgba(10, 6, 22, 0.9);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #5a3a4a;
        }

        .char-card:hover {
            transform: translateY(-5px);
            border-color: #ffaa88;
            box-shadow: 0 0 20px rgba(255,140,100,0.25);
            background: rgba(25, 15, 40, 0.95);
        }

        .char-avatar {
            font-size: 4rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .char-name {
            color: #ffdfc4;
            font-size: 1.3rem;
            margin: 8px 0 4px;
        }

        .char-desc {
            color: #cbbaa6;
            font-size: 0.75rem;
            margin-bottom: 12px;
        }

        .affection-bar {
            height: 8px;
            background: #2a1525;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .affection-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff88aa, #ff5577);
            width: 0%;
            transition: width 0.3s;
        }

        .affection-text {
            color: #ffccaa;
            font-size: 0.7rem;
        }

        /* Inventory */
        .inventory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .inv-item {
            background: #1a1025;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            border-left: 3px solid #ffaa88;
            color: #f0ddc8;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* Story Box */
        .story-box {
            background: rgba(5, 3, 15, 0.92);
            border-radius: 24px;
            padding: 28px;
            margin: 20px 0;
            border-left: 8px solid #ff7799;
            font-size: 1rem;
            line-height: 1.65;
            min-height: 180px;
            color: #f5e6d5;
        }

        /* Puzzle Area */
        .puzzle-area {
            background: rgba(15, 8, 28, 0.94);
            border-radius: 24px;
            padding: 26px;
            margin: 20px 0;
        }

        .puzzle-title {
            color: #ffdbb5;
            font-size: 1.2rem;
            margin-bottom: 12px;
        }

        .puzzle-question {
            color: #ffe0c0;
            font-size: 1.05rem;
            margin: 16px 0;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
        }

        .puzzle-options {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin: 18px 0;
            align-items: center;
        }

        .puzzle-input {
            background: #1e1528;
            border: 1px solid #aa7766;
            padding: 12px 18px;
            border-radius: 60px;
            color: #fff0e0;
            font-size: 1rem;
            min-width: 200px;
            flex: 1;
        }

        .puzzle-input:focus {
            outline: none;
            border-color: #ffaa88;
        }

        .puzzle-btn {
            background: #2a1a30;
            border: 1px solid #c98866;
            padding: 10px 22px;
            border-radius: 60px;
            color: #ffeedd;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .puzzle-btn:hover {
            background: #9a5577;
            border-color: #ffccaa;
            color: white;
        }

        /* Bottom Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 24px;
            padding: 16px;
            background: rgba(0,0,0,0.65);
            border-radius: 24px;
        }

        .stat-tag {
            background: rgba(20, 10, 30, 0.9);
            padding: 8px 18px;
            border-radius: 40px;
            color: #ffe0cc;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .stat-value {
            color: #ffbb99;
        }

        /* Headings */
        h2, h3 {
            color: #ffdfc0;
            margin-bottom: 16px;
        }

        .section-title {
            color: #ffd8b0;
            font-size: 1.5rem;
            border-left: 4px solid #ff7799;
            padding-left: 16px;
            margin-bottom: 24px;
        }

        /* Back button */
        .back-btn {
            background: rgba(30,20,40,0.9);
            border: 1px solid #aa7766;
            padding: 10px 28px;
            border-radius: 60px;
            color: #ffefdf;
            cursor: pointer;
            margin-top: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            background: #5a3a5a;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-title { font-size: 2rem; }
            .char-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .menu-btn { padding: 8px 16px; font-size: 0.8rem; }
            .puzzle-input { min-width: 140px; }
        }
    </style>
</head>
<body>
<div id="app" class="game-app"></div>

<script>
    // ======================== SAVE SYSTEM & GLOBAL STATE ========================
    let gameState = {
        screen: 'mainmenu',
        level: 1,
        chapter: 1,
        exp: 0,
        rank: 'E',
        hp: 100,
        maxHp: 100,
        stamina: 100,
        maxStamina: 100,
        lastRegen: Date.now(),
        affection: { Haruno: 15, Katsumi: 15, Juun: 15, Touya: 15 },
        inventory: [
            { id: 'potion_start', name: '🌿 Potion +30 HP', type: 'consumable', value: 30, rarity: 'common' },
            { id: 'bread_start', name: '🍞 Stamina Bread +20', type: 'stamina', value: 20, rarity: 'common' }
        ],
        storySeed: null,
        currentStory: null,
        dailyLogin: { last: null, streak: 0, claimed: [] },
        shopRefresh: Date.now(),
        completedEndings: [],
        currentRoute: null,
        puzzleProgress: 0,
        puzzlesThisLevel: 5,
        currentPuzzle: null,
        hintUsed: 0
    };

    // =============== RANDOM STORY GENERATOR ===============
    const locations = [
        '🏚️ Sekolah Terbengkalai', '🏥 Rumah Sakit Jiwa', '⛩️ Kuil Bawah Tanah', '🌫️ Desa Berkabut',
        '🏰 Mansion Bangsawan', '🚂 Kereta Hantu', '🏨 Hotel Tua', '📚 Perpustakaan Terkutuk',
        '🎡 Taman Hiburan Mati', '🔬 Laboratorium Rahasia'
    ];
    const curses = ['💀 Kutukan Lupa', '🌑 Kutukan Bayangan', '🩸 Kutukan Merah', '😭 Kutukan Tangisan', '🪞 Kutukan Cermin'];
    const mysteries = ['👥 Kakak Kembar', '🎎 Boneka Hidup', '💍 Pengantin Darah', '👻 Arwah Penasaran', '🕵️ Detektif Gelap'];
    
    function generateRandomStory() {
        const seed = Math.random().toString(36);
        const location = locations[Math.floor(Math.random() * locations.length)];
        const curse = curses[Math.floor(Math.random() * curses.length)];
        const mystery = mysteries[Math.floor(Math.random() * mysteries.length)];
        return { 
            seed, location, curse, mystery, 
            prologue: `【 Bab ${gameState.chapter} 】\nKamu terbangun di ${location}. ${curse} menyelimuti jiwa-jiwa yang terperangkap. ${mystery} muncul dari kegelapan, membawa teka-teki maut. Bersama 4 arwah pelindung — Haruno, Katsumi, Juun, Touya — pecahkan misteri atau jiwamu akan tersesat selamanya.` 
        };
    }

    // =============== PUZZLE GENERATOR ===============
    function generatePuzzle(level) {
        const difficulty = level <= 5 ? 'easy' : level <= 10 ? 'normal' : level <= 15 ? 'hard' : 'nightmare';
        const puzzleBank = [
            { type: 'logic', q: 'A + B = 12, A - B = 4, berapa nilai A?', a: '8', hint: 'Coba jumlahkan kedua persamaan' },
            { type: 'riddle', q: 'Aku punya kunci tapi tak bisa membuka pintu. Apakah aku?', a: 'piano', hint: 'Alat musik dengan tuts hitam putih' },
            { type: 'number', q: 'Hasil dari 18 x 7 adalah?', a: '126', hint: '18 x 7 = (20-2) x 7' },
            { type: 'pattern', q: '3, 8, 15, 24, ?', a: '35', hint: 'Pola +5, +7, +9, maka +11' },
            { type: 'japanese', q: 'Dalam mitologi Jepang, berapa jumlah ekor rubah berekor sembilan?', a: '9', hint: 'Namanya Kyuubi no Kitsune' },
            { type: 'horror', q: 'Benda apa yang menghentikan waktu di ruang ritual?', a: 'jam', hint: 'Benda yang berdetak' }
        ];
        let base = puzzleBank[Math.floor(Math.random() * puzzleBank.length)];
        if (difficulty === 'hard') {
            base = { ...base, q: `[HARD] ${base.q}`, hint: `${base.hint} (level sulit, konsentrasi penuh!)` };
        } else if (difficulty === 'nightmare') {
            base = { ...base, q: `💀[NIGHTMARE]💀 ${base.q}`, hint: `⚠️ Petunjuk terbatas: ${base.hint.substring(0, 30)}...` };
        }
        return base;
    }

    // =============== SAVE / LOAD ===============
    function saveGame() {
        gameState.lastRegen = Date.now();
        localStorage.setItem('yureiKakuSave', JSON.stringify(gameState));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('yureiKakuSave');
        if (saved) {
            try {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded, inventory: loaded.inventory || gameState.inventory };
                const now = Date.now();
                const diff = now - (gameState.lastRegen || now);
                const regenHp = Math.floor(diff / 60000) * 2;
                const regenStam = Math.floor(diff / 90000) * 2;
                gameState.hp = Math.min(gameState.maxHp, (gameState.hp || 100) + regenHp);
                gameState.stamina = Math.min(gameState.maxStamina, (gameState.stamina || 100) + regenStam);
                gameState.lastRegen = now;
                return true;
            } catch(e) { return false; }
        }
        return false;
    }

    // =============== DAILY REWARD ===============
    function checkDailyReward() {
        const today = new Date().toDateString();
        if (gameState.dailyLogin.last !== today) {
            gameState.dailyLogin.last = today;
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const isConsecutive = gameState.dailyLogin.last === yesterday.toDateString();
            gameState.dailyLogin.streak = isConsecutive ? gameState.dailyLogin.streak + 1 : 1;
            const rewards = ['🌿 Potion +30 HP', '🍞 Stamina Bread', '🪙 Ancient Coin', '🔑 Mystery Key'];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            gameState.inventory.push({ 
                id: `daily_${Date.now()}`, 
                name: reward, 
                type: reward.includes('Potion') ? 'consumable' : (reward.includes('Bread') ? 'stamina' : 'rare'), 
                value: reward.includes('Potion') ? 30 : (reward.includes('Bread') ? 20 : 1) 
            });
            alert(`🎁 Daily Reward! Streak ${gameState.dailyLogin.streak} hari\n✨ Mendapatkan: ${reward}`);
            saveGame();
            return true;
        }
        return false;
    }

    // =============== AFFECTION ===============
    function changeAffection(char, amount) {
        gameState.affection[char] = Math.min(100, Math.max(0, gameState.affection[char] + amount));
        saveGame();
        render();
    }

    // =============== USE ITEM ===============
    function useItem(item) {
        if (item.type === 'consumable') {
            gameState.hp = Math.min(gameState.maxHp, gameState.hp + (item.value || 30));
            gameState.inventory = gameState.inventory.filter(i => i.id !== item.id);
            alert(`💚 Menggunakan ${item.name}. HP sekarang ${gameState.hp}/${gameState.maxHp}`);
        } else if (item.type === 'stamina') {
            gameState.stamina = Math.min(gameState.maxStamina, gameState.stamina + (item.value || 20));
            gameState.inventory = gameState.inventory.filter(i => i.id !== item.id);
            alert(`⚡ Menggunakan ${item.name}. Stamina sekarang ${gameState.stamina}/${gameState.maxStamina}`);
        }
        saveGame();
        render();
    }

    // =============== PUZZLE HANDLER ===============
    function checkPuzzleAnswer(answer) {
        const puzzle = gameState.currentPuzzle;
        if (!puzzle) return;
        
        if (answer.toLowerCase().trim() === puzzle.a.toLowerCase()) {
            gameState.puzzleProgress++;
            const expGain = 15 + Math.floor(gameState.level * 1.5);
            gameState.exp += expGain;
            
            if (gameState.exp >= 100) {
                gameState.level++;
                gameState.exp -= 100;
                gameState.maxHp += 12;
                gameState.maxStamina += 10;
                gameState.hp = gameState.maxHp;
                gameState.stamina = gameState.maxStamina;
                alert(`✨🎉 LEVEL UP! Sekarang Level ${gameState.level} 🎉✨\nHP & Stamina penuh!`);
            }
            
            if (gameState.puzzleProgress >= gameState.puzzlesThisLevel) {
                gameState.chapter++;
                gameState.puzzleProgress = 0;
                gameState.puzzlesThisLevel = Math.min(18, 5 + Math.floor(gameState.level / 2.5));
                alert(`📖 Bab ${gameState.chapter} selesai! Cerita berlanjut...`);
                gameState.currentStory = generateRandomStory();
                generateRandomEvent();
            } else {
                gameState.currentPuzzle = generatePuzzle(gameState.level);
                alert(`✅ Jawaban benar! +${expGain} EXP\nTersisa ${gameState.puzzlesThisLevel - gameState.puzzleProgress} teka-teki lagi.`);
            }
        } else {
            const damage = Math.max(5, 12 - Math.floor(gameState.level / 6));
            gameState.hp = Math.max(0, gameState.hp - damage);
            alert(`❌ Jawaban salah! ${damage} damage.\n💔 HP: ${gameState.hp}/${gameState.maxHp}`);
            if (gameState.hp <= 0) {
                alert('💀💀💀 GAME OVER 💀💀💀\nTekan New Game untuk memulai petualangan baru.');
                gameState.screen = 'mainmenu';
            }
        }
        saveGame();
        render();
    }

    // =============== RANDOM EVENT ===============
    function generateRandomEvent() {
        const events = [
            { text: '🌸 Haruno menemukan ramuan kuno. +20 HP', effect: () => { gameState.hp = Math.min(gameState.maxHp, gameState.hp + 20); } },
            { text: '🔥 Touya melindungimu dari serangan hantu. +5 Affection Touya', effect: () => { changeAffection('Touya', 5); } },
            { text: '🌙 Badai kutukan melanda! -8 Stamina semua', effect: () => { gameState.stamina = Math.max(0, gameState.stamina - 8); } },
            { text: '📖 Katsumi memecahkan kode kuno. +1 puzzle progress', effect: () => { gameState.puzzleProgress = Math.min(gameState.puzzlesThisLevel, gameState.puzzleProgress + 1); } },
            { text: '🌀 Juun menemukan item langka di sudut gelap.', effect: () => { gameState.inventory.push({ id: 'event_item_'+Date.now(), name: '🕯️ Lilin Hitam', type: 'rare', value: 0 }); } }
        ];
        const ev = events[Math.floor(Math.random() * events.length)];
        alert(`✨✨ EVENT ✨✨\n${ev.text}`);
        ev.effect();
        saveGame();
    }
    
    function requestHint() {
        if (gameState.stamina >= 6) {
            gameState.stamina -= 6;
            gameState.hintUsed = (gameState.hintUsed || 0) + 1;
            const hint = gameState.currentPuzzle?.hint || "Pikirkan tentang simbol-simbol di sekitar...";
            alert(`🔍 PETUNJUK #${gameState.hintUsed}\n${hint}\n\n-6 Stamina (sisa: ${gameState.stamina})`);
            saveGame();
            render();
        } else {
            alert(`⚠️ Stamina tidak cukup! Butuh 6 stamina.\nIstirahat atau gunakan item stamina dari inventori.`);
        }
    }

    // =============== RENDER UI ===============
    function render() {
        const app = document.getElementById('app');
        if (!app) return;
        
        // Main Menu
        if (gameState.screen === 'mainmenu') {
            app.innerHTML = `
                <div class="main-menu glass-panel">
                    <h1 class="game-title">YUREI KAKU</h1>
                    <div class="game-subtitle">Otome Horror Puzzle RPG</div>
                    <div class="menu-buttons">
                        <button class="menu-btn" onclick="startNewGame()">✨ New Game</button>
                        <button class="menu-btn" onclick="continueGame()">📖 Continue</button>
                        <button class="menu-btn" onclick="showCharacters()">👥 Characters</button>
                        <button class="menu-btn" onclick="showInventory()">🎒 Inventory</button>
                        <button class="menu-btn" onclick="showShop()">🏪 Shop</button>
                        <button class="menu-btn" onclick="checkDailyReward()">🎁 Daily</button>
                    </div>
                    <div style="margin-top: 30px; font-size:0.7rem; color:#aa9988;">✦ Dark Fantasy Visual Novel · Random Story · Multiple Endings ✦</div>
                </div>
            `;
        } 
        // Main Game Screen
        else if (gameState.screen === 'game') {
            if (!gameState.currentStory) gameState.currentStory = generateRandomStory();
            if (!gameState.currentPuzzle) gameState.currentPuzzle = generatePuzzle(gameState.level);
            const story = gameState.currentStory;
            const puzzle = gameState.currentPuzzle;
            
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
                        <span class="stat-tag">🎮 Level ${gameState.level} · Bab ${gameState.chapter} · Rank ${gameState.rank}</span>
                        <span class="stat-tag">❤️ HP: <span class="stat-value">${gameState.hp}/${gameState.maxHp}</span> &nbsp; ⚡ Stamina: <span class="stat-value">${gameState.stamina}/${gameState.maxStamina}</span></span>
                        <span class="stat-tag">📊 EXP: ${gameState.exp}/100</span>
                    </div>
                    
                    <div class="story-box">
                        ${story.prologue}
                    </div>
                    
                    <div class="puzzle-area">
                        <div class="puzzle-title">🧩 TEKA-TEKI LEVEL ${gameState.level} (${gameState.puzzleProgress+1}/${gameState.puzzlesThisLevel})</div>
                        <div class="puzzle-question">「 ${puzzle.q} 」</div>
                        <div class="puzzle-options">
                            <input type="text" id="puzzleAnswer" class="puzzle-input" placeholder="Ketik jawaban di sini..." autocomplete="off">
                            <button class="puzzle-btn" onclick="submitAnswer()">✨ Jawab</button>
                            <button class="puzzle-btn" onclick="requestHint()">🔍 Petunjuk (-6 Stamina)</button>
                        </div>
                    </div>
                    
                    <div class="status-bar">
                        ${Object.entries(gameState.affection).map(([name, val]) => `<div class="stat-tag">💕 ${name}: ${val}</div>`).join('')}
                        <button class="puzzle-btn" onclick="openInventoryInGame()">🎒 Inventori</button>
                        <button class="puzzle-btn" onclick="gameState.screen='mainmenu'; render()">🏠 Menu Utama</button>
                    </div>
                </div>
            `;
        }
        // Characters Screen
        else if (gameState.screen === 'characters') {
            const charData = {
                Haruno: { emoji: '❄️', desc: 'Pendiam, misterius, pelindung setia. Suka senja, takut keramaian. Memiliki masa lalu kelam yang tak pernah diceritakan.', color: '#88aaff' },
                Katsumi: { emoji: '🌊', desc: 'Cerdas, lembut, ahli memecahkan teka-teki. Suka membaca buku kuno, takut ketinggian. Selalu menjadi penengah.', color: '#66ddcc' },
                Juun: { emoji: '🌀', desc: 'Ceria dengan dark humor, suka menguji orang lain. Suka malam hari, takut pada cermin retak. Bisa berubah serius saat krisis.', color: '#cc88ff' },
                Touya: { emoji: '🔥', desc: 'Tsundere pemberani, sangat protektif. Suka api dan senja, takut kehilangan orang terdekat. Akan melakukan apa saja demi melindungi.', color: '#ff8866' }
            };
            
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <div class="section-title">👥 Para Arwah Penjaga</div>
                    <div class="char-grid">
                        ${Object.entries(charData).map(([name, data]) => `
                            <div class="char-card">
                                <div class="char-avatar">${data.emoji}</div>
                                <div class="char-name">${name}</div>
                                <div class="char-desc">${data.desc}</div>
                                <div class="affection-bar"><div class="affection-fill" style="width:${gameState.affection[name]}%"></div></div>
                                <div class="affection-text">💖 Affection: ${gameState.affection[name]} / 100</div>
                                <div style="margin-top: 14px; display: flex; gap: 8px; justify-content: center;">
                                    <button class="puzzle-btn" onclick="changeAffection('${name}', 5)">💝 +5</button>
                                    <button class="puzzle-btn" onclick="changeAffection('${name}', -3)">💔 -3</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div style="text-align: center;">
                        <button class="back-btn" onclick="gameState.screen='mainmenu'; render()">← Kembali ke Menu</button>
                    </div>
                </div>
            `;
        }
        // Inventory Screen
        else if (gameState.screen === 'inventory') {
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <div class="section-title">🎒 Inventori Permanen</div>
                    <div class="inventory-grid">
                        ${gameState.inventory.map(item => `
                            <div class="inv-item">
                                ${item.name}
                                ${(item.type === 'consumable' || item.type === 'stamina') ? `<button class="puzzle-btn" style="margin-left:8px; padding:4px 12px;" onclick='useItem(${JSON.stringify(item)})'>Gunakan</button>` : ''}
                            </div>
                        `).join('')}
                        ${gameState.inventory.length === 0 ? '<div style="color:#aa9988; padding:20px;">✨ Inventori kosong. Jawab teka-teki untuk mendapatkan item! ✨</div>' : ''}
                    </div>
                    <div style="text-align: center;">
                        <button class="back-btn" onclick="gameState.screen='mainmenu'; render()">← Kembali ke Menu</button>
                    </div>
                </div>
            `;
        }
        // Shop Screen
        else if (gameState.screen === 'shop') {
            const shopItems = [
                { id: 'shop_potion', name: '🌿 Potion +30 HP', price: 1, type: 'consumable', value: 30, desc: 'Memulihkan 30 HP' },
                { id: 'shop_bread', name: '🍞 Stamina Bread +20', price: 1, type: 'stamina', value: 20, desc: 'Memulihkan 20 Stamina' },
                { id: 'shop_charm', name: '🪬 Jimat Suci', price: 2, type: 'rare', value: 0, desc: 'Barang langka, mungkin berguna nanti' }
            ];
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <div class="section-title">🏪 Toko Misterius</div>
                    <p style="color:#ccbbaa; margin-bottom: 20px;">▸ Tukar Ancient Coin / item langka dengan barang berikut ◂</p>
                    <div class="inventory-grid">
                        ${shopItems.map(item => `
                            <div class="inv-item">
                                <div>
                                    <strong>${item.name}</strong><br>
                                    <span style="font-size:0.7rem;">${item.desc}</span>
                                </div>
                                <button class="puzzle-btn" onclick="buyShopItem('${item.id}')">Beli (${item.price} 🪙)</button>
                            </div>
                        `).join('')}
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="back-btn" onclick="gameState.screen='mainmenu'; render()">← Kembali ke Menu</button>
                    </div>
                </div>
            `;
        }
    }
    
    // =============== FUNGSI GLOBAL ===============
    window.startNewGame = () => {
        gameState = {
            ...gameState,
            screen: 'game',
            level: 1,
            chapter: 1,
            exp: 0,
            rank: 'E',
            hp: 100,
            maxHp: 100,
            stamina: 100,
            maxStamina: 100,
            affection: { Haruno: 15, Katsumi: 15, Juun: 15, Touya: 15 },
            inventory: [
                { id: 'potion_start_'+Date.now(), name: '🌿 Potion +30 HP', type: 'consumable', value: 30, rarity: 'common' },
                { id: 'bread_start_'+Date.now(), name: '🍞 Stamina Bread +20', type: 'stamina', value: 20, rarity: 'common' }
            ],
            puzzleProgress: 0,
            puzzlesThisLevel: 5,
            currentStory: generateRandomStory(),
            currentPuzzle: generatePuzzle(1),
            hintUsed: 0,
            lastRegen: Date.now()
        };
        saveGame();
        render();
    };
    
    window.continueGame = () => { 
        if(loadGame()) { 
            gameState.screen = 'game'; 
            if (!gameState.currentPuzzle) gameState.currentPuzzle = generatePuzzle(gameState.level || 1);
            if (!gameState.currentStory) gameState.currentStory = generateRandomStory();
            render(); 
        } else { 
            alert('❌ Tidak ada data save yang ditemukan.\nMulai game baru terlebih dahulu.'); 
        } 
    };
    
    window.showCharacters = () => { gameState.screen = 'characters'; render(); };
    window.showInventory = () => { gameState.screen = 'inventory'; render(); };
    window.showShop = () => { gameState.screen = 'shop'; render(); };
    window.submitAnswer = () => {
        const input = document.getElementById('puzzleAnswer');
        if(input && gameState.currentPuzzle) checkPuzzleAnswer(input.value);
        const inp = document.getElementById('puzzleAnswer');
        if(inp) inp.value = '';
    };
    window.requestHint = requestHint;
    window.openInventoryInGame = () => { gameState.screen = 'inventory'; render(); };
    window.buyShopItem = (id) => {
        const hasCoin = gameState.inventory.some(i => i.name.includes('🪙') || i.name.includes('Coin') || i.name.includes('Ancient'));
        if(hasCoin) {
            const coinIndex = gameState.inventory.findIndex(i => i.name.includes('🪙') || i.name.includes('Coin'));
            if(coinIndex !== -1) gameState.inventory.splice(coinIndex, 1);
            if (id === 'shop_potion') gameState.inventory.push({ id: 'potion_'+Date.now(), name: '🌿 Potion +30 HP', type: 'consumable', value: 30 });
            else if (id === 'shop_bread') gameState.inventory.push({ id: 'bread_'+Date.now(), name: '🍞 Stamina Bread +20', type: 'stamina', value: 20 });
            else gameState.inventory.push({ id: 'charm_'+Date.now(), name: '🪬 Jimat Suci', type: 'rare', value: 0 });
            alert('✅ Item berhasil dibeli!');
            saveGame();
            render();
        } else {
            alert('❌ Tidak punya Ancient Coin! Dapatkan dari Daily Reward atau event.');
        }
    };
    window.changeAffection = changeAffection;
    window.useItem = useItem;
    window.checkDailyReward = checkDailyReward;

    // Animasi partikel
    function createParticles() {
        for(let i = 0; i < 35; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 4 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 15 + 8 + 's';
            particle.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(particle);
        }
    }
    createParticles();
    
    // Inisialisasi
    loadGame();
    render();
</script>
</body>
</html>
