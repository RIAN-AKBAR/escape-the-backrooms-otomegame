<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Otome Horror Puzzle RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            background: rgba(255,200,150,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* Main Container */
        .game-app {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
            position: relative;
            z-index: 2;
        }

        /* Glassmorphism UI */
        .glass-panel {
            background: rgba(15, 10, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 200, 150, 0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* Main Menu */
        .main-menu {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 24px;
            text-align: center;
        }

        .game-title {
            font-size: 3.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffb88c, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(255,100,100,0.5);
            letter-spacing: 4px;
        }

        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .menu-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid #ffb88c;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffdfc4;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .menu-btn:hover {
            background: #ff6b9d;
            border-color: white;
            transform: scale(1.05);
            box-shadow: 0 0 15px #ff6b9d;
        }

        /* Character Grid */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .char-card {
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #664455;
        }

        .char-card:hover {
            transform: translateY(-5px);
            border-color: #ffaa88;
            box-shadow: 0 0 20px rgba(255,140,100,0.3);
        }

        .char-avatar {
            font-size: 4rem;
        }

        .affection-bar {
            height: 8px;
            background: #331122;
            border-radius: 10px;
            margin: 8px 0;
            overflow: hidden;
        }

        .affection-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff88aa, #ff4466);
            width: 0%;
            transition: width 0.3s;
        }

        /* Inventory */
        .inventory-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0;
        }

        .inv-item {
            background: #1a0f1a;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            border-left: 3px solid #ffaa77;
        }

        /* Story Box */
        .story-box {
            background: rgba(0,0,0,0.85);
            border-radius: 24px;
            padding: 24px;
            margin: 20px 0;
            border-left: 8px solid #ff6b9d;
            font-size: 1rem;
            line-height: 1.6;
            min-height: 180px;
        }

        /* Puzzle Area */
        .puzzle-area {
            background: rgba(20, 10, 30, 0.9);
            border-radius: 24px;
            padding: 24px;
            margin: 20px 0;
        }

        .puzzle-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
        }

        .puzzle-btn {
            background: #2a1a2a;
            border: 1px solid #aa7766;
            padding: 10px 20px;
            border-radius: 40px;
            color: #ffddcc;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Bottom Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            padding: 12px;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
        }

        .stat {
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 30px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .game-title { font-size: 2rem; }
            .char-grid { grid-template-columns: repeat(2, 1fr); }
            .menu-btn { padding: 8px 16px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div id="app" class="game-app"></div>

<script>
    // ======================== SAVE SYSTEM & GLOBAL STATE ========================
    let gameState = {
        screen: 'mainmenu',
        level: 1,
        chapter: 1,
        exp: 0,
        rank: 'E',
        hp: 100,
        maxHp: 100,
        stamina: 100,
        maxStamina: 100,
        lastRegen: Date.now(),
        affection: { Haruno: 0, Katsumi: 30, Juun: 20, Touya: 15 },
        inventory: [
            { id: 'potion', name: 'Potion +30 HP', type: 'consumable', value: 30, rarity: 'common' },
            { id: 'bread', name: 'Stamina Bread +20', type: 'stamina', value: 20, rarity: 'common' }
        ],
        storySeed: null,
        currentEvent: null,
        dailyLogin: { last: null, streak: 0, claimed: [] },
        shopRefresh: Date.now(),
        completedEndings: [],
        currentRoute: null,
        puzzleProgress: 0,
        puzzlesThisLevel: 5,
        currentPuzzle: null
    };

    // =============== RANDOM STORY GENERATOR ===============
    const locations = [
        'Sekolah Terbengkalai', 'Rumah Sakit Jiwa', 'Kuil Bawah Tanah', 'Desa Berkabut',
        'Mansion Bangsawan', 'Kereta Hantu', 'Hotel Tua', 'Perpustakaan Terkutuk',
        'Taman Hiburan Mati', 'Laboratorium Rahasia'
    ];
    const curses = ['Kutukan Lupa', 'Kutukan Bayangan', 'Kutukan Merah', 'Kutukan Tangisan', 'Kutukan Cermin'];
    const mysteries = ['Kakak Kembar', 'Boneka Hidup', 'Pengantin Darah', 'Arwah Penasaran', 'Detektif Gelap'];
    const endings = ['Bad Ending', 'Normal Ending', 'Secret Ending', 'True Ending', 'Romance Ending'];

    function generateRandomStory() {
        const seed = Math.random().toString(36);
        const location = locations[Math.floor(Math.random() * locations.length)];
        const curse = curses[Math.floor(Math.random() * curses.length)];
        const mystery = mysteries[Math.floor(Math.random() * mysteries.length)];
        return { seed, location, curse, mystery, prologue: `Kamu terbangun di ${location}. ${curse} menyelimuti jiwa-jiwa. ${mystery} muncul membawa teka-teki maut. Bersama 4 arwah pelindung, pecahkan misteri atau jiwamu tersesat.` };
    }

    // =============== PUZZLE GENERATOR (RANDOM & SCALING) ===============
    function generatePuzzle(level) {
        const difficulty = level <= 5 ? 'easy' : level <= 10 ? 'normal' : level <= 20 ? 'hard' : 'nightmare';
        const puzzleTypes = [
            { type: 'logic', q: 'A + B = 10, A - B = 4, berapa A?', a: '7' },
            { type: 'riddle', q: 'Aku punya kunci tapi tak bisa membuka pintu. Apakah aku?', a: 'piano' },
            { type: 'number', q: 'Berapa hasil 15 x 6?', a: '90' },
            { type: 'pattern', q: '2, 6, 12, 20, ?', a: '30' },
            { type: 'japanese', q: 'Dalam mitologi Jepang, berapa ekor rubah ekor sembilan?', a: '9' },
            { type: 'horror', q: 'Benda yang menghentikan waktu di ruang ritual?', a: 'jam' }
        ];
        const base = puzzleTypes[Math.floor(Math.random() * puzzleTypes.length)];
        if (difficulty === 'hard' || difficulty === 'nightmare') {
            return { ...base, question: `[${difficulty.toUpperCase()}] ${base.q}`, answer: base.a, hint: `Petunjuk: ${base.type === 'logic' ? 'Coba eliminasi' : 'Pikirkan metafora'}` };
        }
        return base;
    }

    // =============== SAVE / LOAD ===============
    function saveGame() {
        gameState.lastRegen = Date.now();
        localStorage.setItem('yureiKakuSave', JSON.stringify(gameState));
    }
    function loadGame() {
        const saved = localStorage.getItem('yureiKakuSave');
        if (saved) {
            const loaded = JSON.parse(saved);
            gameState = { ...gameState, ...loaded, inventory: loaded.inventory || gameState.inventory };
            const now = Date.now();
            const diff = now - gameState.lastRegen;
            const regenHp = Math.floor(diff / 60000) * 2; // 2 HP per menit
            const regenStam = Math.floor(diff / 90000) * 2; // 2 stam per 1.5 menit
            gameState.hp = Math.min(gameState.maxHp, gameState.hp + regenHp);
            gameState.stamina = Math.min(gameState.maxStamina, gameState.stamina + regenStam);
            gameState.lastRegen = now;
            return true;
        }
        return false;
    }

    // =============== DAILY REWARD ===============
    function checkDailyReward() {
        const today = new Date().toDateString();
        if (gameState.dailyLogin.last !== today) {
            gameState.dailyLogin.last = today;
            const streak = (today === new Date(new Date().setDate(new Date().getDate()-1)).toDateString()) ? gameState.dailyLogin.streak + 1 : 1;
            gameState.dailyLogin.streak = streak;
            const rewards = ['Potion +30 HP', 'Stamina Bread', 'Ancient Coin', 'Mystery Key'];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            gameState.inventory.push({ id: reward.toLowerCase().replace(/ /g,'_'), name: reward, type: 'reward', value: 1 });
            alert(`🎁 Daily Reward! Streak ${streak} hari - Mendapatkan: ${reward}`);
            saveGame();
        }
    }

    // =============== AFFECTION ACTIONS ===============
    function changeAffection(char, amount) {
        gameState.affection[char] = Math.min(100, Math.max(0, gameState.affection[char] + amount));
        saveGame();
        render();
    }

    // =============== USE ITEM ===============
    function useItem(item) {
        if (item.type === 'consumable') {
            gameState.hp = Math.min(gameState.maxHp, gameState.hp + item.value);
            gameState.inventory = gameState.inventory.filter(i => i.id !== item.id);
        } else if (item.type === 'stamina') {
            gameState.stamina = Math.min(gameState.maxStamina, gameState.stamina + item.value);
            gameState.inventory = gameState.inventory.filter(i => i.id !== item.id);
        }
        saveGame();
        render();
    }

    // =============== PUZZLE HANDLER ===============
    function checkPuzzleAnswer(answer) {
        const puzzle = gameState.currentPuzzle;
        if (answer.toLowerCase() === puzzle.answer.toLowerCase()) {
            gameState.puzzleProgress++;
            gameState.exp += 20 * gameState.level;
            if (gameState.exp >= 100) {
                gameState.level++;
                gameState.exp = 0;
                gameState.maxHp += 10;
                gameState.maxStamina += 10;
                gameState.hp = gameState.maxHp;
                gameState.stamina = gameState.maxStamina;
                alert(`✨ LEVEL UP! Sekarang level ${gameState.level} ✨`);
            }
            if (gameState.puzzleProgress >= gameState.puzzlesThisLevel) {
                gameState.chapter++;
                gameState.puzzleProgress = 0;
                gameState.puzzlesThisLevel = Math.min(20, 5 + Math.floor(gameState.level / 3));
                alert(`📖 Bab ${gameState.chapter} selesai! Melanjutkan cerita...`);
                generateRandomEvent();
            } else {
                gameState.currentPuzzle = generatePuzzle(gameState.level);
                alert('✅ Jawaban benar! Lanjut ke teka-teki berikutnya.');
            }
        } else {
            const damage = Math.max(5, 12 - Math.floor(gameState.level / 5));
            gameState.hp = Math.max(0, gameState.hp - damage);
            alert(`❌ Salah! ${damage} damage. HP: ${gameState.hp}/${gameState.maxHp}`);
            if (gameState.hp <= 0) {
                alert('💀 GAME OVER 💀 Tekan New Game untuk memulai ulang.');
                gameState.screen = 'mainmenu';
            }
        }
        saveGame();
        render();
    }

    // =============== RANDOM EVENT ===============
    function generateRandomEvent() {
        const events = [
            { text: 'Haruno menemukan botol darah. +15 HP tim', effect: () => { gameState.hp = Math.min(gameState.maxHp, gameState.hp + 15); } },
            { text: 'Touya melindungimu dari hantu. +5 Affection Touya', effect: () => { changeAffection('Touya', 5); } },
            { text: 'Badai kutukan! Semua kehilangan 10 stamina.', effect: () => { gameState.stamina = Math.max(0, gameState.stamina - 10); } },
            { text: 'Katsumi memecahkan teka-teki dengan brilian. +2 puzzle progress', effect: () => { gameState.puzzleProgress = Math.min(gameState.puzzlesThisLevel, gameState.puzzleProgress + 2); } }
        ];
        const ev = events[Math.floor(Math.random() * events.length)];
        alert(`✨ EVENT: ${ev.text}`);
        ev.effect();
        saveGame();
    }

    // =============== RENDER UI ===============
    function render() {
        const app = document.getElementById('app');
        if (gameState.screen === 'mainmenu') {
            app.innerHTML = `
                <div class="main-menu glass-panel" style="padding: 48px;">
                    <h1 class="game-title">YUREI KAKU</h1>
                    <p style="color:#ccb9a6; margin-bottom: 20px;">Otome Horror Puzzle RPG</p>
                    <div class="menu-buttons">
                        <div class="menu-btn" onclick="startNewGame()">✨ New Game</div>
                        <div class="menu-btn" onclick="continueGame()">📖 Continue</div>
                        <div class="menu-btn" onclick="showCharacters()">👥 Characters</div>
                        <div class="menu-btn" onclick="showInventory()">🎒 Inventory</div>
                        <div class="menu-btn" onclick="showShop()">🏪 Shop</div>
                        <div class="menu-btn" onclick="checkDailyReward()">🎁 Daily</div>
                    </div>
                    <div style="margin-top: 40px; font-size:0.7rem; color:#887766;">Dark Fantasy Visual Novel · Random Story · Multiple Endings</div>
                </div>
            `;
        } 
        else if (gameState.screen === 'game') {
            const story = gameState.currentStory || generateRandomStory();
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <div style="display: flex; justify-content: space-between; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
                        <span>🔮 Level ${gameState.level} · Bab ${gameState.chapter} · Rank ${gameState.rank}</span>
                        <span>❤️ ${gameState.hp}/${gameState.maxHp} HP &nbsp; ⚡ ${gameState.stamina}/${gameState.maxStamina} Stamina</span>
                        <span>📊 Exp ${gameState.exp}/100</span>
                    </div>
                    <div class="story-box">
                        📖 ${story.prologue}<br>
                        <small>📍 ${story.location} · ${story.curse}</small>
                    </div>
                    <div class="puzzle-area">
                        <h3>🧩 Teka-teki Level ${gameState.level} (${gameState.puzzleProgress+1}/${gameState.puzzlesThisLevel})</h3>
                        <p style="margin:16px 0"><strong>${gameState.currentPuzzle?.question || 'Memuat puzzle...'}</strong></p>
                        <div class="puzzle-options">
                            <input type="text" id="puzzleAnswer" placeholder="Ketik jawaban..." style="background:#221a2a; border:1px solid #aa7766; padding:10px; border-radius:40px; color:white;">
                            <button class="puzzle-btn" onclick="answerPuzzle()">Jawab</button>
                            <button class="puzzle-btn" onclick="requestHint()">🔍 Petunjuk (-5 Stamina)</button>
                        </div>
                    </div>
                    <div class="status-bar">
                        ${Object.entries(gameState.affection).map(([name, val]) => `<div class="stat">💕 ${name}: ${val}</div>`).join('')}
                        <button class="puzzle-btn" onclick="openInventoryInGame()">🎒 Inventori</button>
                        <button class="puzzle-btn" onclick="gameState.screen='mainmenu'; render()">🏠 Menu</button>
                    </div>
                </div>
            `;
        }
        else if (gameState.screen === 'characters') {
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <h2>👥 Karakter Yurei Kaku</h2>
                    <div class="char-grid">
                        ${Object.entries({
                            Haruno: { desc: 'Pendiam, misterius, pelindung. Suka senja, takut keramaian.', emoji: '❄️' },
                            Katsumi: { desc: 'Cerdas, lembut, ahli teka-teki. Suka buku, takut ketinggian.', emoji: '🌊' },
                            Juun: { desc: 'Ceria, dark humor, suka menguji. Suka malam, takut cermin.', emoji: '🌀' },
                            Touya: { desc: 'Tsundere, pemberani, protektif. Suka api, takut kehilangan.', emoji: '🔥' }
                        }).map(([name, data]) => `
                            <div class="char-card">
                                <div class="char-avatar">${data.emoji}</div>
                                <h3>${name}</h3>
                                <p style="font-size:0.8rem">${data.desc}</p>
                                <div class="affection-bar"><div class="affection-fill" style="width:${gameState.affection[name]}%"></div></div>
                                <small>Affection: ${gameState.affection[name]}</small>
                                <div style="margin-top:12px;"><button class="puzzle-btn" onclick="changeAffection('${name}', 5)">💖 +5</button></div>
                            </div>
                        `).join('')}
                    </div>
                    <button class="menu-btn" onclick="gameState.screen='mainmenu'; render()">Kembali</button>
                </div>
            `;
        }
        else if (gameState.screen === 'inventory') {
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <h2>🎒 Inventori Permanen</h2>
                    <div class="inventory-grid">
                        ${gameState.inventory.map(item => `
                            <div class="inv-item">
                                ${item.name}
                                ${item.type === 'consumable' || item.type === 'stamina' ? `<button class="puzzle-btn" style="margin-left:8px; padding:2px 8px;" onclick='useItem(${JSON.stringify(item)})'>Gunakan</button>` : ''}
                            </div>
                        `).join('')}
                        ${gameState.inventory.length === 0 ? '<i>Kosong. Jawab teka-teki untuk dapat item!</i>' : ''}
                    </div>
                    <button class="menu-btn" onclick="gameState.screen='mainmenu'; render()">Kembali</button>
                </div>
            `;
        }
        else if (gameState.screen === 'shop') {
            const shopItems = [
                { id: 'shop_potion', name: 'Potion +30 HP', price: 1, type: 'consumable', value: 30 },
                { id: 'shop_bread', name: 'Stamina Bread +20', price: 1, type: 'stamina', value: 20 },
                { id: 'shop_charm', name: 'Holy Charm (cursed item)', price: 2, type: 'rare', value: 0 }
            ];
            app.innerHTML = `
                <div class="glass-panel" style="padding: 24px;">
                    <h2>🏪 Toko Misterius</h2>
                    <p style="margin-bottom:20px;">Tukar Ancient Coin / barang aneh</p>
                    <div class="inventory-grid">
                        ${shopItems.map(item => `
                            <div class="inv-item">
                                ${item.name} - ${item.price} Coin
                                <button class="puzzle-btn" style="margin-left:8px;" onclick="buyShopItem('${item.id}')">Beli</button>
                            </div>
                        `).join('')}
                    </div>
                    <button class="menu-btn" onclick="gameState.screen='mainmenu'; render()">Kembali</button>
                </div>
            `;
        }
    }

    // =============== GLOBAL FUNCTIONS ===============
    window.startNewGame = () => {
        gameState = {
            ...gameState,
            screen: 'game',
            level: 1,
            chapter: 1,
            exp: 0,
            hp: 100,
            maxHp: 100,
            stamina: 100,
            maxStamina: 100,
            affection: { Haruno: 10, Katsumi: 10, Juun: 10, Touya: 10 },
            inventory: [{ id: 'potion', name: 'Potion +30 HP', type: 'consumable', value: 30, rarity: 'common' }],
            puzzleProgress: 0,
            puzzlesThisLevel: 5,
            currentStory: generateRandomStory(),
            currentPuzzle: generatePuzzle(1)
        };
        saveGame();
        render();
    };
    window.continueGame = () => { if(loadGame()) { gameState.screen = 'game'; render(); } else alert('No save data.'); };
    window.showCharacters = () => { gameState.screen = 'characters'; render(); };
    window.showInventory = () => { gameState.screen = 'inventory'; render(); };
    window.showShop = () => { gameState.screen = 'shop'; render(); };
    window.answerPuzzle = () => {
        const input = document.getElementById('puzzleAnswer');
        if(input && gameState.currentPuzzle) checkPuzzleAnswer(input.value);
    };
    window.requestHint = () => {
        if(gameState.stamina >= 5) {
            gameState.stamina -= 5;
            alert(`💡 PETUNJUK: ${gameState.currentPuzzle?.hint || 'Pikirkan lebih dalam...'}`);
            saveGame();
            render();
        } else alert('Stamina tidak cukup! Istirahat atau gunakan item stamina.');
    };
    window.openInventoryInGame = () => { gameState.screen = 'inventory'; render(); };
    window.buyShopItem = (id) => {
        const hasCoin = gameState.inventory.some(i => i.name.includes('Coin'));
        if(hasCoin) {
            gameState.inventory = gameState.inventory.filter(i => !i.name.includes('Coin'));
            gameState.inventory.push({ id, name: id === 'shop_potion' ? 'Potion +30 HP' : id === 'shop_bread' ? 'Stamina Bread +20' : 'Holy Charm', type: 'consumable', value: 30 });
            alert('Item dibeli!');
            saveGame();
            render();
        } else alert('Tidak punya Ancient Coin! Dapatkan dari daily reward atau event.');
    };
    window.changeAffection = changeAffection;
    window.useItem = useItem;
    window.checkDailyReward = checkDailyReward;

    // init
    loadGame();
    checkDailyReward();
    render();

    // auto regen setiap menit
    setInterval(() => {
        if(gameState.screen === 'game' && gameState.hp < gameState.maxHp) {
            gameState.hp = Math.min(gameState.maxHp, gameState.hp + 1);
            gameState.stamina = Math.min(gameState.maxStamina, gameState.stamina + 1);
            saveGame();
            render();
        }
    }, 60000);
</script>
</body>
</html>
