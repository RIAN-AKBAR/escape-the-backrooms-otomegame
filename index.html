<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE BACKROOMS · Otome Horror</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0804, #010100);
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .noise::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 2px, transparent 2px, transparent 6px);
            pointer-events: none;
            z-index: 999;
            opacity: 0.5;
            mix-blend-mode: overlay;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020100;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }
        .loading-logo {
            font-size: clamp(3rem, 10vw, 5rem);
            color: #e7b874;
            text-shadow: 0 0 30px #ffaa44, 0 0 10px #1a0e00;
            animation: pulseGlow 1.2s infinite;
            margin-bottom: 30px;
        }
        @keyframes pulseGlow {
            0% { text-shadow: 0 0 5px #ffaa44; opacity: 0.7; transform: scale(1);}
            50% { text-shadow: 0 0 40px #ffcc66; opacity: 1; transform: scale(1.05);}
            100% { text-shadow: 0 0 5px #ffaa44; opacity: 0.7; transform: scale(1);}
        }
        .loading-text {
            font-family: 'Source Code Pro', monospace;
            color: #d4bc7a;
            font-size: clamp(0.8rem, 4vw, 1.3rem);
            letter-spacing: 5px;
            margin-top: 20px;
            text-align: center;
            padding: 0 20px;
        }
        .loading-bar {
            width: min(300px, 70vw);
            height: 4px;
            background: #332a1a;
            border-radius: 4px;
            margin-top: 30px;
            overflow: hidden;
        }
        .loading-progress {
            width: 100%;
            height: 100%;
            background: #e7b874;
            animation: loadProgress 2s ease forwards;
            box-shadow: 0 0 10px #ffcc66;
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* LOBBY SCREEN */
        .lobby-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0b07 0%, #1a1610 100%);
            z-index: 9000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .lobby-header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #ab8e54;
            margin-bottom: 30px;
        }
        .lobby-header h1 {
            color: #e7b874;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            text-shadow: 0 0 10px #ffaa44;
            letter-spacing: 3px;
        }
        .lobby-header p {
            color: #bcae7a;
            margin-top: 10px;
            font-size: clamp(0.7rem, 3vw, 1rem);
        }
        .characters-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }
        .lobby-char-card {
            background: #1f1b12cc;
            backdrop-filter: blur(10px);
            border: 2px solid #ab8e54;
            border-radius: 20px;
            padding: 20px;
            width: min(200px, 40vw);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .lobby-char-card:hover {
            transform: translateY(-10px);
            border-color: #e7b874;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lobby-char-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin: 0 auto 10px;
            display: block;
            border: 3px solid #e7c27d;
            /* HILANGKAN BULATAN */
            border-radius: 0;
        }
        .lobby-char-name {
            color: #f7e5b3;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            font-weight: bold;
        }
        .lobby-char-trait {
            color: #d4bc7a;
            font-size: clamp(0.6rem, 3vw, 0.8rem);
            margin: 5px 0;
        }
        .char-detail-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1610ee;
            backdrop-filter: blur(15px);
            border: 2px solid #e7b874;
            border-radius: 20px;
            padding: 30px;
            width: min(400px, 85vw);
            max-height: 80vh;
            overflow-y: auto;
            z-index: 10001;
            text-align: center;
        }
        .char-detail-popup.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9);}
            to { opacity: 1; transform: translate(-50%, -50%) scale(1);}
        }
        .popup-char-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            margin: 0 auto 15px;
            border: 3px solid #e7b874;
            border-radius: 0; /* persegi */
        }
        .close-popup {
            position: absolute;
            top: 10px;
            right: 15px;
            cursor: pointer;
            font-size: 1.5rem;
            color: #e7b874;
        }
        .chapters-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .chapter-card {
            background: #1a1610cc;
            border: 2px solid #6b5a3a;
            border-radius: 16px;
            padding: 20px min(35px, 5vw);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            min-width: min(140px, 30vw);
        }
        .chapter-card.unlocked {
            border-color: #e7b874;
            background: #2a2419cc;
        }
        .chapter-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.3);
        }
        .chapter-card.unlocked:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(231,184,116,0.3);
        }
        .chapter-number {
            font-size: clamp(1rem, 5vw, 2rem);
            color: #e7b874;
            font-weight: bold;
        }
        .chapter-title {
            color: #f7e5b3;
            margin-top: 10px;
            font-size: clamp(0.7rem, 3vw, 0.9rem);
        }
        .chapter-desc {
            color: #bcae7a;
            font-size: clamp(0.6rem, 2.5vw, 0.7rem);
            margin-top: 5px;
        }
        .lock-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ff6666;
            font-size: 0.9rem;
        }
        .coming-soon-badge {
            background: #a12f2f;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            margin-top: 8px;
        }
        .reset-progress {
            background: #4a2f2f;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffccaa;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .reset-progress:hover {
            background: #6a3f3f;
        }
        .bottom-right {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .enter-game-btn {
            background: #e7b874;
            border: none;
            padding: 12px 30px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            border-radius: 50px;
            color: #1a1610;
            cursor: pointer;
            transition: 0.3s;
        }
        .enter-game-btn:hover {
            background: #ffcc88;
            transform: scale(1.05);
            box-shadow: 0 0 20px #e7b874;
        }

        /* GAME SCREEN */
        .game-container {
            width: min(1400px, 96vw);
            height: 90vh;
            background: #1a1710cc;
            backdrop-filter: blur(12px);
            border-radius: 36px;
            border: 1px solid #b89a5a;
            box-shadow: 0 25px 45px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            margin: 20px auto;
        }

        .single-character {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #2a2419 0%, #0a0804 100%);
            position: relative;
            min-height: 200px;
            padding: 20px;
        }
        .active-char {
            text-align: center;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .active-avatar {
            width: min(160px, 40vw);
            height: min(160px, 40vw);
            object-fit: cover;
            margin: 0 auto;
            border: 4px solid #e7c27d;
            box-shadow: 0 0 30px rgba(231,194,125,0.3);
            /* HILANGKAN BULATAN */
            border-radius: 0;
        }
        /* SEMBUNYIKAN NAMA KARAKTER DI BAWAH GAMBAR SAAT DIALOG */
        .active-name {
            display: none;
        }
        .no-character {
            text-align: center;
            color: #8b7a54;
            font-size: clamp(0.8rem, 4vw, 1.2rem);
            padding: 20px;
        }

        .status-panel {
            background: #0c0b08cc;
            padding: 8px 15px;
            display: flex;
            gap: 15px;
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            color: #f2e0b0;
            border-bottom: 1px solid #8b7a4b;
            flex-wrap: wrap;
        }
        .inventory {
            margin-left: auto;
        }
        .dialog-area {
            flex: 1;
            margin: 15px;
            background: #0a0805cc;
            border-radius: 40px;
            backdrop-filter: blur(12px);
            border: 1px solid #b48d47;
            display: flex;
            flex-direction: column;
        }
        .dialog-box {
            padding: 15px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .speaker-name {
            color: #ffdfaa;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            margin-bottom: 10px;
            border-left: 4px solid #edb15d;
            padding-left: 12px;
        }
        .dialog-text {
            font-family: 'Source Code Pro', monospace;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            line-height: 1.5;
            color: #f5efda;
            text-shadow: 0 0 2px black;
            min-height: 60px;
            overflow-y: auto;
            max-height: 150px;
        }
        .next-button {
            align-self: flex-end;
            background: #2a2419;
            border: none;
            color: #ecd68a;
            padding: 8px 25px;
            margin: 5px 15px 15px 0;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
        }
        .next-button:hover { background: #5f4a2e; transform: scale(1.02);}
        .actions-area {
            background: #18140eb3;
            padding: 12px 15px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 2px solid #ac8e54;
        }
        .vn-btn {
            background: #262011;
            border: 2px solid #dbb062;
            color: #fff0cc;
            padding: 8px 20px;
            font-family: 'Quicksand', monospace;
            font-weight: bold;
            font-size: clamp(0.7rem, 3.5vw, 0.9rem);
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
        }
        .vn-btn:hover { background: #5f482a; transform: translateY(-2px);}
        .qte-alert { background: #a12f2f; animation: pulseBtn 1s infinite; }
        @keyframes pulseBtn { 0% { background: #a12f2f;} 100% { background: #d64b4b; }}
        .puzzle-input {
            background: #32291b;
            border: 2px solid #e2b15e;
            padding: 8px 15px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            border-radius: 50px;
            color: #ffe3a3;
            text-align: center;
            width: min(150px, 40vw);
        }
        .back-to-lobby {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #2a2419;
            border: none;
            color: #ecd68a;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            z-index: 100;
        }
        .gameover-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background:#000000dd; backdrop-filter: blur(6px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; flex-direction: column; gap: 24px;
            font-size: clamp(1rem, 5vw, 1.5rem);
            color: #e7b874;
            text-align: center;
            padding: 20px;
        }
        footer { font-size: 0.6rem; text-align: center; color: #67604b; padding: 8px; }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .lobby-char-card {
                width: calc(50% - 20px);
                min-width: 140px;
            }
            .bottom-right {
                position: relative;
                justify-content: center;
                margin-top: 20px;
            }
            .back-to-lobby {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .lobby-char-img {
                width: 70px;
                height: 70px;
            }
        }

        @media (max-width: 480px) {
            .lobby-char-card {
                width: calc(100% - 20px);
                max-width: 250px;
            }
            .status-panel {
                font-size: 0.65rem;
                gap: 10px;
            }
            .dialog-box {
                padding: 12px 15px;
            }
        }
    </style>
    <script src="config.js"></script>
</head>
<body class="noise">

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">
        <i class="fas fa-door-open"></i>
    </div>
    <div class="loading-text">THE BACKROOMS</div>
    <div class="loading-bar">
        <div class="loading-progress"></div>
    </div>
    <div class="loading-text" style="font-size: clamp(0.6rem, 3vw, 0.8rem); letter-spacing: 2px;">Memuat lorong tak berujung...</div>
</div>

<!-- LOBBY SCREEN -->
<div class="lobby-screen" id="lobbyScreen">
    <div class="lobby-header">
        <h1>🏚️ THE BACKROOMS 🏚️</h1>
        <p>Horor Psikologis · Otome Visual Novel</p>
    </div>
    
    <div class="characters-container" id="charactersContainer"></div>
    
    <div style="text-align: center;">
        <h2 style="color: #e7b874; margin-bottom: 20px; font-size: clamp(1rem, 5vw, 1.5rem);">📖 PILIH CHAPTER</h2>
    </div>
    <div class="chapters-container" id="chaptersContainer"></div>
    
    <div class="bottom-right">
        <button class="reset-progress" id="resetProgressBtn">↺ Reset Progress</button>
        <button class="enter-game-btn" id="enterGameBtn">🎮 MULAI GAME 🎮</button>
    </div>
</div>

<!-- GAME SCREEN -->
<div class="game-container" id="gameContainer">
    <button class="back-to-lobby" id="backToLobbyBtn">← Kembali ke Lobby</button>
    <div class="single-character" id="singleCharacter">
        <div class="no-character" id="noCharacterMsg">✨ Karakter akan muncul saat dialog ✨</div>
        <div class="active-char hidden" id="activeChar">
            <img class="active-avatar" id="activeAvatar" alt="Character">
            <!-- NAMA KARAKTER DIHILANGKAN (tidak ditampilkan) -->
        </div>
    </div>
    <div class="status-panel">
        <span>❤️ Kesehatan: <span id="healthVal">100</span>%</span>
        <span>⚡ Stamina: <span id="staminaVal">90</span></span>
        <span class="inventory">🎒 Inventori: <span id="invList">-</span></span>
    </div>
    <div class="dialog-area">
        <div class="dialog-box">
            <div class="speaker-name" id="speakerName">🎭 NARASI</div>
            <div class="dialog-text" id="dialogText">Memulai...</div>
        </div>
        <button class="next-button" id="nextButton"><i class="fas fa-arrow-right"></i> NEXT</button>
    </div>
    <div class="actions-area" id="actionPanel" style="display: none;"></div>
    <footer>⚡ Dengungan lampu neon | [Klik NEXT untuk lanjut]</footer>
</div>

<!-- POPUP DETAIL KARAKTER -->
<div class="char-detail-popup" id="charPopup">
    <span class="close-popup" id="closePopup">&times;</span>
    <div id="popupContent"></div>
</div>

<script src="config.js"></script>
<script>
    // ======================== GAME STATE ========================
    let currentChapter = 1;
    let inventory = [];
    let health = 100, stamina = 90;
    let hasPisau = false, hasFurCloth = false;
    let ranselOpened = false;
    let sceneQueueData = [];
    let waitingForInput = false, gamePaused = false, currentTyping = false;
    let typingInterval = null;
    let qteTimer = null;

    const loadingScreen = document.getElementById('loadingScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameContainer = document.getElementById('gameContainer');
    const dialogText = document.getElementById('dialogText');
    const speakerName = document.getElementById('speakerName');
    const nextBtn = document.getElementById('nextButton');
    const actionPanel = document.getElementById('actionPanel');
    const healthSpan = document.getElementById('healthVal');
    const staminaSpan = document.getElementById('staminaVal');
    const invSpan = document.getElementById('invList');
    const activeCharDiv = document.getElementById('activeChar');
    const activeAvatar = document.getElementById('activeAvatar');
    const noCharacterMsg = document.getElementById('noCharacterMsg');

    let audioCtx = null, humGain = null, humOsc = null;
    function initAudio() {
        if(audioCtx) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            humGain = audioCtx.createGain();
            humGain.gain.value = 0.15;
            humOsc = audioCtx.createOscillator();
            humOsc.type = "sawtooth";
            humOsc.frequency.value = 58;
            humOsc.connect(humGain);
            humGain.connect(audioCtx.destination);
            humOsc.start();
        } catch(e) { console.log("Audio not supported"); }
    }

    setTimeout(() => {
        loadingScreen.style.opacity = '0';
        setTimeout(() => {
            loadingScreen.style.display = 'none';
            lobbyScreen.style.display = 'flex';
            initLobby();
        }, 1000);
    }, 2000);

    function initLobby() {
        const charsContainer = document.getElementById('charactersContainer');
        charsContainer.innerHTML = '';
        for (const [key, char] of Object.entries(GAME_CONFIG.characters)) {
            const card = document.createElement('div');
            card.className = 'lobby-char-card';
            card.innerHTML = `
                <img class="lobby-char-img" src="${char.imageUrl}" alt="${char.name}" onerror="this.src='https://via.placeholder.com/100?text=${char.name.charAt(0)}'">
                <div class="lobby-char-name">${char.name}</div>
                <div class="lobby-char-trait">${char.trait}</div>
                <div style="font-size:0.65rem; margin-top:8px; color:#bcae7a;">✨ Klik untuk detail ✨</div>
            `;
            card.onclick = () => showCharDetail(char);
            charsContainer.appendChild(card);
        }
        renderChapters();
        
        document.getElementById('enterGameBtn').onclick = () => {
            if (window.isChapterAvailable(currentChapter)) {
                startGame(currentChapter);
            } else {
                alert(GAME_CONFIG.comingSoon.message);
            }
        };
        
        document.getElementById('resetProgressBtn').onclick = () => {
            if (confirm('Yakin ingin mereset semua progress? Chapter 2-5 akan terkunci kembali.')) {
                window.resetProgress();
                renderChapters();
            }
        };
    }
    
    function renderChapters() {
        const chaptersContainer = document.getElementById('chaptersContainer');
        chaptersContainer.innerHTML = '';
        for (let i = 1; i <= GAME_CONFIG.totalChapters; i++) {
            const chapter = GAME_CONFIG.chapters[i];
            const isAvailable = window.isChapterAvailable(i);
            const card = document.createElement('div');
            card.className = `chapter-card ${isAvailable ? 'unlocked' : 'locked'}`;
            if (!isAvailable) {
                card.innerHTML = `
                    <div class="lock-icon"><i class="fas fa-lock"></i></div>
                    <div class="chapter-number">Chapter ${i}</div>
                    <div class="chapter-title">???</div>
                    <div class="chapter-desc">Terkunci</div>
                    <div class="coming-soon-badge">🔒 Selesaikan chapter ${i-1} dulu</div>
                `;
            } else {
                card.innerHTML = `
                    <div class="chapter-number">Chapter ${i}</div>
                    <div class="chapter-title">${chapter.title}</div>
                    <div class="chapter-desc">${chapter.description}</div>
                    <div style="margin-top:8px; font-size:0.7rem;"><i class="fas fa-play"></i> Pilih</div>
                `;
                card.onclick = () => {
                    currentChapter = i;
                    document.querySelectorAll('.chapter-card').forEach(c => c.style.border = '');
                    card.style.border = '3px solid #ffcc88';
                    alert(`Chapter ${i} dipilih: ${chapter.title}\nKlik "MULAI GAME" untuk bermain.`);
                };
            }
            chaptersContainer.appendChild(card);
        }
    }
    
    function showCharDetail(char) {
        const popup = document.getElementById('charPopup');
        const content = document.getElementById('popupContent');
        content.innerHTML = `
            <img class="popup-char-img" src="${char.imageUrl}" alt="${char.name}" onerror="this.src='https://via.placeholder.com/120?text=${char.name.charAt(0)}'">
            <h2 style="color:#e7b874; font-size:clamp(1rem, 5vw, 1.5rem);">${char.name}</h2>
            <p style="color:#d4bc7a; margin:10px 0; font-size:clamp(0.7rem, 3vw, 0.9rem);">${char.trait}</p>
            <p style="color:#bcae7a; font-size:clamp(0.7rem, 3vw, 0.85rem); line-height:1.5;">${char.personality}</p>
            <p style="color:#8b7a54; margin-top:15px; font-size:clamp(0.65rem, 3vw, 0.8rem);">🎭 ${char.voice}</p>
        `;
        popup.classList.add('show');
        document.getElementById('closePopup').onclick = () => popup.classList.remove('show');
        popup.onclick = (e) => { if(e.target === popup) popup.classList.remove('show'); };
    }
    
    // TAMPILKAN KARAKTER TANPA NAMA DI BAWAHNYA
    function showCharacter(characterName, imageUrl) {
        if (!characterName || characterName === "🎭 NARASI" || characterName === "🔐 TEKA-TEKI" || characterName === "🎒 SISTEM" || characterName === "⚠️ QUICK TIME EVENT") {
            activeCharDiv.classList.add('hidden');
            noCharacterMsg.classList.remove('hidden');
        } else {
            noCharacterMsg.classList.add('hidden');
            activeCharDiv.classList.remove('hidden');
            activeAvatar.src = imageUrl || 'https://via.placeholder.com/160?text=Character';
            // nama tidak perlu ditampilkan di bawah (sudah dihilangkan via CSS dan HTML)
        }
    }
    
    function updateUI() {
        healthSpan.innerText = Math.max(0, health);
        staminaSpan.innerText = stamina;
        invSpan.innerText = inventory.length ? inventory.join(", ") : "Kosong";
    }
    
    function modifyHealth(amt) { 
        health = Math.min(100, Math.max(0, health + amt)); 
        updateUI(); 
        if(health <= 0) gameOver("Kamu kehabisan tenaga..."); 
    }
    
    function gameOver(reason) {
        if(document.querySelector(".gameover-overlay")) return;
        gamePaused = true;
        const ov = document.createElement("div");
        ov.className = "gameover-overlay";
        ov.innerHTML = `<div>💀 GAME OVER 💀<br>${reason}</div><button class="vn-btn" id="restartBtn">⟳ Kembali ke Lobby</button>`;
        document.body.appendChild(ov);
        document.getElementById("restartBtn").onclick = () => location.reload();
    }
    
    function completeChapterAndSave() {
        window.completeChapter(currentChapter);
        alert(`✨ Chapter ${currentChapter} selesai! ✨\nChapter ${currentChapter+1} sekarang terbuka (jika tersedia di config).`);
        lobbyScreen.style.display = 'flex';
        gameContainer.style.display = 'none';
        renderChapters();
    }
    
    function stopTyping() { 
        if(typingInterval) clearInterval(typingInterval); 
        currentTyping = false; 
    }
    
    function typewriterStart(speaker, message, callback, characterInfo) {
        if(typingInterval) stopTyping();
        currentTyping = true;
        speakerName.innerText = speaker;
        dialogText.innerHTML = "";
        
        showCharacter(characterInfo?.name, characterInfo?.imageUrl);
        
        let idx = 0;
        function addLetter() {
            if(idx < message.length) { 
                dialogText.innerHTML += message.charAt(idx); 
                idx++; 
            } else { 
                stopTyping(); 
                currentTyping = false; 
                if(callback) callback(); 
            }
        }
        typingInterval = setInterval(addLetter, 28);
    }
    
    function processQueue() {
        if(gamePaused) return;
        if(currentTyping) return;
        if(waitingForInput) return;
        if(sceneQueueData.length === 0) return;
        const next = sceneQueueData.shift();
        typewriterStart(next.speaker, next.message, () => {
            if(next.onEnd) next.onEnd();
            else { waitingForInput = true; nextBtn.disabled = false; nextBtn.style.opacity = "1"; }
        }, next.characterInfo);
    }
    
    function addScene(speaker, message, onEnd=null, characterInfo=null) {
        sceneQueueData.push({ speaker, message, onEnd, characterInfo });
        if(!waitingForInput && !currentTyping && sceneQueueData.length === 1) processQueue();
    }
    
    function enableNext(enable) { 
        nextBtn.disabled = !enable; 
        nextBtn.style.opacity = enable ? "1" : "0.5"; 
    }
    
    nextBtn.onclick = () => {
        if(gamePaused) return;
        if(currentTyping) { 
            stopTyping(); 
            if(sceneQueueData[0]) dialogText.innerHTML = sceneQueueData[0].message; 
            currentTyping = false; 
            return; 
        }
        if(waitingForInput) { 
            waitingForInput = false; 
            enableNext(false); 
            processQueue(); 
        }
    };
    enableNext(false);
    
    function pauseForChoices(choices) {
        gamePaused = true;
        enableNext(false);
        actionPanel.style.display = "flex";
        actionPanel.innerHTML = "";
        choices.forEach(ch => {
            const btn = document.createElement("button");
            btn.innerText = ch.label;
            btn.classList.add("vn-btn");
            if(ch.qteStyle) btn.classList.add("qte-alert");
            btn.onclick = () => {
                actionPanel.style.display = "none";
                gamePaused = false;
                ch.callback();
                processQueue();
            };
            actionPanel.appendChild(btn);
        });
    }
    
    const charImages = {
        katsumi: "https://files.catbox.moe/sq34nd.png",
        haruno: "https://files.catbox.moe/eyag0t.png",
        touya: "https://files.catbox.moe/jmn9ys.png",
        juun: "https://files.catbox.moe/6s4c4j.png"
    };
    
    function startGame(chapterNum) {
        initAudio();
        lobbyScreen.style.display = 'none';
        gameContainer.style.display = 'flex';
        
        inventory = []; hasPisau=false; hasFurCloth=false; ranselOpened=false; health=100; stamina=90;
        updateUI();
        sceneQueueData = [];
        waitingForInput = false; gamePaused = false; currentTyping = false;
        enableNext(false);
        actionPanel.style.display = "none";
        
        const chars = {
            katsumi: { name: "Katsumi", imageUrl: charImages.katsumi },
            haruno: { name: "Haruno", imageUrl: charImages.haruno },
            touya: { name: "Touya", imageUrl: charImages.touya },
            juun: { name: "Juun", imageUrl: charImages.juun }
        };
        
        addScene("🎭 NARASI", "Suara dengungan lampu neon pelan. Cahaya kuning redup memenuhi ruangan. Empat orang tergeletak di lantai dingin…", null, null);
        addScene("Katsumi", "Aduh… kepalaku sakit… (perlahan membuka mata) …eh? Ini… di mana?", null, chars.katsumi);
        addScene("Haruno", "Huh? Tempat apaan ini?!", null, chars.haruno);
        addScene("Touya", "Aneh. Seharusnya aku masih di perpustakaan… lagi belajar… Kenapa aku bisa di sini…?", null, chars.touya);
        addScene("Juun", "...kalian semua siapa? Dan ini… tempat apa?", null, chars.juun);
        addScene("Katsumi", "Hehe… sepertinya kita semua sama-sama bingung, ya?", null, chars.katsumi);
        addScene("Haruno", "Jangan bercanda. Siapa yang bawa gue ke sini?!", null, chars.haruno);
        addScene("Touya", "A-aku juga nggak tahu! Sumpah! Ini nggak masuk akal…", null, chars.touya);
        addScene("Juun", "Kalau tidak ada yang saling mengenal… berarti kita semua korban.", null, chars.juun);
        addScene("Katsumi", "…korban?", null, chars.katsumi);
        addScene("Touya", "Tempat ini… nggak normal…", null, chars.touya);
        addScene("Haruno", "Apapun ini… kita cari jalan keluar.", null, chars.haruno);
        addScene("🎭 NARASI", "Lampu berkedip lebih lama. Keempatnya berdiri dalam diam, dikelilingi lorong kuning tak berujung.", null, null);
        addScene("Katsumi", "Eh… itu apa?", null, chars.katsumi);
        addScene("🎭 NARASI", "Di lantai, tepat di dekat mereka, tergeletak sebuah ransel kulit tua.", null, null);
        addScene("Haruno", "…jangan sentuh dulu.", null, chars.haruno);
        addScene("Touya", "Tapi… dari tadi nggak ada, kan?", null, chars.touya);
        addScene("Juun", "Kalau ini jebakan… kita sudah berada di dalamnya sejak awal.", null, chars.juun);
        
        addScene("🎒 SISTEM", "Apa yang akan kamu lakukan?", () => {
            pauseForChoices([
                { label: "📦 BUKA RANSEL", callback: () => {
                    ranselOpened = true;
                    inventory = ["Air", "Roti", "Senter", "Tali", "Pisau", "Obat"];
                    hasPisau = true;
                    updateUI();
                    addRegroupSequence(chars);
                }},
                { label: "👀 PERIKSA SEKELILING", callback: () => {
                    addScene("Touya", "Dinding kuning semua... Tapi ransel itu pasti berguna.", null, chars.touya);
                    addScene("Haruno", "Kita buka saja.", null, chars.haruno);
                    ranselOpened = true;
                    inventory = ["Air", "Roti", "Senter", "Tali", "Pisau", "Obat"];
                    hasPisau = true;
                    updateUI();
                    addRegroupSequence(chars);
                }}
            ]);
        });
    }
    
    function addRegroupSequence(chars) {
        addScene("Juun", "Isi: air, roti, senter, tali, pisau, obat.", null, chars.juun);
        addScene("Katsumi", "Ini kayak perlengkapan bertahan hidup.", null, chars.katsumi);
        addScene("Haruno", "Siapapun yang nyiapin ini… berarti mereka juga tahu tempat ini berbahaya.", null, chars.haruno);
        addScene("Katsumi", "Kalau gitu kenalan dulu ya? Aku Katsumi.", null, chars.katsumi);
        addScene("Haruno", "Haruno.", null, chars.haruno);
        addScene("Touya", "T-Touya…", null, chars.touya);
        addScene("Juun", "Juun.", null, chars.juun);
        addScene("Haruno", "Mulai sekarang kita satu tim. Kalau ada yang bertindak sendiri—bisa mati.", null, chars.haruno);
        addScene("🎭 NARASI", "Haruno menggendong ransel. Ia melangkah maju ke arah lorong.", null, null);
        addAnomaliSequence(chars);
    }
    
    function addAnomaliSequence(chars) {
        addScene("🎭 NARASI", "Tetes. Sesuatu jatuh di lantai. Suara basah. Semua berhenti.", null, null);
        addScene("Katsumi", "…itu apa?", null, chars.katsumi);
        addScene("🎭 NARASI", "Cairan kental menetes dari atas. Bau busuk menusuk hidung.", null, null);
        addScene("Touya", "Jangan bilang…", null, chars.touya);
        addScene("🎭 NARASI", "Di langit-langit, sesuatu bergerak. Sosok aneh merayap terbalik.", null, null);
        addScene("Haruno", "JANGAN DIAM! LARI!!", null, chars.haruno);
        
        addScene("⚠️ QUICK TIME EVENT", "Klik tombol LARI sebelum monster menangkap!", () => {
            gamePaused = true;
            actionPanel.style.display = "flex";
            actionPanel.innerHTML = "";
            const qteBtn = document.createElement("button");
            qteBtn.innerText = "🏃‍♀️ LARI CEPAT!";
            qteBtn.classList.add("vn-btn", "qte-alert");
            let qteClicked = false;
            qteBtn.onclick = () => {
                if(qteClicked) return;
                qteClicked = true;
                clearTimeout(qteTimer);
                actionPanel.style.display = "none";
                gamePaused = false;
                afterQTE(chars, true);
            };
            actionPanel.appendChild(qteBtn);
            qteTimer = setTimeout(() => {
                if(!qteClicked) {
                    qteClicked = true;
                    actionPanel.style.display = "none";
                    gamePaused = false;
                    afterQTE(chars, false);
                }
            }, 3000);
        });
    }
    
    function afterQTE(chars, success) {
        if(success) {
            addScene("🎭 NARASI", "Kalian berhasil lari! Namun Katsumi terpisah dan terjebak di jalan buntu!", null, null);
            addScene("Haruno", "MENJAUH!! (Haruno menusuk monster dengan PISAU!)", null, chars.haruno);
            addScene("Juun", "Bisa berdiri?", null, chars.juun);
            addScene("Katsumi", "I-iya…", null, chars.katsumi);
        } else {
            modifyHealth(-35);
            addScene("🎭 NARASI", "Monster menyerang! Kalian terluka, tapi selamat.", null, null);
            addScene("Haruno", "Cepat! Cari tempat aman!", null, chars.haruno);
        }
        addScene("🎭 NARASI", "Mereka berlari dan menemukan pintu putih.", null, null);
        addPuzzleSequence(chars);
        processQueue();
    }
    
    function addPuzzleSequence(chars) {
        addScene("🎭 NARASI", "Mereka masuk ke ruangan dengan angka 9 di langit-langit. Lukisan terbalik.", null, null);
        addScene("Katsumi", "Ini kayak buku harian… (membuka) kosong semua?", null, chars.katsumi);
        addScene("Touya", "(membaca) Pintu merah adalah angka kematian… Carilah angka dan kain berbulu… 3… 9—", null, chars.touya);
        
        if(!hasFurCloth) {
            addScene("Katsumi", "Lihat! Di sudut ada boneka kecil berbulu! Itu pasti kain berbulu.", null, chars.katsumi);
            inventory.push("Kain Berbulu");
            hasFurCloth = true;
            updateUI();
        }
        
        addScene("🔐 TEKA-TEKI", "Masukkan kode angka dari petunjuk (3 & 9):", () => {
            gamePaused = true;
            actionPanel.style.display = "flex";
            actionPanel.innerHTML = "";
            const wrapper = document.createElement("div");
            wrapper.style.display = "flex"; 
            wrapper.style.gap = "12px";
            wrapper.style.flexWrap = "wrap";
            wrapper.style.justifyContent = "center";
            const inputBox = document.createElement("input");
            inputBox.type = "text"; 
            inputBox.placeholder = "Kode 2 angka..."; 
            inputBox.classList.add("puzzle-input");
            const submitBtn = document.createElement("button");
            submitBtn.innerText = "BUKA JALAN"; 
            submitBtn.classList.add("vn-btn");
            wrapper.appendChild(inputBox); 
            wrapper.appendChild(submitBtn);
            actionPanel.appendChild(wrapper);
            
            const check = () => {
                let val = inputBox.value.trim();
                if(val === "39" || val === "3 9" || val === "3-9") {
                    actionPanel.style.display = "none";
                    gamePaused = false;
                    addScene("🎭 NARASI", "Kain berbulu hangat di tangan. Angka 39! Pintu rahasia terbuka! Cahaya keemasan menerobos...", null, null);
                    addScene("Haruno", "Kita berhasil... Kita hidup!", null, chars.haruno);
                    addScene("✨ CHAPTER 1 SELESAI ✨", "Kalian keluar dari lorong kuning. Chapter 1 selesai!", () => {
                        completeChapterAndSave();
                    });
                    processQueue();
                } else {
                    addScene("Juun", "Salah... Petunjuk: 3 dan 9 berurutan.", null, chars.juun);
                }
            };
            submitBtn.onclick = check;
            inputBox.addEventListener("keypress", (e) => { if(e.key === "Enter") check(); });
        });
    }
    
    document.getElementById('backToLobbyBtn').onclick = () => {
        if(confirm('Kembali ke lobby? Progress chapter saat ini tidak akan tersimpan.')) {
            lobbyScreen.style.display = 'flex';
            gameContainer.style.display = 'none';
            renderChapters();
        }
    };
</script>
</body>
</html>
