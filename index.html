<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Game Utama</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 20px);
            position: relative;
            overflow-x: hidden;
        }
        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .game-container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 2; width: 100%; }
        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: clamp(16px, 4vw, 28px);
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: clamp(12px, 3vw, 20px);
        }
        h1, h2, h3 { color: #f5e6d0; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
        .main-menu {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 28px;
            text-align: center;
            padding: 48px;
        }
        .game-title {
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            font-weight: bold;
            background: linear-gradient(135deg, #ffddb0, #ffa0c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .menu-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin-top: 20px;
        }
        .menu-btn {
            background: rgba(30,20,45,0.95);
            border: 1px solid #e8aa88;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffefdf;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .menu-btn:hover { background: #c96a8a; border-color: white; transform: scale(1.03); }
        
        /* Game Screen Styles */
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .char-card {
            background: rgba(15, 10, 28, 0.94);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid #6a4a6a;
            cursor: pointer;
            transition: all 0.3s;
        }
        .char-card:hover { transform: translateY(-3px); border-color: #e8aa88; }
        .char-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .char-avatar { font-size: 2.5rem; }
        .char-name { font-size: 1.2rem; font-weight: bold; color: #ffdfc4; }
        .stat-bar-container { margin: 8px 0; }
        .stat-label { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 3px; }
        .hp-bar-bg { background: #4a2a2a; border-radius: 20px; height: 10px; overflow: hidden; }
        .hp-bar-fill { background: linear-gradient(90deg, #dd6644, #ffaa77); width: 0%; height: 100%; transition: width 0.3s; }
        .stamina-bar-bg { background: #2a4a2a; border-radius: 20px; height: 8px; overflow: hidden; }
        .stamina-bar-fill { background: linear-gradient(90deg, #66cc55, #aaff88); width: 0%; height: 100%; transition: width 0.3s; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 12px 0;
            background: rgba(0,0,0,0.35);
            border-radius: 16px;
            padding: 10px;
        }
        .stat-item { text-align: center; font-size: 0.7rem; }
        .stat-value { font-weight: bold; color: #ffd9b5; }
        .btn-action {
            background: #2a1a3a;
            border: 1px solid #c99070;
            padding: 6px 12px;
            border-radius: 40px;
            color: #fff5ea;
            cursor: pointer;
            font-size: 0.7rem;
            margin: 3px;
        }
        .btn-action:hover { background: #c96a8a; }
        .puzzle-area {
            background: rgba(12, 8, 25, 0.95);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        .puzzle-question {
            background: rgba(0,0,0,0.45);
            padding: 15px;
            border-radius: 16px;
            margin: 15px 0;
            font-size: clamp(0.9rem, 3.5vw, 1rem);
            color: #f7e8d8;
        }
        .puzzle-options { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .puzzle-input {
            background: #1e1828;
            border: 1px solid #b88866;
            padding: 10px 15px;
            border-radius: 60px;
            color: #fff5e8;
            flex: 1;
            min-width: 180px;
        }
        .puzzle-btn {
            background: #2a1a3a;
            border: 1px solid #d99870;
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        .inventory-summary { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; justify-content: center; }
        .inv-tag { background: rgba(0,0,0,0.55); padding: 5px 12px; border-radius: 40px; font-size: 0.8rem; }
        .hint-history { max-height: 200px; overflow-y: auto; margin-top: 12px; }
        .hint-entry { background: rgba(0,0,0,0.45); padding: 8px; margin: 5px 0; border-radius: 10px; font-size: 0.7rem; border-left: 3px solid #e8aa88; }
        .nav-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 15px; flex-wrap: wrap; }
        .nav-btn { background: rgba(30,20,45,0.9); border: 1px solid #e8aa88; padding: 8px 16px; border-radius: 40px; color: #ffefdf; cursor: pointer; font-size: 0.8rem; text-decoration: none; display: inline-block; }
        .nav-btn:hover { background: #c96a8a; }
        .warning-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(8,5,20,0.98); backdrop-filter: blur(20px); border-radius: 24px;
            padding: 32px; z-index: 2000; min-width: 320px; text-align: center; border: 2px solid #ff7799;
        }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1999; }
        @media (max-width: 600px) {
            .char-header { flex-direction: column; text-align: center; }
            .puzzle-options { flex-direction: column; }
            .puzzle-input { width: 100%; }
            .puzzle-btn { width: 100%; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ======================== KARAKTER DATA ========================
    const CHARACTERS_DATA = {
        Haruno: { id: 'Haruno', avatar: '❄️', name: 'Haruno', personality: 'Tsundere, protektif, pemarah', hintCost: 4,
                  hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 80, luck: 60, curseResistance: 70 },
        Katsumi: { id: 'Katsumi', avatar: '🌊', name: 'Katsumi', personality: 'Ceria, ramah, perhatian', hintCost: 5,
                  hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 95, luck: 55, curseResistance: 65 },
        Juun: { id: 'Juun', avatar: '🌀', name: 'Juun', personality: 'Pendiam, tenang, cerdas', hintCost: 6,
                hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 85, luck: 80, curseResistance: 50 },
        Touya: { id: 'Touya', avatar: '🔥', name: 'Touya', personality: 'Polos, pemalu, panikan', hintCost: 8,
                 hp: 100, maxHp: 100, stamina: 100, maxStamina: 100, affection: 15, intelligence: 98, luck: 70, curseResistance: 45 }
    };

    // ======================== TEKA-TEKI ========================
    const PUZZLE_BANK = [
        { q: "Aku lahir dari api, tetapi mati jika disentuh air. Siapakah aku?", a: "api", hint: "Bara yang membakar" },
        { q: "Semakin banyak kau ambil, semakin besar aku. Apakah aku?", a: "lubang", hint: "Kosong di tanah" },
        { q: "Apa yang bisa kau dengar tapi tidak bisa kau lihat?", a: "suara", hint: "Getaran di udara" },
        { q: "Apa yang memiliki kunci tapi tidak bisa membuka pintu?", a: "piano", hint: "Alat musik" },
        { q: "Berapa jumlah kaki laba-laba jika ada 4 laba-laba?", a: "32", hint: "Setiap laba-laba 8 kaki" }
    ];
    for(let i=0; i<500; i++) PUZZLE_BANK.push({ q: `Misteri #${i+6}: Sesuatu yang bisa memecah tanpa menyentuh?`, a: "waktu", hint: "Detik yang berlalu" });

    function getRandomPuzzle() { return { ...PUZZLE_BANK[Math.floor(Math.random() * PUZZLE_BANK.length)] }; }

    let gameState = {
        screen: 'mainmenu', characters: [], level: 1, chapter: 1, puzzleProgress: 0, puzzlesThisLevel: 12,
        currentPuzzle: null, inventory: { ghost_coin: 50, topeng: 2, potion_hp: 0, stamina_bread: 0, apple: 0, ghost_key: 0 },
        hintHistory: [], lastRegen: Date.now()
    };

    function initGame() {
        gameState.characters = Object.values(CHARACTERS_DATA).map(c => ({ ...c, hp: c.maxHp, stamina: c.maxStamina }));
        gameState.currentPuzzle = getRandomPuzzle();
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('yureiKakuSave', JSON.stringify({
            characters: gameState.characters.map(c => ({ id: c.id, hp: c.hp, stamina: c.stamina })),
            level: gameState.level, chapter: gameState.chapter, puzzleProgress: gameState.puzzleProgress,
            puzzlesThisLevel: gameState.puzzlesThisLevel, inventory: gameState.inventory, hintHistory: gameState.hintHistory
        }));
    }

    function loadGame() {
        const saved = localStorage.getItem('yureiKakuSave');
        if(saved) {
            try {
                const data = JSON.parse(saved);
                gameState.characters = Object.values(CHARACTERS_DATA).map(c => {
                    const sc = data.characters?.find(sc => sc.id === c.id);
                    return { ...c, hp: sc?.hp ?? c.maxHp, stamina: sc?.stamina ?? c.maxStamina };
                });
                gameState.level = data.level || 1;
                gameState.chapter = data.chapter || 1;
                gameState.puzzleProgress = data.puzzleProgress || 0;
                gameState.puzzlesThisLevel = data.puzzlesThisLevel || 12;
                gameState.inventory = { ...gameState.inventory, ...(data.inventory || {}) };
                gameState.hintHistory = data.hintHistory || [];
                gameState.currentPuzzle = getRandomPuzzle();
            } catch(e) { initGame(); }
        } else { initGame(); }
    }

    function usePotion(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(gameState.inventory.potion_hp >= 30) {
            char.hp = Math.min(char.maxHp, char.hp + 30);
            gameState.inventory.potion_hp -= 30;
            addHistory(`🧪 ${char.name} menggunakan Potion! HP +30`);
            saveGame(); render();
        } else { alert(`Potion tidak cukup! Stok: ${gameState.inventory.potion_hp}%`); }
    }

    function useStamina(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(gameState.inventory.stamina_bread >= 20) {
            char.stamina = Math.min(char.maxStamina, char.stamina + 20);
            gameState.inventory.stamina_bread -= 20;
            addHistory(`🍞 ${char.name} memakan Roti! Stamina +20`);
            saveGame(); render();
        } else { alert(`Roti tidak cukup! Stok: ${gameState.inventory.stamina_bread}%`); }
    }

    function addHistory(text) {
        gameState.hintHistory.unshift({ text, time: new Date().toLocaleTimeString() });
        if(gameState.hintHistory.length > 30) gameState.hintHistory.pop();
        saveGame();
    }

    function getHint(charId) {
        const char = gameState.characters.find(c => c.id === charId);
        if(char.stamina < char.hintCost) { addHistory(`⚠️ Stamina ${char.name} tidak cukup!`); render(); return; }
        char.stamina -= char.hintCost;
        const hints = { Haruno: `"${gameState.currentPuzzle?.hint || 'Fokus!'}"`, Katsumi: `"${gameState.currentPuzzle?.hint || 'Ayo semangat!'}"`, Juun: `"${gameState.currentPuzzle?.hint || '...'}"`, Touya: `"A-aku rasa ${gameState.currentPuzzle?.hint || 'ini petunjuknya'}!"` };
        addHistory(`${char.avatar} ${char.name}: ${hints[char.id]} (${char.hintCost} stamina)`);
        saveGame(); render();
    }

    function solvePuzzle() {
        const input = document.getElementById('puzzleAnswer');
        if(!input) return;
        if(input.value.trim().toLowerCase() === gameState.currentPuzzle?.a.toLowerCase()) {
            addHistory(`✅ JAWABAN BENAR! +Ghost Coin`);
            gameState.inventory.ghost_coin += 5;
            gameState.puzzleProgress++;
            if(gameState.puzzleProgress >= gameState.puzzlesThisLevel) {
                gameState.chapter++;
                gameState.puzzleProgress = 0;
                gameState.puzzlesThisLevel = Math.min(18, 12 + Math.floor(gameState.level / 4));
                addHistory(`📖 BAB ${gameState.chapter} SELESAI!`);
                gameState.characters.forEach(c => { c.hp = c.maxHp; c.stamina = c.maxStamina; });
            }
            gameState.level++;
            gameState.currentPuzzle = getRandomPuzzle();
            saveGame(); render();
            input.value = '';
        } else {
            addHistory(`❌ JAWABAN SALAH!`);
            input.value = '';
            render();
        }
    }

    function generateStory() {
        return `【 Bab ${gameState.chapter} 】 ${gameState.characters[0]?.name} berdiri di depan gerbang tua. Pecahkan teka-teki untuk melanjutkan petualangan!`;
    }

    function render() {
        const app = document.getElementById('app');
        if(gameState.screen === 'mainmenu') {
            app.innerHTML = `
                <div class="main-menu glass-panel">
                    <h1 class="game-title">YUREI KAKU</h1>
                    <div class="menu-buttons">
                        <button class="menu-btn" onclick="startGame()">✨ Mulai Petualangan</button>
                        <a href="daily.html" class="menu-btn">🎁 Daily & Shop</a>
                        <a href="characters.html" class="menu-btn">👥 Karakter</a>
                    </div>
                    <div style="margin-top: 20px; color:#ccbbaa;">✦ Otome Horror Puzzle RPG ✦</div>
                </div>
            `;
            return;
        }
        app.innerHTML = `
            <div class="glass-panel">
                <div class="nav-buttons">
                    <a href="daily.html" class="nav-btn">🎁 Daily & Shop</a>
                    <a href="characters.html" class="nav-btn">👥 Karakter</a>
                    <button class="nav-btn" onclick="gameState.screen='mainmenu'; render()">🏠 Menu</button>
                </div>
                <div class="inventory-summary">
                    <span class="inv-tag">🪙 ${gameState.inventory.ghost_coin}</span>
                    <span class="inv-tag">🎭 ${gameState.inventory.topeng}</span>
                    <span class="inv-tag">🧪 ${gameState.inventory.potion_hp}%</span>
                    <span class="inv-tag">🍞 ${gameState.inventory.stamina_bread}%</span>
                    <span class="inv-tag">🍎 ${gameState.inventory.apple}</span>
                    <span class="inv-tag">🔑 ${gameState.inventory.ghost_key}</span>
                </div>
            </div>
            <div class="char-grid">
                ${gameState.characters.map(char => `
                    <div class="char-card">
                        <div class="char-header"><div class="char-avatar">${char.avatar}</div>
                        <div><div class="char-name">${char.name}</div><div class="char-personality" style="font-size:0.65rem;">${char.personality}</div></div></div>
                        <div class="stat-bar-container"><div class="stat-label">❤️ ${Math.floor(char.hp)}/${char.maxHp}</div>
                        <div class="hp-bar-bg"><div class="hp-bar-fill" style="width:${(char.hp/char.maxHp)*100}%"></div></div></div>
                        <div class="stat-bar-container"><div class="stat-label">⚡ ${Math.floor(char.stamina)}/${char.maxStamina}</div>
                        <div class="stamina-bar-bg"><div class="stamina-bar-fill" style="width:${(char.stamina/char.maxStamina)*100}%"></div></div></div>
                        <div class="stats-grid">
                            <div class="stat-item">💕 Aff: <span class="stat-value">${char.affection}</span></div>
                            <div class="stat-item">🧠 Intel: <span class="stat-value">${char.intelligence}</span></div>
                            <div class="stat-item">🍀 Luck: <span class="stat-value">${char.luck}</span></div>
                        </div>
                        <div style="display:flex; gap:5px; justify-content:center;">
                            <button class="btn-action" onclick="usePotion('${char.id}')">🧪 Potion</button>
                            <button class="btn-action" onclick="useStamina('${char.id}')">🍞 Roti</button>
                            <button class="btn-action" onclick="getHint('${char.id}')">🔍 Hint</button>
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="puzzle-area">
                <div style="display:flex; justify-content:space-between; flex-wrap:wrap;"><h3>🧩 ${gameState.puzzleProgress+1}/${gameState.puzzlesThisLevel}</h3><div>Level ${gameState.level} · Bab ${gameState.chapter}</div></div>
                <div class="puzzle-question">「 ${gameState.currentPuzzle?.q} 」</div>
                <div class="puzzle-options">
                    <input type="text" id="puzzleAnswer" class="puzzle-input" placeholder="Ketik jawaban..." autocomplete="off">
                    <button class="puzzle-btn" onclick="solvePuzzle()">✨ Jawab</button>
                </div>
            </div>
            <div class="glass-panel">
                <h3>📜 Log</h3>
                <div class="hint-history">${gameState.hintHistory.slice(0,5).map(h => `<div class="hint-entry">[${h.time}] ${h.text}</div>`).join('') || '<div class="hint-entry">✨ Belum ada aktivitas</div>'}</div>
            </div>
            <div class="glass-panel"><h3>📖 Cerita</h3><p>${generateStory()}</p></div>
        `;
        setTimeout(() => { const inp = document.getElementById('puzzleAnswer'); if(inp) inp.focus(); }, 100);
    }

    window.startGame = () => { gameState.screen = 'game'; render(); };
    window.usePotion = usePotion;
    window.useStamina = useStamina;
    window.getHint = getHint;
    window.solvePuzzle = solvePuzzle;

    function createParticles() {
        for(let i=0;i<40;i++) { let p=document.createElement('div'); p.className='particle';
        p.style.width=Math.random()*4+2+'px'; p.style.height=p.style.width;
        p.style.left=Math.random()*100+'%'; p.style.animationDuration=Math.random()*15+10+'s';
        p.style.animationDelay=Math.random()*10+'s'; document.body.appendChild(p); }
    }
    loadGame(); createParticles(); render();
    window.addEventListener('resize',()=>{ document.querySelectorAll('.particle').forEach(p=>p.remove()); createParticles(); });
</script>
</body>
</html>
