<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hoshizora Otome</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      overflow:hidden;
      background:#000;
      color:white;
    }

    .screen{
      width:100%;
      height:100vh;
      position:relative;
      overflow:hidden;
    }

    video.bg-video{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      top:0;
      left:0;
      z-index:-2;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.25);
      z-index:-1;
    }

    /* =========================
       START SCREEN
    ========================= */

    .start-screen{
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    .logo{
      width:500px;
      max-width:90%;
      animation:float 3s ease-in-out infinite;
      margin-bottom:40px;
    }

    .tap-start{
      width:340px;
      cursor:pointer;
      transition:0.3s;
      animation:pulse 2s infinite;
    }

    .tap-start:hover{
      transform:scale(1.05);
    }

    @keyframes pulse{
      0%,100%{transform:scale(1);}
      50%{transform:scale(1.05);}
    }

    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    /* =========================
       MAIN LOBBY
    ========================= */

    .lobby-screen{
      display:none;
    }

    .top-bar{
      position:absolute;
      top:15px;
      left:50%;
      transform:translateX(-50%);
      display:flex;
      gap:12px;
      z-index:5;
    }

    .currency{
      background:rgba(20,20,40,0.7);
      backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.2);
      padding:10px 18px;
      border-radius:18px;
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:bold;
    }

    .currency img{
      width:28px;
      height:28px;
    }

    .profile-card{
      position:absolute;
      top:20px;
      left:20px;
      width:260px;
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(10px);
      border-radius:20px;
      padding:14px;
      display:flex;
      gap:14px;
      align-items:center;
    }

    .profile-card img{
      width:70px;
      height:70px;
      border-radius:50%;
      border:3px solid white;
    }

    .side-menu{
      position:absolute;
      left:20px;
      top:140px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .menu-btn{
      width:74px;
      height:74px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(10px);
      border-radius:22px;
      display:flex;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.25s;
      border:1px solid rgba(255,255,255,0.15);
    }

    .menu-btn:hover{
      transform:scale(1.08);
      background:rgba(255,255,255,0.2);
    }

    .menu-btn img{
      width:38px;
      height:38px;
    }

    .character{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:0;
      height:92%;
      object-fit:contain;
      pointer-events:none;
      animation:float 4s ease-in-out infinite;
    }

    .right-buttons{
      position:absolute;
      right:40px;
      top:50%;
      transform:translateY(-50%);
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .feature-btn{
      width:140px;
      height:140px;
      border-radius:30px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.18);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      cursor:pointer;
      transition:0.3s;
    }

    .feature-btn:hover{
      transform:translateY(-5px) scale(1.03);
    }

    .feature-btn img{
      width:64px;
      height:64px;
      margin-bottom:8px;
    }

    .feature-btn span{
      font-size:20px;
      font-weight:bold;
    }

    .banner-slider{
      position:absolute;
      bottom:20px;
      left:120px;
      display:flex;
      gap:15px;
      overflow-x:auto;
      width:58%;
      padding-bottom:10px;
    }

    .banner-slider img{
      width:320px;
      height:180px;
      object-fit:cover;
      border-radius:24px;
      border:2px solid rgba(255,255,255,0.2);
      transition:0.3s;
      cursor:pointer;
    }

    .banner-slider img:hover{
      transform:scale(1.03);
    }

    .quest-btn{
      position:absolute;
      bottom:40px;
      right:40px;
      width:220px;
      cursor:pointer;
      transition:0.3s;
      animation:pulse 2s infinite;
    }

    .quest-btn:hover{
      transform:scale(1.06);
    }

    .fade-out{
      animation:fadeOut 1s forwards;
    }

    @keyframes fadeOut{
      to{
        opacity:0;
        visibility:hidden;
      }
    }

    @media(max-width:900px){

      .feature-btn{
        width:100px;
        height:100px;
      }

      .feature-btn img{
        width:44px;
        height:44px;
      }

      .banner-slider{
        width:90%;
        left:20px;
      }

      .quest-btn{
        width:160px;
      }

      .logo{
        width:320px;
      }
    }

  </style>
</head>

<body>

  <!-- =========================
       START SCREEN
  ========================== -->

  <div class="screen start-screen" id="startScreen">

    <video class="bg-video" autoplay muted loop playsinline>
      <source src="https://files.catbox.moe/k0x9h1.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <img class="logo"
      src="https://files.catbox.moe/09zcs2.png"
      alt="logo"/>

    <img class="tap-start"
      id="startBtn"
      src="https://files.catbox.moe/x4st1d.png"
      alt="start"/>

  </div>

  <!-- =========================
       MAIN LOBBY
  ========================== -->

  <div class="screen lobby-screen" id="lobbyScreen">

    <video class="bg-video" autoplay muted loop playsinline>
      <source src="https://files.catbox.moe/82malf.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <!-- PROFILE -->

    <div class="profile-card">
      <img src="https://files.catbox.moe/5tkiti.png">

      <div>
        <h2>Hoshizora</h2>
        <p>Lv. 45</p>
        <small>EXP 73%</small>
      </div>
    </div>

    <!-- TOP BAR -->

    <div class="top-bar">

      <div class="currency">
        <img src="https://files.catbox.moe/m1el12.png">
        120/120
      </div>

      <div class="currency">
        <img src="https://files.catbox.moe/sw6qzn.png">
        123,456
      </div>

      <div class="currency">
        <img src="https://files.catbox.moe/iu7jh9.png">
        8,910
      </div>

    </div>

    <!-- SIDE MENU -->

    <div class="side-menu">

      <div class="menu-btn">
        <img src="https://files.catbox.moe/ahuv24.png">
      </div>

      <div class="menu-btn">
        <img src="https://files.catbox.moe/oh2crc.png">
      </div>

      <div class="menu-btn">
        <img src="https://files.catbox.moe/t2tq8v.png">
      </div>

      <div class="menu-btn">
        <img src="https://files.catbox.moe/ienh9z.png">
      </div>

      <div class="menu-btn">
        <img src="https://files.catbox.moe/ehpdje.png">
      </div>

    </div>

    <!-- CHARACTER -->

    <img class="character"
      src="https://files.catbox.moe/wowim7.png">

    <!-- RIGHT BUTTONS -->

    <div class="right-buttons">

      <div class="feature-btn">
        <img src="https://files.catbox.moe/gtj2an.png">
        <span>Shop</span>
      </div>

      <div class="feature-btn">
        <img src="https://files.catbox.moe/t4u1jm.png">
        <span>Gacha</span>
      </div>

      <div class="feature-btn">
        <img src="https://files.catbox.moe/n2xxtz.png">
        <span>Event</span>
      </div>

      <div class="feature-btn">
        <img src="https://files.catbox.moe/g5bg2d.png">
        <span>Story</span>
      </div>

    </div>

    <!-- BANNERS -->

    <div class="banner-slider">

      <img src="https://files.catbox.moe/ayzel7.jpg">

      <img src="https://files.catbox.moe/qw3xtr.png">

      <img src="https://files.catbox.moe/tnd2up.png">

      <img src="https://files.catbox.moe/6zjdt9.png">

      <img src="https://files.catbox.moe/rz95eo.png">

    </div>

    <!-- QUEST -->

    <img class="quest-btn"
      src="https://files.catbox.moe/8kfqeu.png">

  </div>

  <script>

    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const lobbyScreen = document.getElementById("lobbyScreen");

    startBtn.addEventListener("click", ()=>{

      startScreen.classList.add("fade-out");

      setTimeout(()=>{
        startScreen.style.display="none";
        lobbyScreen.style.display="block";
      },1000);

    });

  </script>

</body>
</html>
