<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ユレイカク · Daily Reward & Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 16px);
            position: relative;
            overflow-x: hidden;
        }
        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .game-container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; width: 100%; }
        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: clamp(20px, 5vw, 28px);
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: 20px;
        }
        h2, h3 { color: #f5e6d0; margin-bottom: 16px; text-shadow: 0 1px 2px black; font-size: clamp(1.1rem, 5vw, 1.8rem); }
        .help-btn {
            position: fixed; bottom: 20px; right: 20px; background: #c96a8a; border: none;
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.5rem; cursor: pointer;
            z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.2s; color: white;
        }
        .help-btn:hover { transform: scale(1.1); background: #ff88aa; }
        .tutorial-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(8,5,20,0.98); backdrop-filter: blur(20px); border-radius: 28px;
            padding: 24px; z-index: 2000; width: min(95%, 500px); max-height: 85vh;
            overflow-y: auto; border: 2px solid #ff88aa; color: #f0e0d0;
        }
        .tutorial-modal h3 { color: #ffccaa; margin: 15px 0 8px; }
        .tutorial-modal hr { border-color: #665588; margin: 10px 0; }
        .tutorial-modal ul { padding-left: 20px; margin: 10px 0; }
        .tutorial-modal li { margin: 5px 0; color: #ddccbb; }
        .tutorial-close { position: sticky; top: 0; text-align: right; }
        .tutorial-close button { background: #ff6688; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: white; font-weight: bold; }
        
        .stats-bar { display: flex; flex-wrap: wrap; justify-content: space-between; gap: clamp(8px, 2vw, 12px); margin-bottom: 20px; }
        .stat-card { background: rgba(0,0,0,0.55); border-radius: 60px; padding: clamp(6px,2vw,10px) clamp(12px,3vw,20px); color: #ffefdf; font-weight: bold; font-size: clamp(0.7rem,3vw,0.85rem); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: clamp(6px,1.5vw,12px); margin: 20px 0; }
        .day-card {
            background: rgba(20,12,35,0.92); border-radius: clamp(12px,3vw,20px); padding: clamp(8px,2vw,16px) clamp(4px,1.5vw,8px);
            text-align: center; transition: all 0.3s ease; border: 1px solid #6a4a6a; cursor: pointer; position: relative;
        }
        .day-card.claimable { border: 2px solid #ffaa88; box-shadow: 0 0 15px rgba(255,170,100,0.4); animation: pulse 1.5s infinite; }
        .day-card.claimed { opacity: 0.6; filter: grayscale(0.3); border-color: #4a3a4a; cursor: default; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
        .day-number { font-size: clamp(0.7rem,3vw,1rem); font-weight: bold; color: #ffccaa; }
        .reward-icon { font-size: clamp(1.2rem,5vw,2rem); margin: 6px 0; }
        .day-reward { font-size: clamp(0.55rem,2.5vw,0.7rem); color: #ddcbb0; }
        .bonus-badge { position: absolute; top: -6px; right: -6px; background: #ff7799; border-radius: 50%; width: clamp(18px,5vw,24px); height: clamp(18px,5vw,24px); display: flex; align-items: center; justify-content: center; font-size: clamp(0.6rem,2.5vw,0.7rem); font-weight: bold; color: white; }
        .rarity-common { color: #ccbbaa; }
        .rarity-rare { color: #88aaff; }
        .rarity-epic { color: #cc88ff; }
        .rarity-legendary { color: #ffcc66; text-shadow: 0 0 3px #ffaa44; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%,280px),1fr)); gap: clamp(12px,3vw,20px); margin: 20px 0; }
        .shop-category { background: rgba(15,10,28,0.85); border-radius: clamp(16px,4vw,24px); padding: clamp(12px,3vw,20px); border-left: 4px solid #ff99aa; }
        .shop-category h3 { font-size: clamp(1rem,4vw,1.3rem); margin-bottom: 12px; color: #f5e6d0; }
        .shop-item { background: rgba(0,0,0,0.45); border-radius: 16px; padding: clamp(10px,2.5vw,12px); margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; transition: 0.2s; cursor: pointer; color: #e8ddce; }
        .shop-item:hover { background: rgba(60,40,70,0.7); transform: translateX(5px); }
        .shop-item > div:first-child { font-size: clamp(0.7rem,3vw,0.8rem); }
        .btn-buy { background: #5a3a5a; border: none; padding: clamp(5px,2vw,6px) clamp(12px,3vw,16px); border-radius: 40px; color: #ffefdf; cursor: pointer; font-weight: bold; font-size: clamp(0.7rem,2.5vw,0.8rem); }
        .btn-buy:hover { background: #ff88aa; color: white; }
        .btn-claim { background: linear-gradient(135deg, #8a4a6a, #aa6a8a); border: none; padding: clamp(10px,3vw,12px) clamp(20px,5vw,32px); border-radius: 60px; color: white; font-weight: bold; cursor: pointer; font-size: clamp(0.85rem,3.5vw,1rem); margin: 16px auto; display: block; width: fit-content; }
        .btn-claim:disabled { opacity: 0.5; cursor: not-allowed; }
        .countdown { text-align: center; font-size: clamp(1rem,4vw,1.2rem); color: #ffbb99; margin: 16px 0; }
        .inventory-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,6,22,0.98); backdrop-filter: blur(20px); border-radius: clamp(20px,5vw,32px); padding: clamp(16px,4vw,24px); z-index: 1000; min-width: min(90%,300px); text-align: center; border: 2px solid #ffaa88; animation: popIn 0.3s ease; color: #f5e6d0; }
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 999; }
        .event-banner { background: linear-gradient(90deg, #5a2a4a, #3a2a5a); border-radius: 20px; padding: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #ffbb88; animation: glowPulse 2s infinite; color: #ffe8d0; font-size: clamp(0.8rem,3vw,0.9rem); }
        @keyframes glowPulse { 0%,100%{box-shadow:0 0 5px #ffaa88} 50%{box-shadow:0 0 20px #ff88aa} }
        .nav-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn { background: rgba(30,20,45,0.9); border: 1px solid #e8aa88; padding: 8px 20px; border-radius: 40px; color: #ffefdf; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; }
        .nav-btn:hover { background: #c96a8a; }
        .inventory-summary { display: flex; flex-wrap: wrap; gap: clamp(8px,2vw,12px); margin: 16px 0; justify-content: center; }
        .inv-tag { background: rgba(0,0,0,0.55); padding: clamp(5px,2vw,8px) clamp(10px,3vw,14px); border-radius: 40px; font-size: clamp(0.7rem,2.5vw,0.8rem); color: #fff0e0; font-weight: bold; }
        @media (max-width:650px){ .calendar-grid{ gap:5px; } .reward-icon{ font-size:1.2rem; } .day-number{ font-size:0.7rem; } .day-reward{ font-size:0.55rem; } }
        @media (max-width:480px){ .stats-bar{ flex-direction:column; align-items:center; } .shop-item{ flex-direction:column; text-align:center; } }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>
<button class="help-btn" onclick="showTutorial()">❓</button>

<script>
    const REWARD_TEMPLATES = {
        day1: { name: 'Potion HP 20%', icon: '🧪', type: 'potion', value: 20, baseQty: 5, rarity: 'common' },
        day2: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 10, baseQty: 10, rarity: 'common' },
        day3: { name: 'Topeng Tua Kuno', icon: '🎭', type: 'topeng', value: 2, baseQty: 2, rarity: 'rare' },
        day4: { name: 'Roti Stamina', icon: '🍞', type: 'stamina_bread', value: 10, baseQty: 5, rarity: 'common' },
        day5: { name: 'Apel Pengetahuan', icon: '🍎', type: 'apple', value: 1, baseQty: 1, rarity: 'epic' },
        day6: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 5, baseQty: 5, rarity: 'common' },
        day7: { name: 'Ghost Key', icon: '🔑', type: 'ghost_key', value: 1, baseQty: 1, rarity: 'legendary' }
    };
    const BONUS_POOL = {
        common: [{ name: 'Bonus Coin +3', icon: '🪙', type: 'coin', qty: 3 }],
        rare: [{ name: 'Bonus Coin +10', icon: '🪙', type: 'coin', qty: 10 }],
        epic: [{ name: 'Ghost Key Fragment', icon: '🔑', type: 'ghost_key', qty: 1 }],
        legendary: [{ name: 'LEGENDARY CHEST', icon: '💎', type: 'legendary', qty: 1, value: 5 }]
    };
    const SHOP_ITEMS = {
        potion: [
            { name: 'Potion 5% ×3', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% HP ×3' },
            { name: 'Potion 5% ×5', price: 15, currency: 'ghost_coin', value: 5, qty: 5, desc: 'Pulihkan 5% HP ×5' },
            { name: 'Potion 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% HP ×5' },
            { name: 'Potion 50% ×5', price: 100, currency: 'ghost_coin', value: 50, qty: 5, desc: 'Pulihkan 50% HP ×5' }
        ],
        stamina: [
            { name: 'Roti 5% ×3', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% Stamina ×3' },
            { name: 'Roti 5% ×5', price: 15, currency: 'ghost_coin', value: 5, qty: 5, desc: 'Pulihkan 5% Stamina ×5' },
            { name: 'Roti 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% Stamina ×5' },
            { name: 'Roti 50% ×5', price: 100, currency: 'ghost_coin', value: 50, qty: 5, desc: 'Pulihkan 50% Stamina ×5' }
        ],
        topengToPotion: [
            { name: 'Potion 15% ×2', price: 10, currency: 'topeng', value: 15, qty: 2, desc: 'Tukar 10 Topeng' },
            { name: 'Potion 15% ×5', price: 25, currency: 'topeng', value: 15, qty: 5, desc: 'Tukar 25 Topeng' },
            { name: 'Potion 20% ×5', price: 50, currency: 'topeng', value: 20, qty: 5, desc: 'Tukar 50 Topeng' }
        ],
        topengToStamina: [
            { name: 'Roti 15% ×2', price: 10, currency: 'topeng', value: 15, qty: 2, desc: 'Tukar 10 Topeng' },
            { name: 'Roti 15% ×5', price: 25, currency: 'topeng', value: 15, qty: 5, desc: 'Tukar 25 Topeng' },
            { name: 'Roti 20% ×5', price: 50, currency: 'topeng', value: 20, qty: 5, desc: 'Tukar 50 Topeng' }
        ],
        ghostKey: [
            { name: 'Apel Pengetahuan', price: 5, currency: 'ghost_key', value: 1, qty: 1, desc: 'Buff hint + keberuntungan' },
            { name: 'Apel Pengetahuan ×3', price: 10, currency: 'ghost_key', value: 3, qty: 3, desc: 'Buff hint ×3' },
            { name: 'Apel Pengetahuan ×10', price: 25, currency: 'ghost_key', value: 10, qty: 10, desc: 'Buff hint ×10' }
        ]
    };

    let rewardState = {
        streak: 0, lastClaimDate: null, claimedDays: [],
        currentWeekSeed: Math.random(), weeklyRewards: [],
        inventory: { potion_hp: 0, ghost_coin: 0, topeng: 0, stamina_bread: 0, apple: 0, ghost_key: 0, soul_gem: 0, mystery_box: 0, legendary_chest: 0 },
        activeEvent: null, eventEndTime: null
    };

    let currentPopup = null;
    let currentModal = null;

    function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
    function randomRewardQty(baseQty,rarity){
        let v=rarity==='common'?randomInt(-1,2):rarity==='rare'?randomInt(0,3):rarity==='epic'?randomInt(1,4):randomInt(2,6);
        return Math.max(1,baseQty+v);
    }
    
    function generateWeeklyRewards(){
        let days=[1,2,3,4,5,6,7];
        for(let i=days.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[days[i],days[j]]=[days[j],days[i]];}
        let rewards=[];
        for(let i=0;i<7;i++){
            let template={...REWARD_TEMPLATES[`day${days[i]}`]};
            template.qty=randomRewardQty(template.baseQty,template.rarity);
            let roll=Math.random()*100,bonus=null;
            if(roll<2) bonus=BONUS_POOL.legendary[0];
            else if(roll<7) bonus=BONUS_POOL.epic[0];
            else if(roll<20) bonus=BONUS_POOL.rare[0];
            else if(roll<45) bonus=BONUS_POOL.common[0];
            rewards.push({day:i+1,reward:template,bonus});
        }
        return rewards;
    }
    
    function syncWithMain(){
        let main=localStorage.getItem('yureiKakuSave');
        if(main){
            try{
                let data=JSON.parse(main);
                if(data.inventory){
                    rewardState.inventory.ghost_coin=data.inventory.ghost_coin||0;
                    rewardState.inventory.topeng=data.inventory.topeng||0;
                    rewardState.inventory.potion_hp=data.inventory.potion_hp||0;
                    rewardState.inventory.stamina_bread=data.inventory.stamina_bread||0;
                    rewardState.inventory.apple=data.inventory.apple||0;
                    rewardState.inventory.ghost_key=data.inventory.ghost_key||0;
                    rewardState.inventory.soul_gem=data.inventory.soul_gem||0;
                }
            }catch(e){}
        }
    }
    
    function saveReward(){
        localStorage.setItem('yureiRewardSystem',JSON.stringify(rewardState));
        let main=localStorage.getItem('yureiKakuSave');
        if(main){
            try{
                let data=JSON.parse(main);
                data.inventory={
                    ghost_coin:rewardState.inventory.ghost_coin,
                    topeng:rewardState.inventory.topeng,
                    potion_hp:rewardState.inventory.potion_hp,
                    stamina_bread:rewardState.inventory.stamina_bread,
                    apple:rewardState.inventory.apple,
                    ghost_key:rewardState.inventory.ghost_key,
                    soul_gem:rewardState.inventory.soul_gem
                };
                localStorage.setItem('yureiKakuSave',JSON.stringify(data));
            }catch(e){}
        }
    }
    
    function loadReward(){
        let saved=localStorage.getItem('yureiRewardSystem');
        if(saved){
            try{
                let loaded=JSON.parse(saved);
                rewardState={...rewardState,...loaded};
                if(!rewardState.weeklyRewards||!rewardState.weeklyRewards.length) rewardState.weeklyRewards=generateWeeklyRewards();
                if(rewardState.claimedDays&&rewardState.claimedDays.length>=7) resetWeek();
                if(rewardState.eventEndTime&&Date.now()>rewardState.eventEndTime){rewardState.activeEvent=null;rewardState.eventEndTime=null;}
            }catch(e){resetWeek(true);}
        }else{resetWeek(true);}
        syncWithMain();
    }
    
    function resetWeek(isNew=false){
        rewardState.currentWeekSeed=Math.random();
        rewardState.weeklyRewards=generateWeeklyRewards();
        rewardState.claimedDays=[];
        if(!isNew) rewardState.streak=0;
        saveReward();
    }
    
    function addInv(type,val,qty){
        if(type==='potion') rewardState.inventory.potion_hp+=val*qty;
        else if(type==='coin') rewardState.inventory.ghost_coin+=val*qty;
        else if(type==='topeng') rewardState.inventory.topeng+=val*qty;
        else if(type==='stamina_bread') rewardState.inventory.stamina_bread+=val*qty;
        else if(type==='apple') rewardState.inventory.apple+=val*qty;
        else if(type==='ghost_key') rewardState.inventory.ghost_key+=val*qty;
        else if(type==='soul_gem') rewardState.inventory.soul_gem=(rewardState.inventory.soul_gem||0)+val*qty;
        saveReward();
    }
    
    function showPopup(msg,type){
        if(currentPopup){currentPopup.overlay?.remove();currentPopup.popup?.remove();}
        let ov=document.createElement('div');ov.className='overlay';
        let pop=document.createElement('div');pop.className='inventory-popup';
        pop.innerHTML=`<div style="font-size:2rem;">${type==='success'?'🎉':type==='error'?'❌':'✨'}</div><p style="margin:16px 0;color:#ffdfc0;">${msg}</p><button class="btn-claim" onclick="closePopup()">Tutup</button>`;
        document.body.appendChild(ov);document.body.appendChild(pop);
        currentPopup={overlay:ov,popup:pop};
        setTimeout(()=>{if(currentPopup) closePopup();},3000);
    }
    
    window.closePopup=function(){if(currentPopup){currentPopup.overlay.remove();currentPopup.popup.remove();currentPopup=null;}};
    
    function claimReward(dayIdx){
        let today=new Date().toDateString();
        if(rewardState.claimedDays.includes(dayIdx)){showPopup('Reward sudah diklaim!','error');return false;}
        if(dayIdx!==0&&!rewardState.claimedDays.includes(dayIdx-1)){showPopup('Klaim berurutan dari Hari 1!','error');return false;}
        let r=rewardState.weeklyRewards[dayIdx].reward;
        let finalQty=r.qty;
        addInv(r.type,r.value,finalQty);
        let bonusMsg='';
        if(rewardState.weeklyRewards[dayIdx].bonus){
            let b=rewardState.weeklyRewards[dayIdx].bonus;
            let bonusValue = b.value || b.qty || 1;
            addInv(b.type,bonusValue,1);
            bonusMsg=` + Bonus: ${b.icon} ${b.name}!`;
        }
        rewardState.claimedDays.push(dayIdx);
        rewardState.lastClaimDate=today;
        rewardState.streak++;
        saveReward();
        showPopup(`🎁 CLAIMED! ${r.icon} ${r.name} x${finalQty}${bonusMsg}`,'success');
        if(rewardState.claimedDays.length>=7){showPopup('🎉 MINGGU SELESAI! Reward direset!','event');resetWeek();}
        render();return true;
    }
    
    function buyItem(cat,idx){
        let item=SHOP_ITEMS[cat][idx];
        if(rewardState.inventory[item.currency]>=item.price){
            rewardState.inventory[item.currency]-=item.price;
            addInv(cat==='potion'?'potion':cat==='stamina'?'stamina_bread':cat==='ghostKey'?'apple':'potion',item.value,item.qty);
            saveReward();
            showPopup(`✅ Membeli: ${item.name}!`,'success');
            render();
        }else{showPopup(`❌ ${item.currency.toUpperCase()} tidak cukup!`,'error');}
    }
    
    function getNextReset(){let t=new Date();t.setDate(t.getDate()+1);t.setHours(0,0,0,0);return t;}
    
    function showTutorial() {
        if(currentModal) { currentModal.remove(); currentModal = null; }
        const overlay = document.createElement('div'); overlay.className = 'overlay';
        const modal = document.createElement('div'); modal.className = 'tutorial-modal';
        modal.innerHTML = `
            <div class="tutorial-close"><button onclick="closeTutorial()">✕</button></div>
            <h2 style="text-align:center; color:#ffccaa;">📖 PANDUAN DAILY & SHOP</h2>
            <hr>
            <h3>🎁 Daily Reward</h3>
            <ul><li>Klaim hadiah setiap hari untuk mendapatkan item gratis</li><li>Hadiah akan diacak setiap minggu</li><li>Streak meningkat setiap hari → peluang bonus lebih besar</li><li>Klaim 7 hari berturut-turut → reward direset otomatis</li></ul>
            <h3>🏪 Shop & Mata Uang</h3>
            <ul><li>🪙 Ghost Coin - Mata uang utama, dari Daily Reward dan teka-teki</li><li>🎭 Topeng Tua Kuno - Mata uang alternatif, dari reward langka</li><li>🔑 Ghost Key - Mata uang super langka, dari Daily Reward hari ke-7</li><li>💎 Permata Jiwa - Mata uang untuk membeli skin di Events</li></ul>
            <h3>🛒 Cara Bertransaksi</h3>
            <ul><li>Klik item yang ingin dibeli di kategori yang sesuai</li><li>Pastikan currency mencukupi</li><li>Item akan langsung masuk ke inventory</li></ul>
            <hr><p style="text-align:center; font-size:0.7rem;">✨ Klaim setiap hari! ✨</p>
        `;
        document.body.appendChild(overlay); document.body.appendChild(modal);
        currentModal = { overlay, modal };
    }
    function closeTutorial() { if(currentModal) { currentModal.overlay.remove(); currentModal.modal.remove(); currentModal = null; } }
    window.showTutorial = showTutorial;
    window.closeTutorial = closeTutorial;
    
    function render(){
        let app=document.getElementById('app');
        if(!app)return;
        let now=new Date(),next=getNextReset(),diff=next-now,h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
        let canClaim=rewardState.lastClaimDate!==now.toDateString()&&rewardState.claimedDays.length<7&&(rewardState.claimedDays.length===0||rewardState.claimedDays.includes(rewardState.claimedDays.length-1));
        let nextDay=rewardState.claimedDays.length;
        app.innerHTML=`
            <div class="glass-panel">
                <div class="nav-buttons">
                    <a href="index.html" class="nav-btn">🎮 Game Utama</a>
                    <a href="characters.html" class="nav-btn">👥 Karakter</a>
                    <a href="events.html" class="nav-btn">🎪 Events</a>
                </div>
                <h2>🎁 DAILY REWARD</h2>
                <div class="stats-bar">
                    <div class="stat-card">🔥 Streak: ${rewardState.streak} hari</div>
                    <div class="stat-card">📦 Minggu ke-${Math.floor(rewardState.claimedDays.length/7)+1}</div>
                </div>
                ${rewardState.activeEvent?`<div class="event-banner">✨ ${rewardState.activeEvent.name} ACTIVE! ✨</div>`:''}
                <div class="calendar-grid">
                    ${rewardState.weeklyRewards.map((rw,idx)=>{
                        let claimed=rewardState.claimedDays.includes(idx);
                        let claimable=!claimed&&idx===nextDay&&canClaim;
                        let r=rw.reward;
                        return `<div class="day-card ${claimable?'claimable':''} ${claimed?'claimed':''}" onclick="${claimable?`claimReward(${idx})`:''}">
                            <div class="day-number">Hari ${idx+1}</div>
                            <div class="reward-icon">${r.icon}</div>
                            <div class="day-reward ${r.rarity?`rarity-${r.rarity}`:''}">${r.name}<br>x${r.qty}</div>
                            ${rw.bonus?'<div class="bonus-badge">✨</div>':''}
                            ${claimed?'<div style="font-size:0.6rem;">✓ CLAIMED</div>':''}
                        </div>`;
                    }).join('')}
                </div>
                <div class="countdown">⏰ Reset harian dalam: ${h} jam ${m} menit</div>
                <button class="btn-claim" ${!canClaim?'disabled style="opacity:0.5;"':''} onclick="if(${canClaim}) claimReward(${nextDay})">
                    ${canClaim?'🎁 KLAIM HADIAH HARI INI 🎁':'⏳ Tunggu reset besok'}
                </button>
            </div>
            <div class="glass-panel"><h3>🎒 Inventori</h3><div class="inventory-summary">
                <div class="inv-tag">🧪 Potion: ${rewardState.inventory.potion_hp}%</div>
                <div class="inv-tag">🪙 Ghost Coin: ${rewardState.inventory.ghost_coin}</div>
                <div class="inv-tag">🎭 Topeng: ${rewardState.inventory.topeng}</div>
                <div class="inv-tag">🍞 Roti: ${rewardState.inventory.stamina_bread}%</div>
                <div class="inv-tag">🍎 Apel: ${rewardState.inventory.apple}</div>
                <div class="inv-tag">🔑 Ghost Key: ${rewardState.inventory.ghost_key}</div>
                <div class="inv-tag" style="background:#8a6a3a;">💎 ${rewardState.inventory.soul_gem || 0}</div>
            </div></div>
            <div class="glass-panel"><h2>🏪 GHOST SHOP</h2><div class="shop-grid">
                <div class="shop-category"><h3>🪙 Ghost Coin Exchange</h3>
                    ${SHOP_ITEMS.potion.map((it,i)=>`<div class="shop-item" onclick="buyItem('potion',${i})"><div>🧪 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🪙 <button class="btn-buy">Beli</button></div></div>`).join('')}
                    ${SHOP_ITEMS.stamina.map((it,i)=>`<div class="shop-item" onclick="buyItem('stamina',${i})"><div>🍞 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🪙 <button class="btn-buy">Beli</button></div></div>`).join('')}
                </div>
                <div class="shop-category"><h3>🎭 Topeng Tua Kuno Exchange</h3>
                    ${SHOP_ITEMS.topengToPotion.map((it,i)=>`<div class="shop-item" onclick="buyItem('topengToPotion',${i})"><div>🧪 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🎭 <button class="btn-buy">Tukar</button></div></div>`).join('')}
                    ${SHOP_ITEMS.topengToStamina.map((it,i)=>`<div class="shop-item" onclick="buyItem('topengToStamina',${i})"><div>🍞 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🎭 <button class="btn-buy">Tukar</button></div></div>`).join('')}
                </div>
                <div class="shop-category"><h3>🔑 Ghost Key Exchange</h3>
                    ${SHOP_ITEMS.ghostKey.map((it,i)=>`<div class="shop-item" onclick="buyItem('ghostKey',${i})"><div>🍎 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🔑 <button class="btn-buy">Tukar</button></div></div>`).join('')}
                </div>
            </div></div>
        `;
    }
    
    function createParticles(){
        let count=Math.min(40,Math.floor(window.innerWidth/30));
        for(let i=0;i<count;i++){
            let p=document.createElement('div');p.className='particle';
            p.style.width=Math.random()*4+2+'px';p.style.height=p.style.width;
            p.style.left=Math.random()*100+'%';
            p.style.animationDuration=Math.random()*15+10+'s';
            p.style.animationDelay=Math.random()*10+'s';
            document.body.appendChild(p);
        }
    }
    
    window.claimReward=claimReward;
    window.buyItem=buyItem;
    
    loadReward();
    createParticles();
    render();
    setInterval(()=>{render();},60000);
    window.addEventListener('resize',()=>{document.querySelectorAll('.particle').forEach(p=>p.remove());createParticles();});
</script>
</body>
</html>
