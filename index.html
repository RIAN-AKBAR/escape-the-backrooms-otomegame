<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Devil's Embrace - Otome Tale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent accidental text selection on taps */
        }

        body {
            background: #0b0710;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 16px;
        }

        /* game container - mimicking mobile otome UI */
        .game-container {
            max-width: 400px;
            width: 100%;
            background: #120e1c;
            border-radius: 42px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.2s;
        }

        /* status bar / top header */
        .status-bar {
            background: #0f0b17;
            padding: 12px 20px 8px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #e7d9ff;
            border-bottom: 1px solid #2a2340;
            letter-spacing: 0.3px;
        }

        .level-badge {
            background: #2a1e4a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 12px;
        }

        .battery-time {
            display: flex;
            gap: 12px;
        }

        /* main character & header section with "master" vibe */
        .master-header {
            background: linear-gradient(145deg, #1e1730, #120c1f);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #362b53;
        }

        .master-title {
            font-weight: bold;
            background: #ffd96620;
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            color: #ffdf9c;
            border: 0.5px solid #ffcf7a50;
        }

        .master-title span {
            font-size: 16px;
            margin-right: 6px;
        }

        .resources {
            display: flex;
            gap: 16px;
            font-weight: bold;
        }

        .resource {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #00000040;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 13px;
        }

        .resource-icon {
            font-size: 16px;
        }

        /* notebook / chat preview */
        .chat-area {
            padding: 20px;
            background: #1a142b;
            border-bottom: 1px solid #332b4a;
        }

        .character-message {
            background: #261e3c;
            border-radius: 28px;
            padding: 16px 20px;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
        }

        .speaker {
            font-weight: bold;
            color: #ffbb77;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speaker-name {
            font-size: 18px;
        }

        .speaker-tag {
            font-size: 10px;
            background: #00000060;
            padding: 2px 8px;
            border-radius: 30px;
        }

        .dialogue-text {
            color: #f0eaff;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* stat cards (like the low/high characters) */
        .stats-grid {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            background: #0f0c18;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .stat-card {
            background: #201b32;
            border-radius: 28px;
            padding: 8px 16px;
            flex: 1;
            text-align: center;
            min-width: 70px;
            border: 1px solid #3d315f;
        }

        .stat-label {
            font-size: 12px;
            color: #9186b3;
            letter-spacing: 1px;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
            color: #ffdfb3;
        }

        /* affection styles */
        .affinity-low {
            color: #c0b0e0;
        }
        .affinity-high {
            color: #ffbc6e;
            text-shadow: 0 0 2px #ff9f3a;
        }

        /* Buttons & tasks (like Tap, Transfer, etc) */
        .action-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 20px;
            background: #130e20;
            border-top: 1px solid #2f264b;
            border-bottom: 1px solid #2f264b;
        }

        .action-btn {
            background: none;
            border: none;
            color: #cfc2f0;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.1s linear;
            padding: 8px 12px;
            border-radius: 60px;
        }

        .action-btn:active {
            background: #2a2046;
            transform: scale(0.96);
        }

        .action-icon {
            font-size: 24px;
        }

        /* tasks / sale list */
        .tasks-section {
            padding: 16px 20px;
            background: #110d1c;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: #b9a9ff;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: #251e3b;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #ffaa44;
        }

        .task-info {
            display: flex;
            flex-direction: column;
        }

        .task-name {
            font-weight: bold;
            color: #f2e6ff;
        }

        .task-time {
            font-size: 11px;
            color: #ab9cd9;
        }

        .task-reward {
            background: #00000050;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            color: #ffd966;
        }

        /* level up overlay / modal */
        .levelup-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .levelup-card {
            background: #211a36;
            border-radius: 48px;
            padding: 28px 24px;
            text-align: center;
            max-width: 280px;
            width: 80%;
            border: 1px solid #c9ab6f;
            box-shadow: 0 20px 30px black;
        }

        .levelup-card h2 {
            color: #ffcd94;
            margin-bottom: 8px;
        }

        .reward-line {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            color: #ffdd99;
        }

        .close-modal {
            background: #ffb347;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }

        /* attack monster mini */
        .monster-event {
            background: #0e0920;
            margin: 12px 20px;
            border-radius: 40px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #4a3c72;
        }

        .monster-event:active {
            background: #2e2352;
        }

        .monster-name {
            font-weight: bold;
        }

        .btn-attack {
            background: #a749ff;
            padding: 6px 18px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
        }

        footer {
            text-align: center;
            font-size: 10px;
            padding: 12px;
            color: #4a3e6e;
            background: #0b0814;
        }

        button {
            background: none;
            border: none;
            color: inherit;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <!-- status bagian atas -->
    <div class="status-bar">
        <div class="level-badge">Lv.<span id="playerLevel">2</span> <span id="playerExpPercent">66%</span></div>
        <div class="battery-time"><span>09:28</span><span>📱 5G</span></div>
    </div>

    <!-- master header -->
    <div class="master-header">
        <div class="master-title"><span>👑</span> One master to rule them all!</div>
        <div class="resources">
            <div class="resource"><span class="resource-icon">💎</span> <span id="diamondCount">136</span></div>
            <div class="resource"><span class="resource-icon">❤️</span> <span id="affectionTotal">51</span></div>
        </div>
    </div>

    <!-- chat / dialog area -->
    <div class="chat-area" id="chatArea">
        <div class="character-message">
            <div class="speaker">
                <span class="speaker-name" id="speakerName">Mammon</span>
                <span class="speaker-tag">● Demon</span>
            </div>
            <div class="dialogue-text" id="dialogueText">
                Hey... Oi... All right, already! Pay attention to me!
            </div>
        </div>
    </div>

    <!-- stat affinity grid (karakter Low/High) -->
    <div class="stats-grid" id="affinityGrid">
        <!-- diisi oleh js berdasarkan config -->
    </div>

    <!-- action bar: Tap, Transfer, Data, Notices, Support -->
    <div class="action-bar">
        <button class="action-btn" id="tapBtn"><span class="action-icon">👆</span><span>Tap</span></button>
        <button class="action-btn" id="transferBtn"><span class="action-icon">🔄</span><span>Transfer</span></button>
        <button class="action-btn" id="dataBtn"><span class="action-icon">📊</span><span>Data</span></button>
        <button class="action-btn" id="noticesBtn"><span class="action-icon">📢</span><span>Notices</span></button>
        <button class="action-btn" id="supportBtn"><span class="action-icon">🎴</span><span>Support</span></button>
    </div>

    <!-- monster attack section (konsep attack the monster) -->
    <div class="monster-event" id="monsterAttackBtn">
        <div class="monster-name">⚔️ Shadow Beast</div>
        <div class="btn-attack">Attack the monster!</div>
    </div>

    <!-- tasks & sale -->
    <div class="tasks-section">
        <div class="section-title">
            <span>✨ Your Tasks! ✨</span>
            <span>Sale 🔥</span>
        </div>
        <div class="task-list" id="taskList">
            <!-- dynamic tasks from config -->
        </div>
    </div>

    <footer>📜 Lesson 1 · 9/24 · DEA 43:57:03 · STAYC</footer>
</div>

<!-- level up modal -->
<div id="levelupModal" class="levelup-modal">
    <div class="levelup-card">
        <h2>🌟 Lv.UP 🌟</h2>
        <p id="levelupChar">Katsumi</p>
        <div class="reward-line">
            <span>EXP +100</span> <span>✨</span>
        </div>
        <div>Demon Memory +</div>
        <div id="modalRewards">x250 Rewards</div>
        <button class="close-modal" id="closeModalBtn">OK</button>
    </div>
</div>

<script src="config.js"></script>
<script>
    // ======================== GAME STATE =========================
    // Data akan di-sync dengan config jika diperlukan, tapi kita simpan state disini
    let gameData = {
        player: {
            level: 2,
            exp: 66,     // percent based
            maxExp: 100,
            diamonds: 136,
            totalAffection: 51
        },
        characters: [],   // akan diisi dari config
        tasks: [],
        dialogues: [],
        currentDialogueIndex: 0,
        monsterDefeatedCounter: 0,
        levelUpFlag: false,
    };

    // Fungsi untuk render UI
    function renderAffinity() {
        const container = document.getElementById('affinityGrid');
        if (!container) return;
        container.innerHTML = '';
        gameData.characters.forEach(char => {
            const card = document.createElement('div');
            card.className = 'stat-card';
            const isHigh = char.affinity === 'High';
            card.innerHTML = `
                <div class="stat-label">${char.name}</div>
                <div class="stat-value ${isHigh ? 'affinity-high' : 'affinity-low'}">${char.affinity}</div>
            `;
            container.appendChild(card);
        });
    }

    function renderTasks() {
        const taskContainer = document.getElementById('taskList');
        if (!taskContainer) return;
        taskContainer.innerHTML = '';
        gameData.tasks.forEach(task => {
            const taskDiv = document.createElement('div');
            taskDiv.className = 'task-item';
            taskDiv.innerHTML = `
                <div class="task-info">
                    <div class="task-name">${task.name}</div>
                    <div class="task-time">${task.timeLeft}</div>
                </div>
                <div class="task-reward">${task.reward}</div>
            `;
            taskContainer.appendChild(taskDiv);
        });
    }

    function updatePlayerStatsUI() {
        document.getElementById('playerLevel').innerText = gameData.player.level;
        document.getElementById('playerExpPercent').innerText = `${gameData.player.exp}%`;
        document.getElementById('diamondCount').innerText = gameData.player.diamonds;
        document.getElementById('affectionTotal').innerText = gameData.player.totalAffection;
    }

    // dialog next (tap button)
    function nextDialogue() {
        if (gameData.dialogues.length === 0) return;
        // siklus sederhana
        gameData.currentDialogueIndex = (gameData.currentDialogueIndex + 1) % gameData.dialogues.length;
        const line = gameData.dialogues[gameData.currentDialogueIndex];
        document.getElementById('speakerName').innerText = line.speaker;
        document.getElementById('dialogueText').innerText = line.text;
        // efek kecil: ketika tap, bisa tambah affection dikit (game loop)
        addAffection(1);
        addExp(2);
    }

    function addAffection(amount) {
        gameData.player.totalAffection += amount;
        if (gameData.player.totalAffection > 999) gameData.player.totalAffection = 999;
        updatePlayerStatsUI();
        // random update karakter affinity dinamis untuk interaksi
        if (Math.random() > 0.6 && gameData.characters.length) {
            let randChar = gameData.characters[Math.floor(Math.random() * gameData.characters.length)];
            if (randChar.affinity === 'Low' && gameData.player.totalAffection % 12 === 0) {
                randChar.affinity = 'High';
                renderAffinity();
            } else if (randChar.affinity === 'High' && Math.random() > 0.97) {
                // just for fun jaga keseimbangan
            }
        }
        renderAffinity();
    }

    function addExp(expPercentGain) {
        let newExp = gameData.player.exp + expPercentGain;
        let levelUp = false;
        let levelUpsCount = 0;
        while (newExp >= 100) {
            newExp -= 100;
            gameData.player.level++;
            levelUpsCount++;
            levelUp = true;
            // gain rewards each level
            gameData.player.diamonds += 50;
            gameData.player.totalAffection += 15;
        }
        if (levelUp) {
            gameData.player.exp = newExp;
            updatePlayerStatsUI();
            showLevelUpModal(levelUpsCount);
        } else {
            gameData.player.exp = newExp;
            updatePlayerStatsUI();
        }
    }

    function showLevelUpModal(levelUps) {
        const modal = document.getElementById('levelupModal');
        const rewardText = document.getElementById('modalRewards');
        const charSpan = document.getElementById('levelupChar');
        charSpan.innerText = `Master Lv.${gameData.player.level}`;
        rewardText.innerHTML = `✨ +${50 * levelUps} Diamonds · +${15 * levelUps} Affection ✨`;
        modal.style.visibility = 'visible';
        modal.style.opacity = '1';
        document.getElementById('closeModalBtn').onclick = () => {
            modal.style.visibility = 'hidden';
            modal.style.opacity = '0';
        };
        updatePlayerStatsUI();
        renderAffinity();
    }

    function attackMonster() {
        // monster attack mechanic: dapat affection & diamond, exp
        const gainDiamond = Math.floor(Math.random() * 15) + 5;
        const gainAffection = Math.floor(Math.random() * 8) + 3;
        const gainExp = Math.floor(Math.random() * 8) + 4;
        gameData.player.diamonds += gainDiamond;
        gameData.player.totalAffection += gainAffection;
        addExp(gainExp);
        // flash efek dialog
        const oldSpeaker = document.getElementById('speakerName').innerText;
        const oldText = document.getElementById('dialogueText').innerText;
        document.getElementById('speakerName').innerText = "⚔️ Battle ⚔️";
        document.getElementById('dialogueText').innerText = `You defeated the monster! +${gainDiamond}💎 +${gainAffection}❤️ +${gainExp}% EXP`;
        setTimeout(() => {
            if (gameData.dialogues[gameData.currentDialogueIndex]) {
                document.getElementById('speakerName').innerText = gameData.dialogues[gameData.currentDialogueIndex].speaker;
                document.getElementById('dialogueText').innerText = gameData.dialogues[gameData.currentDialogueIndex].text;
            } else {
                document.getElementById('speakerName').innerText = "Mammon";
                document.getElementById('dialogueText').innerText = "Good work, human! Keep going!";
            }
        }, 1800);
        updatePlayerStatsUI();
        renderAffinity();
    }

    function transferAction() {
        // transfer effect: mimic data transfer atau tukar resource kecil
        addAffection(5);
        addExp(2);
        gameData.player.diamonds += 10;
        updatePlayerStatsUI();
        // notif singkat
        const notifMsg = document.getElementById('dialogueText');
        const oldSpeaker = document.getElementById('speakerName').innerText;
        document.getElementById('speakerName').innerText = "System";
        const oldDialog = notifMsg.innerText;
        notifMsg.innerText = "✨ Transfer successful! +10 Gems, +5 Affection ✨";
        setTimeout(() => {
            if (gameData.dialogues[gameData.currentDialogueIndex]) {
                document.getElementById('speakerName').innerText = gameData.dialogues[gameData.currentDialogueIndex].speaker;
                document.getElementById('dialogueText').innerText = gameData.dialogues[gameData.currentDialogueIndex].text;
            }
        }, 1500);
    }

    function showDataPanel() {
        alert(`📊 [Data Report] \nLevel: ${gameData.player.level}\nExp: ${gameData.player.exp}%\n💎: ${gameData.player.diamonds}\n❤️ Total Affection: ${gameData.player.totalAffection}\nMonsters slain: ${gameData.monsterDefeatedCounter || 0}`);
    }
    function showNotices() {
        alert("📢 Notices: Beginner sale 4 days left! Limited time event: 'Demon's Promise'. Get double affection till weekend!");
    }
    function showSupport() {
        alert("🎴 Support Hub: Contact Master Lilith. Tips: Tap dialogue & attack monster daily!");
    }

    // inisialisasi dari config (config.js akan mendefinisikan window.OTOME_CONFIG)
    function loadConfig() {
        // cek config global dari file config.js
        if (window.OTOME_CONFIG) {
            const cfg = window.OTOME_CONFIG;
            gameData.characters = cfg.characters || [
                { name: "Kimiya Koshigiri", affinity: "Low" },
                { name: "Koji Sakai", affinity: "High" },
                { name: "Takashi Jinnai", affinity: "Low" },
                { name: "Naomasa Koshigiri", affinity: "Low" }
            ];
            gameData.tasks = cfg.tasks || [
                { name: "Akulber Beginner", timeLeft: "4 days left", reward: "Sale" },
                { name: "Akuban Beginner", timeLeft: "4 days left", reward: "Sale" },
                { name: "Daily Task", timeLeft: "328 days left", reward: "x2 Gems" },
                { name: "Nightmare Dungeon", timeLeft: "12 hrs", reward: "Memory Shard" }
            ];
            gameData.dialogues = cfg.dialogues || [
                { speaker: "Mammon", text: "Hey... Oi... All right, already! Pay attention to me!" },
                { speaker: "Asmodeus", text: "Asahuman, it will probably take a little while for you to adjust to things here in the Devildom." },
                { speaker: "Katsumi", text: "Lv. UP potential! Let's grow stronger together, master." },
                { speaker: "Kimiya", text: "I sense a great power within you... Perhaps you are the chosen one." },
                { speaker: "Lucifer", text: "Don't disappoint me. Show me your resolve." }
            ];
            if (cfg.playerOverrides) {
                if (cfg.playerOverrides.level) gameData.player.level = cfg.playerOverrides.level;
                if (cfg.playerOverrides.diamonds) gameData.player.diamonds = cfg.playerOverrides.diamonds;
                if (cfg.playerOverrides.affection) gameData.player.totalAffection = cfg.playerOverrides.affection;
                if (cfg.playerOverrides.expPercent) gameData.player.exp = cfg.playerOverrides.expPercent;
            }
        } else {
            // fallback data berdasarkan screenshot
            gameData.characters = [
                { name: "Kimiya Koshigiri", affinity: "Low" },
                { name: "Koji Sakai", affinity: "High" },
                { name: "Takashi Jinnai", affinity: "Low" },
                { name: "Naomasa Koshigiri", affinity: "Low" }
            ];
            gameData.tasks = [
                { name: "Akulber Beginner", timeLeft: "4 days left", reward: "Sale" },
                { name: "Akuban Beginner", timeLeft: "4 days left", reward: "Sale" },
                { name: "Devil's Contract", timeLeft: "328 days left", reward: "Sale" },
                { name: "STAYC Event", timeLeft: "4 days left", reward: "Ticket" }
            ];
            gameData.dialogues = [
                { speaker: "Mammon", text: "Hey... Oi... All right, already! Pay attention to me!" },
                { speaker: "Asahuman", text: "Asahuman, it will probably take a little while for you to adjust to things here in the Devildom." },
                { speaker: "Katsumi", text: "Lv.2 → Lv.3 soon! Attack the monster for extra exp." }
            ];
        }
        renderAffinity();
        renderTasks();
        updatePlayerStatsUI();
        if (gameData.dialogues.length) {
            document.getElementById('speakerName').innerText = gameData.dialogues[0].speaker;
            document.getElementById('dialogueText').innerText = gameData.dialogues[0].text;
        }
    }

    // event bind
    function bindEvents() {
        document.getElementById('tapBtn').addEventListener('click', () => nextDialogue());
        document.getElementById('transferBtn').addEventListener('click', () => transferAction());
        document.getElementById('dataBtn').addEventListener('click', () => showDataPanel());
        document.getElementById('noticesBtn').addEventListener('click', () => showNotices());
        document.getElementById('supportBtn').addEventListener('click', () => showSupport());
        document.getElementById('monsterAttackBtn').addEventListener('click', () => {
            attackMonster();
            gameData.monsterDefeatedCounter = (gameData.monsterDefeatedCounter || 0) + 1;
        });
    }

    // tambahan exp intermitten bisa dari task click? optional: tasks click efek
    function initGame() {
        loadConfig();
        bindEvents();
        // initial display
        setInterval(() => {
            // background effect: maybe no auto, tapi biar dinamis
        }, 1000);
    }

    initGame();
</script>
</body>
</html>
