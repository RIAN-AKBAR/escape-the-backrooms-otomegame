<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE BACKROOMS · Otome Horror Visual Novel</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-glow: #e7b874;
            --horror-red: #8b0000;
            --bg-dark: #0a0804;
            --text-light: #f5efda;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0804, #010100);
            font-family: 'Quicksand', 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* EFFECTS */
        .noise::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle, rgba(0,0,0,0.4) 0px, rgba(0,0,0,0.4) 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 998;
            opacity: 0.4;
            mix-blend-mode: overlay;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 997;
            transition: opacity 0.3s;
        }

        .heartbeat-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(139,0,0,0.1);
            pointer-events: none;
            z-index: 996;
            display: none;
            animation: heartbeat 0.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.3; }
        }

        .breathing-screen {
            transition: transform 0.1s ease-out;
        }

        /* LOADING SCREEN */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020100;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }
        .loading-logo {
            font-size: clamp(3rem, 10vw, 5rem);
            color: #e7b874;
            text-shadow: 0 0 30px #ffaa44;
            animation: pulseGlow 1.2s infinite;
            margin-bottom: 30px;
        }
        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 5px #ffaa44; opacity: 0.7; transform: scale(1);}
            50% { text-shadow: 0 0 40px #ffcc66; opacity: 1; transform: scale(1.05);}
        }
        .loading-text {
            font-family: 'Source Code Pro', monospace;
            color: #d4bc7a;
            font-size: clamp(0.8rem, 4vw, 1.3rem);
            letter-spacing: 5px;
        }
        .loading-bar {
            width: min(300px, 70vw);
            height: 4px;
            background: #332a1a;
            border-radius: 4px;
            margin-top: 30px;
            overflow: hidden;
        }
        .loading-progress {
            width: 100%;
            height: 100%;
            background: #e7b874;
            animation: loadProgress 2s ease forwards;
        }
        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* LOBBY SCREEN */
        .lobby-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0d0b07 0%, #1a1610 100%);
            z-index: 9000;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }
        .lobby-header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid #ab8e54;
            margin-bottom: 30px;
        }
        .lobby-header h1 {
            color: #e7b874;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            text-shadow: 0 0 10px #ffaa44;
            letter-spacing: 3px;
        }
        .characters-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 50px;
        }
        .lobby-char-card {
            background: #1f1b12cc;
            backdrop-filter: blur(10px);
            border: 2px solid #ab8e54;
            border-radius: 20px;
            padding: 20px;
            width: min(200px, 40vw);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .lobby-char-card:hover {
            transform: translateY(-10px);
            border-color: #e7b874;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lobby-char-img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin: 0 auto 10px;
            display: block;
            border: 3px solid #e7c27d;
        }
        .lobby-char-name {
            color: #f7e5b3;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            font-weight: bold;
        }
        .bottom-right {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }
        .enter-game-btn {
            background: #e7b874;
            border: none;
            padding: 12px 30px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            border-radius: 50px;
            color: #1a1610;
            cursor: pointer;
            transition: 0.3s;
        }
        .reset-progress {
            background: #4a2f2f;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: #ffccaa;
            cursor: pointer;
        }

        /* GAME SCREEN */
        .game-container {
            width: 100vw;
            height: 100vh;
            background: #0a0804;
            display: none;
            flex-direction: column;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9500;
        }

        /* CHARACTER AREA */
        .character-stage {
            flex: 3;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center, #1a1510 0%, #050302 100%);
            cursor: pointer;
        }

        .character-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .character-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center 55%;
            filter: drop-shadow(0 0 30px rgba(231,194,125,0.15));
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* Animasi karakter */
        @keyframes breathe {
            0%, 100% { transform: scale(1) translateY(0px); }
            50% { transform: scale(1.008) translateY(-3px); }
        }
        @keyframes blink {
            0%, 90%, 100% { opacity: 1; }
            95% { opacity: 0; }
        }
        @keyframes floatIdle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes bounceReaction {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes shakeScreen {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 0); }
            75% { transform: translate(5px, 0); }
        }
        @keyframes zoomGlow {
            0% { filter: drop-shadow(0 0 10px rgba(231,194,125,0)); }
            100% { filter: drop-shadow(0 0 40px rgba(231,194,125,0.6)); }
        }

        .character-image.breathing {
            animation: breathe 3s ease-in-out infinite;
        }
        .character-image.floating {
            animation: floatIdle 4s ease-in-out infinite;
        }
        .character-image.bounce-effect {
            animation: bounceReaction 0.2s ease-in-out;
        }

        .reaction-bubble {
            position: absolute;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #e7b874;
            border-radius: 20px;
            padding: 8px 16px;
            color: #ffdfaa;
            font-size: 0.9rem;
            white-space: nowrap;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            font-weight: bold;
        }
        .reaction-bubble.show {
            opacity: 1;
            animation: bubblePop 0.3s ease-out;
        }
        @keyframes bubblePop {
            0% { transform: translateX(-50%) scale(0.8); opacity: 0; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }

        /* STATUS PANEL */
        .status-panel {
            background: #0c0b08cc;
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: #f2e0b0;
            border-bottom: 1px solid #8b7a4b;
            flex-wrap: wrap;
            z-index: 10;
            position: relative;
        }
        .affection-bar {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }
        .affection-heart {
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        /* DIALOG AREA - CINEMATIC */
        .dialog-area {
            flex: 1;
            margin: 10px 15px 15px;
            background: rgba(10,8,5,0.9);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(180,141,71,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 15;
            transition: all 0.3s;
        }
        .dialog-box {
            padding: 18px 24px;
            flex: 1;
        }
        .speaker-name {
            color: #ffdfaa;
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-left: 4px solid #edb15d;
            padding-left: 14px;
            transition: text-shadow 0.2s;
        }
        .speaker-name.glow {
            text-shadow: 0 0 8px #e7b874;
        }
        .dialog-text {
            font-family: 'Source Code Pro', monospace;
            font-size: 1rem;
            line-height: 1.5;
            color: #f5efda;
            min-height: 70px;
            max-height: 120px;
            overflow-y: auto;
        }
        .next-button {
            align-self: flex-end;
            background: rgba(42,36,25,0.9);
            border: none;
            color: #ecd68a;
            padding: 8px 25px;
            margin: 5px 18px 15px 0;
            border-radius: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s;
            backdrop-filter: blur(5px);
        }
        .actions-area {
            background: rgba(24,20,14,0.7);
            padding: 12px 15px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 2px solid #ac8e54;
            z-index: 15;
            position: relative;
        }
        .vn-btn {
            background: rgba(38,32,17,0.9);
            border: 2px solid #dbb062;
            color: #fff0cc;
            padding: 8px 20px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
            font-weight: bold;
        }
        .vn-btn:hover { background: #5f482a; transform: translateY(-2px);}
        .qte-alert { background: #a12f2f; animation: pulseBtn 1s infinite; }
        @keyframes pulseBtn { 0%,100% { background: #a12f2f;} 50% { background: #d64b4b; }}
        .puzzle-input {
            background: #32291b;
            border: 2px solid #e2b15e;
            padding: 8px 15px;
            border-radius: 50px;
            color: #ffe3a3;
            text-align: center;
        }
        .back-to-lobby {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(42,36,25,0.9);
            border: none;
            color: #ecd68a;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        .gameover-overlay {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background:#000000dd; backdrop-filter: blur(6px);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000; flex-direction: column; gap: 24px;
            font-size: 1.5rem;
            color: #e7b874;
        }
        .hidden { display: none; }
        footer { font-size: 0.6rem; text-align: center; color: #67604b; padding: 6px; background: #0a0805aa; }

        @media (max-width: 768px) {
            .status-panel { font-size: 0.7rem; padding: 6px 12px; gap: 12px; }
            .dialog-box { padding: 12px 16px; }
            .speaker-name { font-size: 0.9rem; }
            .dialog-text { font-size: 0.85rem; }
            .character-image { object-position: center 45%; }
        }
    </style>
</head>
<body class="noise">
    <div class="vignette" id="vignette"></div>
    <div class="heartbeat-overlay" id="heartbeatOverlay"></div>

    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo"><i class="fas fa-door-open"></i></div>
        <div class="loading-text">THE BACKROOMS</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
        <div class="loading-text" style="font-size:0.8rem;">Memuat lorong tak berujung...</div>
    </div>

    <!-- LOBBY -->
    <div class="lobby-screen" id="lobbyScreen">
        <div class="lobby-header"><h1>🏚️ THE BACKROOMS 🏚️</h1><p>Horor Psikologis · Otome Visual Novel</p></div>
        <div class="characters-container" id="charactersContainer"></div>
        <div style="text-align:center;"><h2 style="color:#e7b874;">📖 PILIH CHAPTER</h2></div>
        <div class="chapters-container" id="chaptersContainer"></div>
        <div class="bottom-right">
            <button class="reset-progress" id="resetProgressBtn">↺ Reset</button>
            <button class="enter-game-btn" id="enterGameBtn">🎮 MULAI GAME 🎮</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div class="game-container" id="gameContainer">
        <button class="back-to-lobby" id="backToLobbyBtn">← Kembali</button>
        <div class="character-stage" id="characterStage">
            <div class="character-container" id="characterContainer">
                <img class="character-image breathing floating" id="characterImage" alt="Character">
            </div>
            <div class="reaction-bubble" id="reactionBubble"></div>
        </div>
        <div class="status-panel">
            <span>❤️ Kesehatan: <span id="healthVal">100</span>%</span>
            <span>⚡ Stamina: <span id="staminaVal">90</span></span>
            <span>🎒 Inventori: <span id="invList">-</span></span>
            <div class="affection-bar" id="affectionBar"></div>
        </div>
        <div class="dialog-area">
            <div class="dialog-box">
                <div class="speaker-name" id="speakerName">🎭 NARASI</div>
                <div class="dialog-text" id="dialogText">Memulai...</div>
            </div>
            <button class="next-button" id="nextButton"><i class="fas fa-arrow-right"></i> NEXT</button>
        </div>
        <div class="actions-area" id="actionPanel" style="display:none;"></div>
        <footer>⚡ Dengungan lampu neon | Klik karakter untuk reaksi</footer>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        const CHARACTERS = {
            haruno: { name: "Haruno", imageUrl: "https://files.catbox.moe/1u9izo.png", trait: "berani", reactions: { tap: "Hah?", body: "Fokus cari jalan keluar.", spam: "Jangan ganggu!", longpress: "..." } },
            katsumi: { name: "Katsumi", imageUrl: "https://files.catbox.moe/t6hf5b.png", trait: "ceria", reactions: { tap: "Eh?! Hehe~", body: "Jangan sentuh terus dong~", spam: "Aaa... kamu jahil!", longpress: "Sayang banget sih~" } },
            juun: { name: "Juun", imageUrl: "https://files.catbox.moe/gx32p2.png", trait: "tenang", reactions: { tap: "Ada apa?", body: "...", spam: "...kamu aneh.", longpress: "Apa yang kamu lakukan?" } },
            touya: { name: "Touya", imageUrl: "https://files.catbox.moe/froly4.png", trait: "penakut", reactions: { tap: "K-kaget aku...", body: "Jangan kagetin aku!", spam: "HELP! STOP!", longpress: "Kenapa sih..." } }
        };

        // Affection System
        let affection = { haruno: 0, katsumi: 0, juun: 0, touya: 0 };
        let currentCharacter = null;
        let currentExpression = "normal";
        let lastTapTime = 0;
        let tapCount = 0;
        let longPressTimer = null;

        // DOM Elements
        const loadingScreen = document.getElementById('loadingScreen');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const gameContainer = document.getElementById('gameContainer');
        const characterImage = document.getElementById('characterImage');
        const characterStage = document.getElementById('characterStage');
        const reactionBubble = document.getElementById('reactionBubble');
        const speakerName = document.getElementById('speakerName');
        const dialogText = document.getElementById('dialogText');
        const nextBtn = document.getElementById('nextButton');
        const actionPanel = document.getElementById('actionPanel');
        const healthSpan = document.getElementById('healthVal');
        const staminaSpan = document.getElementById('staminaVal');
        const invSpan = document.getElementById('invList');
        const affectionBar = document.getElementById('affectionBar');
        const heartbeatOverlay = document.getElementById('heartbeatOverlay');
        const vignette = document.getElementById('vignette');

        let sceneQueue = [];
        let waitingForInput = false;
        let gamePaused = false;
        let currentTyping = false;
        let typingInterval = null;

        // ==================== EXPRESSION MANAGER ====================
        const expressions = {
            normal: { filter: "none", scale: 1 },
            happy: { filter: "brightness(1.1) drop-shadow(0 0 10px #ffcc88)", scale: 1.02 },
            angry: { filter: "brightness(0.9) contrast(1.2)", scale: 1 },
            sad: { filter: "brightness(0.85) saturate(0.8)", scale: 0.98 },
            shocked: { filter: "brightness(1.2) contrast(1.3)", scale: 1.05 },
            blush: { filter: "brightness(1.05) drop-shadow(0 0 8px #ff6b6b)", scale: 1.01 },
            scared: { filter: "brightness(0.8) saturate(0.7)", scale: 0.97 }
        };

        function setExpression(expression) {
            currentExpression = expression;
            const expr = expressions[expression] || expressions.normal;
            characterImage.style.filter = expr.filter;
            characterImage.style.transform = `scale(${expr.scale})`;
            // Efek zoom cinematic
            if (expression === "shocked") screenShake(0.3);
            if (expression === "scared") startHeartbeat();
            else stopHeartbeat();
        }

        // ==================== CHARACTER DISPLAY ====================
        function showCharacter(charId, emotion = "normal") {
            const char = CHARACTERS[charId];
            if (!char) return;
            currentCharacter = charId;
            characterImage.src = char.imageUrl;
            characterImage.classList.remove('hidden');
            setExpression(emotion);
            
            // Transition cinematic
            const container = document.getElementById('characterContainer');
            container.style.opacity = '0';
            container.style.transform = 'scale(0.98)';
            setTimeout(() => {
                container.style.transition = 'all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
                container.style.opacity = '1';
                container.style.transform = 'scale(1)';
            }, 50);
            
            updateAffectionBar();
        }

        function hideCharacter() {
            const container = document.getElementById('characterContainer');
            container.style.opacity = '0';
            setTimeout(() => {
                characterImage.classList.add('hidden');
                container.style.opacity = '1';
            }, 300);
        }

        // ==================== INTERACTION SYSTEM ====================
        function showReaction(message) {
            reactionBubble.textContent = message;
            reactionBubble.classList.remove('show');
            void reactionBubble.offsetWidth;
            reactionBubble.classList.add('show');
            setTimeout(() => reactionBubble.classList.remove('show'), 1500);
        }

        function characterReaction(type) {
            if (!currentCharacter) return;
            const char = CHARACTERS[currentCharacter];
            let message = char.reactions[type] || "...";
            showReaction(message);
            characterImage.classList.add('bounce-effect');
            setTimeout(() => characterImage.classList.remove('bounce-effect'), 200);
            // Tambah affection sedikit
            if (type === "tap") affection[currentCharacter] = Math.min(100, affection[currentCharacter] + 1);
            if (type === "longpress") affection[currentCharacter] = Math.min(100, affection[currentCharacter] + 3);
            updateAffectionBar();
        }

        // Touch/Klik event
        let touchStartTime = 0;
        characterStage.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartTime = Date.now();
            longPressTimer = setTimeout(() => {
                characterReaction("longpress");
                touchStartTime = 0;
            }, 800);
        });
        characterStage.addEventListener('touchend', (e) => {
            clearTimeout(longPressTimer);
            if (touchStartTime && Date.now() - touchStartTime < 300) {
                tapCount++;
                if (tapCount >= 3) {
                    characterReaction("spam");
                    tapCount = 0;
                } else {
                    characterReaction("tap");
                    setTimeout(() => tapCount = 0, 500);
                }
            }
            touchStartTime = 0;
        });
        characterStage.addEventListener('click', () => characterReaction("tap"));

        // ==================== AFFECTION SYSTEM ====================
        function updateAffectionBar() {
            affectionBar.innerHTML = Object.entries(affection).map(([key, val]) => 
                `<span class="affection-heart"><i class="fas fa-heart"></i> ${CHARACTERS[key].name}: ${val}</span>`
            ).join('');
        }

        // ==================== EFFECTS ====================
        function screenShake(intensity = 0.5) {
            gameContainer.style.animation = `shakeScreen ${intensity}s ease-in-out`;
            setTimeout(() => gameContainer.style.animation = '', intensity * 1000);
        }

        function startHeartbeat() {
            heartbeatOverlay.style.display = 'block';
        }
        function stopHeartbeat() {
            heartbeatOverlay.style.display = 'none';
        }

        function cinematicZoom(zoomIn = true) {
            const container = document.getElementById('characterContainer');
            container.style.transition = 'transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            container.style.transform = zoomIn ? 'scale(1.08)' : 'scale(1)';
            setTimeout(() => container.style.transform = 'scale(1)', zoomIn ? 3000 : 500);
        }

        // ==================== TYPEWRITER SYSTEM ====================
        function typewriterStart(speaker, message, callback, charId, emotion) {
            if (typingInterval) clearInterval(typingInterval);
            currentTyping = true;
            speakerName.innerText = speaker;
            if (charId) showCharacter(charId, emotion);
            else hideCharacter();
            
            dialogText.innerHTML = "";
            let idx = 0;
            function addLetter() {
                if (idx < message.length) {
                    dialogText.innerHTML += message.charAt(idx);
                    idx++;
                } else {
                    clearInterval(typingInterval);
                    currentTyping = false;
                    if (callback) callback();
                }
            }
            typingInterval = setInterval(addLetter, 35);
        }

        // ==================== SCENE QUEUE ====================
        function addScene(speaker, message, onEnd = null, charId = null, emotion = "normal") {
            sceneQueue.push({ speaker, message, onEnd, charId, emotion });
            if (!waitingForInput && !currentTyping && !gamePaused) processQueue();
        }

        function processQueue() {
            if (gamePaused || currentTyping || waitingForInput || sceneQueue.length === 0) return;
            const next = sceneQueue.shift();
            typewriterStart(next.speaker, next.message, () => {
                if (next.onEnd) next.onEnd();
                else { waitingForInput = true; nextBtn.disabled = false; }
            }, next.charId, next.emotion);
        }

        function enableNext(enable) { nextBtn.disabled = !enable; }
        nextBtn.onclick = () => {
            if (gamePaused || currentTyping) {
                if (currentTyping) { clearInterval(typingInterval); currentTyping = false; dialogText.innerHTML = sceneQueue[0]?.message || ""; }
                return;
            }
            if (waitingForInput) { waitingForInput = false; enableNext(false); processQueue(); }
        };
        enableNext(false);

        // ==================== GAME STORY ====================
        let inventory = [], health = 100, stamina = 90, hasPisau = false, hasFurCloth = false;
        function updateUI() {
            healthSpan.innerText = Math.max(0, health);
            staminaSpan.innerText = stamina;
            invSpan.innerText = inventory.length ? inventory.join(", ") : "Kosong";
        }

        function startGame() {
            lobbyScreen.style.display = 'none';
            gameContainer.style.display = 'flex';
            inventory = []; health = 100; stamina = 90; hasPisau = false; hasFurCloth = false;
            updateUI();
            sceneQueue = [];
            waitingForInput = false; gamePaused = false; currentTyping = false;
            enableNext(false);
            actionPanel.style.display = "none";
            affection = { haruno: 0, katsumi: 0, juun: 0, touya: 0 };
            updateAffectionBar();

            addScene("🎭 NARASI", "Suara dengungan lampu neon pelan. Empat orang tergeletak di lantai dingin...", null, null);
            addScene("Katsumi", "Aduh… kepalaku sakit… (perlahan membuka mata) …eh? Ini… di mana?", null, "katsumi", "scared");
            addScene("Haruno", "Huh? Tempat apaan ini?!", null, "haruno", "angry");
            addScene("Touya", "Aneh. Seharusnya aku masih di perpustakaan…", null, "touya", "scared");
            addScene("Juun", "...kalian semua siapa? Dan ini… tempat apa?", null, "juun", "normal");
            addScene("Katsumi", "Hehe… sepertinya kita semua sama-sama bingung, ya?", null, "katsumi", "happy");
            addScene("Haruno", "Jangan bercanda. Siapa yang bawa gue ke sini?!", null, "haruno", "angry");
            addScene("Juun", "Kalau tidak ada yang saling mengenal… berarti kita semua korban.", null, "juun", "normal");
            addScene("🎭 NARASI", "Lampu berkedip. Di lantai tergeletak sebuah ransel kulit tua.", null, null);
            addScene("🎒 SISTEM", "Apa yang akan kamu lakukan?", () => {
                gamePaused = true;
                actionPanel.style.display = "flex";
                actionPanel.innerHTML = `
                    <button class="vn-btn" id="choiceBuka">📦 BUKA RANSEL</button>
                    <button class="vn-btn" id="choicePeriksa">👀 PERIKSA SEKELILING</button>
                `;
                document.getElementById('choiceBuka').onclick = () => {
                    actionPanel.style.display = "none";
                    gamePaused = false;
                    inventory = ["Air", "Roti", "Senter", "Tali", "Pisau", "Obat"];
                    hasPisau = true;
                    updateUI();
                    addScene("Juun", "Isi: air, roti, senter, tali, pisau, obat.", null, "juun", "normal");
                    addScene("Katsumi", "Ini kayak perlengkapan bertahan hidup.", null, "katsumi", "happy");
                    addScene("Haruno", "Kita cari jalan keluar.", null, "haruno", "normal");
                    addScene("🎭 NARASI", "Haruno menggendong ransel. Mereka melangkah.", null, null);
                    addFinalScene();
                    processQueue();
                };
                document.getElementById('choicePeriksa').onclick = () => {
                    actionPanel.style.display = "none";
                    gamePaused = false;
                    addScene("Touya", "Dinding kuning semua... Tapi ransel itu pasti berguna.", null, "touya", "scared");
                    inventory = ["Air", "Roti", "Senter", "Tali", "Pisau", "Obat"];
                    hasPisau = true;
                    updateUI();
                    addFinalScene();
                    processQueue();
                };
            });
        }

        function addFinalScene() {
            addScene("🎭 NARASI", "Tiba-tiba cairan kental menetes dari atas. Bau busuk!", null, null);
            addScene("Haruno", "JANGAN DIAM! LARI!!", null, "haruno", "angry");
            addScene("🎭 NARASI", "Mereka berlari dan menemukan pintu putih. Ruangan dengan angka 9.", null, null);
            addScene("Touya", "(membaca) Pintu merah adalah angka kematian… Carilah angka dan kain berbulu… 3… 9—", null, "touya", "scared");
            addScene("Katsumi", "Lihat! Di sudut ada kain berbulu!", null, "katsumi", "happy");
            addScene("🔐 TEKA-TEKI", "Masukkan kode angka (3 & 9):", () => {
                gamePaused = true;
                actionPanel.style.display = "flex";
                actionPanel.innerHTML = `
                    <input type="text" id="puzzleInput" class="puzzle-input" placeholder="Kode...">
                    <button class="vn-btn" id="submitPuzzle">BUKA JALAN</button>
                `;
                document.getElementById('submitPuzzle').onclick = () => {
                    let val = document.getElementById('puzzleInput').value.trim();
                    if (val === "39" || val === "3 9" || val === "3-9") {
                        actionPanel.style.display = "none";
                        gamePaused = false;
                        addScene("🎭 NARASI", "Angka 39! Pintu rahasia terbuka! Cahaya keemasan...", null, null);
                        addScene("Haruno", "Kita berhasil!", null, "haruno", "happy");
                        addScene("✨ SELESAI ✨", "Chapter 1 selesai! Kamu berhasil keluar.", () => {
                            alert("✨ Chapter 1 selesai! ✨\nTerima kasih telah bermain!");
                            lobbyScreen.style.display = 'flex';
                            gameContainer.style.display = 'none';
                        });
                        processQueue();
                    } else {
                        alert("Salah! Coba lagi.");
                    }
                };
            });
        }

        // ==================== INIT LOBBY ====================
        function initLobby() {
            const container = document.getElementById('charactersContainer');
            container.innerHTML = '';
            for (const [key, char] of Object.entries(CHARACTERS)) {
                const card = document.createElement('div');
                card.className = 'lobby-char-card';
                card.innerHTML = `
                    <img class="lobby-char-img" src="${char.imageUrl}">
                    <div class="lobby-char-name">${char.name}</div>
                    <div style="font-size:0.7rem; color:#bcae7a;">${char.trait}</div>
                `;
                container.appendChild(card);
            }
            document.getElementById('enterGameBtn').onclick = startGame;
            document.getElementById('resetProgressBtn').onclick = () => location.reload();
            document.getElementById('backToLobbyBtn')?.addEventListener('click', () => {
                lobbyScreen.style.display = 'flex';
                gameContainer.style.display = 'none';
            });
        }

        setTimeout(() => {
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
                lobbyScreen.style.display = 'flex';
                initLobby();
            }, 1000);
        }, 2000);
    </script>
</body>
</html>
