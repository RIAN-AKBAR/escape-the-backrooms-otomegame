<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Daily Reward & Shop System | Otome Horror RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            background: rgba(255,180,120,0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .game-container {
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(8, 5, 20, 0.88);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            border: 1px solid rgba(255, 180, 120, 0.35);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: 24px;
            margin-bottom: 24px;
        }

        /* Header Stats */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            padding: 10px 20px;
            color: #ffdfc4;
            font-weight: bold;
        }

        /* Daily Calendar */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin: 24px 0;
        }

        .day-card {
            background: rgba(20, 12, 35, 0.9);
            border-radius: 20px;
            padding: 16px 8px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #5a3a5a;
            cursor: pointer;
            position: relative;
        }

        .day-card.claimable {
            border: 2px solid #ffaa66;
            box-shadow: 0 0 15px rgba(255,170,100,0.5);
            animation: pulse 1.5s infinite;
        }

        .day-card.claimed {
            opacity: 0.7;
            filter: grayscale(0.3);
            border-color: #3a2a3a;
        }

        .day-card.locked {
            opacity: 0.5;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .day-number {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffccaa;
        }

        .day-reward {
            font-size: 0.7rem;
            margin: 8px 0;
            color: #ddbb99;
        }

        .reward-icon {
            font-size: 2rem;
            margin: 8px 0;
        }

        .bonus-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6688;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: white;
        }

        /* Rarity Colors */
        .rarity-common { color: #aaaaaa; }
        .rarity-rare { color: #4488ff; }
        .rarity-epic { color: #aa66ff; }
        .rarity-legendary { color: #ffaa44; text-shadow: 0 0 5px #ffaa44; }

        /* Shop Grid */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .shop-category {
            background: rgba(15, 8, 28, 0.8);
            border-radius: 24px;
            padding: 20px;
            border-left: 4px solid #ff7799;
        }

        .shop-item {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 12px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            cursor: pointer;
        }

        .shop-item:hover {
            background: rgba(50,30,60,0.8);
            transform: translateX(5px);
        }

        .btn-buy {
            background: #5a2a4a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffddcc;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-buy:hover {
            background: #ff7799;
            color: white;
        }

        .btn-claim {
            background: linear-gradient(135deg, #7a3a5a, #9a5577);
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            margin: 16px auto;
            display: block;
            transition: 0.2s;
        }

        .btn-claim:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #ff7799;
        }

        .countdown {
            text-align: center;
            font-size: 1.2rem;
            color: #ffaa88;
            margin: 16px 0;
        }

        /* Inventory Popup */
        .inventory-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 3, 15, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 24px;
            z-index: 1000;
            min-width: 300px;
            text-align: center;
            border: 2px solid #ffaa88;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }

        /* Special Event Banner */
        .event-banner {
            background: linear-gradient(90deg, #4a1a3a, #2a1a4a);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #ffaa66;
            animation: glowPulse 2s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 5px #ffaa66; }
            50% { box-shadow: 0 0 20px #ff6688; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-grid { gap: 6px; }
            .day-card { padding: 8px 4px; }
            .reward-icon { font-size: 1.5rem; }
            .shop-grid { grid-template-columns: 1fr; }
        }

        h2, h3 {
            color: #ffdfc0;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    // ======================== DAILY REWARD SYSTEM ========================
    // Reward Templates
    const REWARD_TEMPLATES = {
        day1: { name: 'Potion HP 20%', icon: '🧪', type: 'potion', value: 20, unit: '%', baseQty: 5, rarity: 'common' },
        day2: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 10, unit: 'pcs', baseQty: 10, rarity: 'common' },
        day3: { name: 'Topeng Tua Kuno', icon: '🎭', type: 'topeng', value: 2, unit: 'pcs', baseQty: 2, rarity: 'rare' },
        day4: { name: 'Roti Stamina', icon: '🍞', type: 'stamina_bread', value: 10, unit: '%', baseQty: 5, rarity: 'common' },
        day5: { name: 'Apel Pengetahuan', icon: '🍎', type: 'apple', value: 1, unit: 'pcs', baseQty: 1, rarity: 'epic' },
        day6: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 5, unit: 'pcs', baseQty: 5, rarity: 'common' },
        day7: { name: 'Ghost Key', icon: '🔑', type: 'ghost_key', value: 1, unit: 'pcs', baseQty: 1, rarity: 'legendary' }
    };

    // Bonus Rewards Pool
    const BONUS_POOL = {
        common: [
            { name: 'Bonus Coin +3', icon: '🪙', type: 'coin', qty: 3, weight: 50 },
            { name: 'Potion Mini +10%', icon: '🧪', type: 'potion', qty: 10, unit: '%', weight: 40 }
        ],
        rare: [
            { name: 'Bonus Coin +10', icon: '🪙', type: 'coin', qty: 10, weight: 20 },
            { name: 'Topeng +1', icon: '🎭', type: 'topeng', qty: 1, weight: 15 }
        ],
        epic: [
            { name: 'Ghost Key Fragment', icon: '🔑', type: 'ghost_key', qty: 1, weight: 8 },
            { name: 'Mystery Box', icon: '📦', type: 'mystery', qty: 1, weight: 5 }
        ],
        legendary: [
            { name: 'LEGENDARY CHEST', icon: '💎', type: 'legendary', qty: 1, weight: 2 },
            { name: 'Apel Pengetahuan +1', icon: '🍎', type: 'apple', qty: 1, weight: 3 }
        ]
    };

    // Special Events
    const SPECIAL_EVENTS = [
        { name: '🌕 Bloody Moon Bonus', effect: 'bonus_multiplier', multiplier: 2 },
        { name: '🎁 Double Reward Day', effect: 'double_reward', multiplier: 2 },
        { name: '👻 Haunted Shop Day', effect: 'shop_discount', discount: 0.7 },
        { name: '💰 Lucky Coin Rain', effect: 'coin_rain', extraCoin: 5 },
        { name: '🎐 Ghost Festival', effect: 'rare_boost', rarityBoost: true }
    ];

    // ======================== GAME STATE ========================
    let gameState = {
        streak: 0,
        lastClaimDate: null,
        claimedDays: [],
        currentWeekSeed: Math.random(),
        weeklyRewards: [],
        inventory: {
            potion_hp: 0,      // dalam persen, akan dikonversi
            ghost_coin: 0,
            topeng: 0,
            stamina_bread: 0,
            apple: 0,
            ghost_key: 0,
            mystery_box: 0,
            legendary_chest: 0
        },
        activeEvent: null,
        eventEndTime: null,
        shopRefresh: Date.now()
    };

    // Helper Functions
    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomRewardQty(baseQty, rarity) {
        let variation = 0;
        if (rarity === 'common') variation = randomInt(-1, 2);
        else if (rarity === 'rare') variation = randomInt(0, 3);
        else if (rarity === 'epic') variation = randomInt(1, 4);
        else variation = randomInt(2, 6);
        return Math.max(1, baseQty + variation);
    }

    // Generate Weekly Rewards (acak setiap minggu)
    function generateWeeklyRewards(seed) {
        const days = [1, 2, 3, 4, 5, 6, 7];
        // Acak urutan reward
        for (let i = days.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [days[i], days[j]] = [days[j], days[i]];
        }
        
        const rewards = [];
        for (let i = 0; i < 7; i++) {
            const dayNum = days[i];
            let template = { ...REWARD_TEMPLATES[`day${dayNum}`] };
            // Randomize quantity
            template.qty = randomRewardQty(template.baseQty, template.rarity);
            // Random bonus chance
            const bonusRoll = Math.random() * 100;
            let bonus = null;
            if (bonusRoll < 2) { // 2% legendary
                const pool = BONUS_POOL.legendary;
                bonus = pool[Math.floor(Math.random() * pool.length)];
                bonus.rarity = 'legendary';
            } else if (bonusRoll < 7) { // 5% epic
                const pool = BONUS_POOL.epic;
                bonus = pool[Math.floor(Math.random() * pool.length)];
                bonus.rarity = 'epic';
            } else if (bonusRoll < 20) { // 13% rare
                const pool = BONUS_POOL.rare;
                bonus = pool[Math.floor(Math.random() * pool.length)];
                bonus.rarity = 'rare';
            } else if (bonusRoll < 45) { // 25% common
                const pool = BONUS_POOL.common;
                bonus = pool[Math.floor(Math.random() * pool.length)];
                bonus.rarity = 'common';
            }
            rewards.push({ day: i + 1, reward: template, bonus });
        }
        return rewards;
    }

    // Load/Save System
    function loadGame() {
        const saved = localStorage.getItem('yureiRewardSystem');
        if (saved) {
            try {
                const loaded = JSON.parse(saved);
                gameState = { ...gameState, ...loaded };
                // Regenerate weekly rewards if needed
                const today = new Date().toDateString();
                if (!gameState.weeklyRewards || gameState.weeklyRewards.length === 0) {
                    gameState.weeklyRewards = generateWeeklyRewards(gameState.currentWeekSeed);
                }
                // Check if week should reset
                if (gameState.claimedDays && gameState.claimedDays.length >= 7) {
                    resetWeek();
                }
                // Check special event
                if (gameState.eventEndTime && Date.now() > gameState.eventEndTime) {
                    gameState.activeEvent = null;
                    gameState.eventEndTime = null;
                }
                return true;
            } catch(e) { console.log(e); }
        }
        // Initialize new game
        resetWeek(true);
        return false;
    }

    function resetWeek(isNewGame = false) {
        gameState.currentWeekSeed = Math.random();
        gameState.weeklyRewards = generateWeeklyRewards(gameState.currentWeekSeed);
        gameState.claimedDays = [];
        if (!isNewGame) {
            gameState.streak = 0;
        }
        saveGame();
    }

    function saveGame() {
        localStorage.setItem('yureiRewardSystem', JSON.stringify(gameState));
    }

    // Claim Reward
    function claimReward(dayIndex) {
        const today = new Date().toDateString();
        const rewardData = gameState.weeklyRewards[dayIndex];
        
        // Check if already claimed
        if (gameState.claimedDays.includes(dayIndex)) {
            showPopup('❌ Reward sudah diklaim hari ini!', 'error');
            return false;
        }
        
        // Check streak continuity
        const lastDate = gameState.lastClaimDate;
        if (lastDate) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastDate !== yesterday.toDateString() && !gameState.claimedDays.includes(dayIndex)) {
                gameState.streak = 0;
            }
        }
        
        if (dayIndex !== 0 && !gameState.claimedDays.includes(dayIndex - 1)) {
            showPopup('🔒 Klaim reward berurutan dari Hari 1!', 'error');
            return false;
        }
        
        // Apply reward
        const reward = rewardData.reward;
        let finalQty = reward.qty;
        
        // Apply event multiplier
        if (gameState.activeEvent?.effect === 'double_reward') {
            finalQty *= 2;
        } else if (gameState.activeEvent?.effect === 'bonus_multiplier') {
            finalQty *= gameState.activeEvent.multiplier;
        }
        
        // Add to inventory
        addToInventory(reward.type, reward.value, finalQty, reward.unit);
        
        // Apply bonus
        let bonusMsg = '';
        if (rewardData.bonus) {
            const bonus = rewardData.bonus;
            addToInventory(bonus.type, bonus.qty, 1, 'pcs');
            bonusMsg = ` + Bonus ${bonus.rarity?.toUpperCase()}: ${bonus.icon} ${bonus.name}!`;
        }
        
        // Extra event bonus
        if (gameState.activeEvent?.effect === 'coin_rain') {
            addToInventory('coin', gameState.activeEvent.extraCoin, 1, 'pcs');
            bonusMsg += ` + Event: +${gameState.activeEvent.extraCoin} Ghost Coin!`;
        }
        
        // Mark as claimed
        gameState.claimedDays.push(dayIndex);
        gameState.lastClaimDate = today;
        gameState.streak++;
        
        saveGame();
        showPopup(`🎁 CLAIMED! 🎁\n${reward.icon} ${reward.name} x${finalQty}${bonusMsg}`, 'success');
        
        // Check if week complete
        if (gameState.claimedDays.length >= 7) {
            showPopup('🎉✨ MINGGU SELESAI! Reward direset dengan hadiah baru! ✨🎉', 'event');
            resetWeek();
        }
        
        render();
        return true;
    }
    
    function addToInventory(type, value, qty, unit) {
        switch(type) {
            case 'potion':
                gameState.inventory.potion_hp = (gameState.inventory.potion_hp || 0) + (value * qty);
                break;
            case 'coin':
                gameState.inventory.ghost_coin = (gameState.inventory.ghost_coin || 0) + (value * qty);
                break;
            case 'topeng':
                gameState.inventory.topeng = (gameState.inventory.topeng || 0) + (value * qty);
                break;
            case 'stamina_bread':
                gameState.inventory.stamina_bread = (gameState.inventory.stamina_bread || 0) + (value * qty);
                break;
            case 'apple':
                gameState.inventory.apple = (gameState.inventory.apple || 0) + (value * qty);
                break;
            case 'ghost_key':
                gameState.inventory.ghost_key = (gameState.inventory.ghost_key || 0) + (value * qty);
                break;
            default:
                gameState.inventory[type + '_count'] = (gameState.inventory[type + '_count'] || 0) + qty;
        }
    }
    
    // Shop System
    const SHOP_ITEMS = {
        potion: [
            { name: 'Potion 5%', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% HP' },
            { name: 'Potion 5% ×5', price: 15, currency: 'ghost_coin', value: 5, qty: 5, desc: 'Pulihkan 5% HP ×5' },
            { name: 'Potion 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% HP ×5' },
            { name: 'Potion 50% ×5', price: 100, currency: 'ghost_coin', value: 50, qty: 5, desc: 'Pulihkan 50% HP ×5' }
        ],
        stamina: [
            { name: 'Roti 5% ×3', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% Stamina' },
            { name: 'Roti 5% ×5', price: 15, currency: 'ghost_coin', value: 5, qty: 5, desc: 'Pulihkan 5% Stamina ×5' },
            { name: 'Roti 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% Stamina ×5' },
            { name: 'Roti 50% ×5', price: 100, currency: 'ghost_coin', value: 50, qty: 5, desc: 'Pulihkan 50% Stamina ×5' }
        ],
        topengToPotion: [
            { name: 'Potion 15% ×2', price: 10, currency: 'topeng', value: 15, qty: 2, desc: 'Tukar 10 Topeng' },
            { name: 'Potion 15% ×5', price: 25, currency: 'topeng', value: 15, qty: 5, desc: 'Tukar 25 Topeng' },
            { name: 'Potion 20% ×5', price: 50, currency: 'topeng', value: 20, qty: 5, desc: 'Tukar 50 Topeng' }
        ],
        topengToStamina: [
            { name: 'Roti 15% ×2', price: 10, currency: 'topeng', value: 15, qty: 2, desc: 'Tukar 10 Topeng' },
            { name: 'Roti 15% ×5', price: 25, currency: 'topeng', value: 15, qty: 5, desc: 'Tukar 25 Topeng' },
            { name: 'Roti 20% ×5', price: 50, currency: 'topeng', value: 20, qty: 5, desc: 'Tukar 50 Topeng' }
        ],
        ghostKey: [
            { name: 'Apel Pengetahuan', price: 5, currency: 'ghost_key', value: 1, qty: 1, desc: 'Buff hint + keberuntungan' },
            { name: 'Apel Pengetahuan ×3', price: 10, currency: 'ghost_key', value: 3, qty: 3, desc: 'Buff hint + keberuntungan ×3' },
            { name: 'Apel Pengetahuan ×10', price: 25, currency: 'ghost_key', value: 10, qty: 10, desc: 'Buff hint + keberuntungan ×10' }
        ]
    };
    
    function buyItem(category, itemIndex) {
        const item = SHOP_ITEMS[category][itemIndex];
        let discount = 1;
        if (gameState.activeEvent?.effect === 'shop_discount') {
            discount = gameState.activeEvent.discount;
        }
        const finalPrice = Math.ceil(item.price * discount);
        
        if (gameState.inventory[item.currency] >= finalPrice) {
            gameState.inventory[item.currency] -= finalPrice;
            addToInventory(
                category === 'potion' ? 'potion' : (category === 'stamina' ? 'stamina_bread' : (category === 'ghostKey' ? 'apple' : 'potion')),
                item.value, item.qty, '%'
            );
            saveGame();
            showPopup(`✅ Membeli: ${item.name} x${item.qty}!`, 'success');
            render();
        } else {
            showPopup(`❌ ${item.currency.toUpperCase()} tidak cukup!`, 'error');
        }
    }
    
    // UI Functions
    let currentPopup = null;
    
    function showPopup(message, type) {
        if (currentPopup) {
            currentPopup.remove();
        }
        const overlay = document.createElement('div');
        overlay.className = 'overlay';
        const popup = document.createElement('div');
        popup.className = 'inventory-popup';
        popup.innerHTML = `
            <div style="font-size: 2rem;">${type === 'success' ? '🎉' : (type === 'error' ? '❌' : '✨')}</div>
            <p style="margin: 16px 0; color:#ffdfc0;">${message}</p>
            <button class="btn-claim" onclick="closePopup()">Tutup</button>
        `;
        document.body.appendChild(overlay);
        document.body.appendChild(popup);
        currentPopup = { overlay, popup };
        
        setTimeout(() => {
            if (currentPopup) closePopup();
        }, 3000);
    }
    
    window.closePopup = function() {
        if (currentPopup) {
            currentPopup.overlay.remove();
            currentPopup.popup.remove();
            currentPopup = null;
        }
    };
    
    // Countdown Timer
    let countdownInterval = null;
    function getNextResetTime() {
        const now = new Date();
        const tomorrow = new Date(now);
        tomorrow.setDate(tomorrow.getDate() + 1);
        tomorrow.setHours(0, 0, 0, 0);
        return tomorrow;
    }
    
    // Render Main UI
    function render() {
        const app = document.getElementById('app');
        const now = new Date();
        const nextReset = getNextResetTime();
        const diff = nextReset - now;
        const hours = Math.floor(diff / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        
        // Check if can claim today
        const todayStr = now.toDateString();
        const canClaimToday = gameState.lastClaimDate !== todayStr && 
                              gameState.claimedDays.length < 7 &&
                              (gameState.claimedDays.length === 0 || gameState.claimedDays.includes(gameState.claimedDays.length - 1));
        
        const nextClaimDay = gameState.claimedDays.length;
        
        app.innerHTML = `
            <div class="glass-panel">
                <h2>🎁 DAILY REWARD</h2>
                <div class="stats-bar">
                    <div class="stat-card">🔥 Streak: ${gameState.streak} hari</div>
                    <div class="stat-card">📦 Minggu ke-${Math.floor(gameState.claimedDays.length / 7) + 1}</div>
                </div>
                
                ${gameState.activeEvent ? `<div class="event-banner">✨ ${gameState.activeEvent.name} ACTIVE! ✨</div>` : ''}
                
                <div class="calendar-grid">
                    ${gameState.weeklyRewards.map((reward, idx) => {
                        const isClaimed = gameState.claimedDays.includes(idx);
                        const isClaimable = !isClaimed && idx === nextClaimDay && canClaimToday;
                        const rewardItem = reward.reward;
                        return `
                            <div class="day-card ${isClaimable ? 'claimable' : ''} ${isClaimed ? 'claimed' : ''} ${idx > nextClaimDay ? 'locked' : ''}" 
                                 onclick="${isClaimable ? `claimReward(${idx})` : ''}">
                                <div class="day-number">Hari ${idx + 1}</div>
                                <div class="reward-icon">${rewardItem.icon}</div>
                                <div class="day-reward ${rewardItem.rarity ? `rarity-${rewardItem.rarity}` : ''}">
                                    ${rewardItem.name}<br>x${rewardItem.qty}
                                </div>
                                ${reward.bonus ? `<div class="bonus-badge">✨</div>` : ''}
                                ${isClaimed ? '<div style="font-size:0.6rem;">✓ CLAIMED</div>' : ''}
                            </div>
                        `;
                    }).join('')}
                </div>
                
                <div class="countdown">
                    ⏰ Reset harian dalam: ${hours} jam ${minutes} menit
                </div>
                <button class="btn-claim" ${!canClaimToday ? 'disabled style="opacity:0.5;"' : ''} onclick="if(${canClaimToday}) claimReward(${nextClaimDay})">
                    ${canClaimToday ? '🎁 KLAIM HADIAH HARI INI 🎁' : '⏳ Tunggu reset besok'}
                </button>
            </div>
            
            <!-- INVENTORY SUMMARY -->
            <div class="glass-panel">
                <h3>🎒 Inventori</h3>
                <div style="display: flex; flex-wrap: wrap; gap: 12px;">
                    <div class="stat-card">🧪 Potion: ${gameState.inventory.potion_hp || 0}%</div>
                    <div class="stat-card">🪙 Ghost Coin: ${gameState.inventory.ghost_coin || 0}</div>
                    <div class="stat-card">🎭 Topeng: ${gameState.inventory.topeng || 0}</div>
                    <div class="stat-card">🍞 Roti Stamina: ${gameState.inventory.stamina_bread || 0}%</div>
                    <div class="stat-card">🍎 Apel: ${gameState.inventory.apple || 0}</div>
                    <div class="stat-card">🔑 Ghost Key: ${gameState.inventory.ghost_key || 0}</div>
                </div>
            </div>
            
            <!-- SHOP SYSTEM -->
            <div class="glass-panel">
                <h2>🏪 GHOST SHOP</h2>
                <div class="shop-grid">
                    <div class="shop-category">
                        <h3>🪙 Ghost Coin Exchange</h3>
                        ${SHOP_ITEMS.potion.map((item, i) => `
                            <div class="shop-item" onclick="buyItem('potion', ${i})">
                                <div>🧪 ${item.name}<br><small>${item.desc}</small></div>
                                <div>${item.price} 🪙 <button class="btn-buy">Beli</button></div>
                            </div>
                        `).join('')}
                        ${SHOP_ITEMS.stamina.map((item, i) => `
                            <div class="shop-item" onclick="buyItem('stamina', ${i})">
                                <div>🍞 ${item.name}<br><small>${item.desc}</small></div>
                                <div>${item.price} 🪙 <button class="btn-buy">Beli</button></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="shop-category">
                        <h3>🎭 Topeng Tua Kuno Exchange</h3>
                        ${SHOP_ITEMS.topengToPotion.map((item, i) => `
                            <div class="shop-item" onclick="buyItem('topengToPotion', ${i})">
                                <div>🧪 ${item.name}<br><small>${item.desc}</small></div>
                                <div>${item.price} 🎭 <button class="btn-buy">Tukar</button></div>
                            </div>
                        `).join('')}
                        ${SHOP_ITEMS.topengToStamina.map((item, i) => `
                            <div class="shop-item" onclick="buyItem('topengToStamina', ${i})">
                                <div>🍞 ${item.name}<br><small>${item.desc}</small></div>
                                <div>${item.price} 🎭 <button class="btn-buy">Tukar</button></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="shop-category">
                        <h3>🔑 Ghost Key Exchange</h3>
                        ${SHOP_ITEMS.ghostKey.map((item, i) => `
                            <div class="shop-item" onclick="buyItem('ghostKey', ${i})">
                                <div>🍎 ${item.name}<br><small>Apel Pengetahuan (Buff Hint)</small></div>
                                <div>${item.price} 🔑 <button class="btn-buy">Tukar</button></div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    }
    
    // Expose functions to global
    window.claimReward = claimReward;
    window.buyItem = buyItem;
    
    // Initialize particles
    function createParticles() {
        for(let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.width = Math.random() * 4 + 2 + 'px';
            p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 10 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(p);
        }
    }
    
    loadGame();
    createParticles();
    render();
    
    // Countdown update
    setInterval(() => {
        render();
    }, 60000);
</script>
</body>
</html>
