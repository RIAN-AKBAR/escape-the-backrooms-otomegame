<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>ユレイ カク · Event Permanen | Skin Shop · Daily Riddle · Cursed Box</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 20px);
            position: relative;
            overflow-x: hidden;
        }
        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .event-container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; }
        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: 24px;
            margin-bottom: 24px;
        }
        .help-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #c96a8a;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
            color: white;
        }
        .help-btn:hover { transform: scale(1.1); background: #ff88aa; }
        .tutorial-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8,5,20,0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            z-index: 2000;
            width: min(95%, 500px);
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid #ff88aa;
            color: #f0e0d0;
        }
        .tutorial-modal h3 { color: #ffccaa; margin: 15px 0 8px; }
        .tutorial-modal hr { border-color: #665588; margin: 10px 0; }
        .tutorial-modal ul { padding-left: 20px; margin: 10px 0; }
        .tutorial-modal li { margin: 5px 0; color: #ddccbb; }
        .tutorial-close { position: sticky; top: 0; text-align: right; }
        .tutorial-close button { background: #ff6688; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; color: white; font-weight: bold; }
        .event-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        .event-header h1 { font-size: clamp(1.5rem, 5vw, 2.2rem); color: #ffdfc4; text-shadow: 0 0 15px rgba(255,140,140,0.5); }
        .back-btn {
            background: rgba(30,20,45,0.9); border: 1px solid #e8aa88; padding: 8px 24px;
            border-radius: 40px; color: #ffefdf; text-decoration: none; font-weight: bold;
        }
        .back-btn:hover { background: #c96a8a; transform: scale(1.02); }
        .event-nav {
            display: flex; flex-wrap: wrap; gap: 12px; background: rgba(0,0,0,0.4);
            padding: 12px 20px; border-radius: 60px; margin-bottom: 24px;
        }
        .event-nav-btn {
            background: rgba(30,20,45,0.8); border: 1px solid #ffaa88; padding: 8px 24px;
            border-radius: 40px; color: #ffefdf; cursor: pointer; font-weight: bold;
        }
        .event-nav-btn:hover, .event-nav-btn.active { background: #c96a8a; border-color: white; transform: scale(1.02); }
        .skin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin: 20px 0;
        }
        .skin-card {
            background: rgba(0,0,0,0.45);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border-left: 4px solid;
            transition: all 0.3s;
            position: relative;
        }
        .skin-card:hover { transform: translateY(-5px); }
        .skin-card.owned { opacity: 0.85; border-color: #88ff88; }
        .skin-card.active { border-color: #ffcc66; box-shadow: 0 0 20px rgba(255,200,100,0.3); }
        .skin-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            border: 3px solid #ffaa88;
            background: #1a1025;
        }
        .skin-name { font-weight: bold; color: #ffdfc4; font-size: 1.2rem; }
        .skin-original { font-size: 0.7rem; color: #aa9988; margin-bottom: 10px; }
        .skin-price { margin: 12px 0; }
        .price-value { color: #ffcc66; font-weight: bold; font-size: 1.1rem; }
        .owned-badge { color: #88ff88; font-weight: bold; }
        .active-glow { position: absolute; top: -8px; right: -8px; background: #ffcc66; color: #1a0a2a; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .soul-gem-display {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
            font-weight: bold;
        }
        .gem-count { color: #ffcc66; font-size: 1.5rem; }
        .daily-riddles { display: flex; flex-direction: column; gap: 16px; }
        .daily-riddle-card {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 16px;
        }
        .daily-riddle-card.solved { background: rgba(0,80,0,0.3); border-left: 4px solid #88ff88; }
        .difficulty-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; }
        .difficulty-badge.easy { background: #2a5a2a; color: #88ff88; }
        .difficulty-badge.medium { background: #8a6a2a; color: #ffcc66; }
        .difficulty-badge.hard { background: #8a2a2a; color: #ff8888; }
        .riddle-question { color: #ffdfc4; margin-bottom: 12px; }
        .riddle-answer-area { display: flex; gap: 10px; margin: 12px 0; flex-wrap: wrap; }
        .daily-input {
            background: #1e1828; border: 1px solid #b88866; padding: 8px 16px;
            border-radius: 40px; color: #fff5e8; flex: 1; min-width: 180px;
        }
        .riddle-hint { color: #aa9988; font-size: 0.75rem; margin-top: 8px; font-style: italic; }
        .daily-progress { margin-bottom: 16px; }
        .daily-progress-bar { background: #2a1a3a; border-radius: 20px; height: 8px; margin-top: 5px; overflow: hidden; }
        .daily-progress-fill { background: linear-gradient(90deg, #88ff88, #66cc66); height: 100%; width: 0%; transition: width 0.3s; }
        .perfect-banner { background: linear-gradient(90deg, #ffcc66, #ffaa44); color: #1a0a2a; padding: 10px; border-radius: 12px; text-align: center; margin-top: 16px; font-weight: bold; }
        .cursed-box {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #2a1a3a, #1a0a2a);
            border-radius: 30px;
            margin: 0 auto 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 2px solid #aa6688;
            transition: all 0.3s;
        }
        .cursed-box:hover { transform: scale(1.02); border-color: #ff88aa; box-shadow: 0 0 30px rgba(255,100,100,0.3); }
        .box-icon { font-size: 4rem; margin-bottom: 10px; }
        .box-streak { margin: 12px 0; color: #ffaa88; font-weight: bold; }
        .box-info { color: #aa9988; font-size: 0.75rem; }
        .event-btn {
            background: #2a1a3a; border: 1px solid #c99070; padding: 8px 20px;
            border-radius: 40px; color: #ffefdf; cursor: pointer; font-weight: bold;
        }
        .event-btn:hover { background: #c96a8a; border-color: white; transform: scale(1.02); }
        .buy-btn { background: #5a3a5a; }
        .equip-btn { background: #3a6a3a; }
        .event-popup {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(10,6,22,0.98); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 16px 20px; z-index: 2000;
            min-width: 280px; display: flex; align-items: center; gap: 12px;
            border-left: 4px solid #ff88aa; animation: slideInRight 0.3s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @media (max-width: 650px) {
            .skin-grid { grid-template-columns: 1fr; }
            .cursed-box { width: 140px; height: 140px; }
            .box-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>
<div class="event-container" id="eventApp"></div>
<button class="help-btn" onclick="showTutorial()">❓</button>

<script>
    const SKIN_DATA = {
        Haruno: { image: 'https://files.catbox.moe/tzgd44.png', skinName: 'Muscular man', originalName: 'Haruno', price: 1200, color: '#88aaff' },
        Katsumi: { image: 'https://files.catbox.moe/4lqz3o.png', skinName: 'Idol Girl', originalName: 'Katsumi', price: 1250, color: '#66ddcc' },
        Juun: { image: 'https://files.catbox.moe/lcbizg.png', skinName: 'Boys spring', originalName: 'Juun', price: 1200, color: '#cc88ff' },
        Touya: { image: 'https://files.catbox.moe/gxhdkm.png', skinName: 'Cute Baby Boy', originalName: 'Touya', price: 1300, color: '#ff8866' }
    };

    const EventSystem = {
        soulGems: 0, ownedSkins: { Haruno: false, Katsumi: false, Juun: false, Touya: false }, activeSkin: null,
        dailyRiddles: [], dailySolved: [], dailyLastReset: null, dailyPerfectCount: 0,
        cursedBoxLastOpen: null, cursedBoxStreak: 0, eventCompleted: false,
        load: function() {
            const saved = localStorage.getItem('yureiEventSystem');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    this.soulGems = data.soulGems || 0;
                    this.ownedSkins = data.ownedSkins || { Haruno: false, Katsumi: false, Juun: false, Touya: false };
                    this.activeSkin = data.activeSkin || null;
                    this.dailyRiddles = data.dailyRiddles || [];
                    this.dailySolved = data.dailySolved || [];
                    this.dailyLastReset = data.dailyLastReset || null;
                    this.cursedBoxLastOpen = data.cursedBoxLastOpen || null;
                    this.cursedBoxStreak = data.cursedBoxStreak || 0;
                } catch(e) {}
            }
            this.checkDailyReset();
        },
        save: function() {
            localStorage.setItem('yureiEventSystem', JSON.stringify({
                soulGems: this.soulGems, ownedSkins: this.ownedSkins, activeSkin: this.activeSkin,
                dailyRiddles: this.dailyRiddles, dailySolved: this.dailySolved, dailyLastReset: this.dailyLastReset,
                cursedBoxLastOpen: this.cursedBoxLastOpen, cursedBoxStreak: this.cursedBoxStreak
            }));
        },
        addSoulGems: function(amount) { this.soulGems += amount; this.save(); if(window.updateEventUI) window.updateEventUI(); return true; },
        removeSoulGems: function(amount) { if (this.soulGems >= amount) { this.soulGems -= amount; this.save(); return true; } return false; },
        buySkin: function(character, price) {
            if (!this.ownedSkins[character] && this.soulGems >= price) {
                this.soulGems -= price; this.ownedSkins[character] = true; this.save(); return true;
            } return false;
        },
        equipSkin: function(character) { if (this.ownedSkins[character]) { this.activeSkin = character; this.save(); return true; } return false; },
        generateDailyRiddles: function() {
            const riddles = [
                { easy: { q: "Apa yang bisa kau lihat tapi tidak bisa kau pegang?", a: "bayangan", hint: "Hitam di belakangmu" } },
                { easy: { q: "Apa yang selalu jatuh tapi tidak pernah terluka?", a: "hujan", hint: "Dari langit" } },
                { medium: { q: "Aku memiliki banyak kunci tapi tidak bisa membuka pintu. Apakah aku?", a: "piano", hint: "Alat musik" } },
                { medium: { q: "Apa yang bisa pecah tanpa disentuh?", a: "janji", hint: "Komitmen" } },
                { hard: { q: "Aku adalah awal dari akhir, akhir dari waktu. Siapakah aku?", a: "a", hint: "Huruf pertama alfabet" } },
                { hard: { q: "Apa yang memiliki leher tapi tidak punya kepala?", a: "botol", hint: "Tempat minum" } }
            ];
            const selected = [];
            const difficulties = ['easy', 'medium', 'hard'];
            for (let i = 0; i < 3; i++) {
                const available = riddles.filter(r => r[difficulties[i]]);
                const random = available[Math.floor(Math.random() * available.length)];
                selected.push({ id: Date.now() + i, difficulty: difficulties[i], question: random[difficulties[i]].q, answer: random[difficulties[i]].a, hint: random[difficulties[i]].hint, solved: false });
            }
            return selected;
        },
        checkDailyReset: function() {
            const today = new Date().toDateString();
            if (this.dailyLastReset !== today) {
                this.dailyRiddles = this.generateDailyRiddles();
                this.dailySolved = [];
                this.dailyLastReset = today;
                this.save();
            }
        },
        submitDailyAnswer: function(index, answer) {
            const riddle = this.dailyRiddles[index];
            if (!riddle || riddle.solved) return false;
            if (answer.toLowerCase().trim() === riddle.answer.toLowerCase()) {
                riddle.solved = true;
                this.dailySolved.push(index);
                let value = riddle.difficulty === 'easy' ? 5 : riddle.difficulty === 'medium' ? 10 : 15;
                if (this.dailySolved.length === 3) value += 10;
                this.addSoulGems(value);
                return value;
            }
            return false;
        },
        canOpenCursedBox: function() { return this.cursedBoxLastOpen !== new Date().toDateString(); },
        openCursedBox: function() {
            if (!this.canOpenCursedBox()) return { success: false, message: 'Kotak kutukan sudah dibuka hari ini!' };
            this.cursedBoxLastOpen = new Date().toDateString();
            this.cursedBoxStreak++;
            const roll = Math.random();
            let reward = null, isCursed = false;
            if (roll < 0.05) reward = { type: 'soul_gem', value: 50, name: 'LEGENDARY CHEST' };
            else if (roll < 0.15) reward = { type: 'apple', value: 1, name: 'Apel Pengetahuan' };
            else if (roll < 0.35) reward = { type: 'ghost_key', value: 1, name: 'Ghost Key' };
            else if (roll < 0.60) reward = { type: 'soul_gem', value: Math.floor(Math.random() * 20) + 10, name: 'Permata Jiwa' };
            else if (roll < 0.85) reward = { type: 'ghost_coin', value: Math.floor(Math.random() * 15) + 5, name: 'Ghost Coin' };
            else { isCursed = true; reward = { type: 'curse', name: 'Kutukan Kecil', value: -5 }; }
            this.save();
            return { success: true, reward: reward, isCursed: isCursed };
        }
    };
    EventSystem.load();

    let currentPopup = null, currentTab = 'skins', currentModal = null;
    function showEventPopup(title, message, type) {
        if (currentPopup) currentPopup.remove();
        const popup = document.createElement('div'); popup.className = 'event-popup';
        popup.style.borderLeftColor = type === 'success' ? '#88ff88' : type === 'error' ? '#ff8888' : '#ff88aa';
        popup.innerHTML = `<div style="font-size:1.8rem;">${type === 'success' ? '🎉' : type === 'error' ? '❌' : '✨'}</div><div style="flex:1;"><div style="font-weight:bold; color:#ffdfc4;">${title}</div><div style="font-size:0.8rem; color:#ccbbaa;">${message}</div></div><button style="background:none; border:none; color:#aa9988; cursor:pointer;" onclick="this.parentElement.remove()">✕</button>`;
        document.body.appendChild(popup);
        currentPopup = popup;
        setTimeout(() => { if (popup) popup.remove(); currentPopup = null; }, 3000);
    }

    function buySkin(character) {
        const price = SKIN_DATA[character].price;
        if (EventSystem.buySkin(character, price)) {
            showEventPopup('🎉 SKIN DIDAPATKAN!', `${SKIN_DATA[character].skinName} skin sekarang milikmu!`, 'success');
            renderEventPage();
        } else {
            showEventPopup('❌ Gagal!', `Permata Jiwa tidak cukup! Butuh ${price} 💎`, 'error');
        }
    }
    function equipSkin(character) {
        EventSystem.equipSkin(character);
        renderEventPage();
        showEventPopup('✨ Skin Aktif!', `${SKIN_DATA[character].skinName} skin sekarang digunakan!`, 'success');
    }
    function submitDailyAnswer(index) {
        const input = document.getElementById(`dailyAnswer_${index}`);
        if (!input) return;
        const result = EventSystem.submitDailyAnswer(index, input.value);
        if (result) {
            showEventPopup('✅ JAWABAN BENAR!', `+${result} Permata Jiwa`, 'success');
            renderEventPage();
        } else {
            showEventPopup('❌ JAWABAN SALAH!', 'Coba lagi!', 'error');
            input.value = '';
        }
    }
    function openCursedBox() {
        const result = EventSystem.openCursedBox();
        if (result.success) {
            if (result.isCursed) {
                showEventPopup('☠️ TERKUTUK!', 'Kotak berisi kutukan...', 'error');
            } else {
                EventSystem.addSoulGems(result.reward.value);
                showEventPopup('🎁 KOTAK TERBUKA!', `+${result.reward.value} ${result.reward.name}`, 'success');
            }
            renderEventPage();
        } else {
            showEventPopup('⏳ Belum bisa!', result.message || 'Kembali besok!', 'error');
        }
    }
    function updateEventUI() {
        const gemDisplay = document.querySelector('.gem-count');
        if (gemDisplay) gemDisplay.textContent = EventSystem.soulGems;
    }

    function renderSkinShop() {
        return `<div class="glass-panel">
            <h2 class="event-title">🎭 SKIN JIWA TERKUTUK 🎭</h2>
            <p class="event-subtitle">Kumpulkan Permata Jiwa untuk membuka skin eksklusif!</p>
            <div class="skin-grid">
                ${Object.entries(SKIN_DATA).map(([char, data]) => `
                    <div class="skin-card ${EventSystem.ownedSkins[char] ? 'owned' : ''} ${EventSystem.activeSkin === char ? 'active' : ''}" style="border-left-color: ${data.color}">
                        <img src="${data.image}" class="skin-image" onerror="this.src='https://placehold.co/120x120/2a1a3a/ffaa88?text=${char.charAt(0)}'">
                        <div class="skin-name">${data.skinName}</div>
                        <div class="skin-original">✦ Original: ${data.originalName} ✦</div>
                        <div class="skin-price">${EventSystem.ownedSkins[char] ? '<span class="owned-badge">✓ OWNED</span>' : `<span class="price-value">💎 ${data.price}</span>`}</div>
                        ${EventSystem.ownedSkins[char] ? 
                            `<button class="event-btn equip-btn" onclick="equipSkin('${char}')" ${EventSystem.activeSkin === char ? 'disabled' : ''}>${EventSystem.activeSkin === char ? '✦ ACTIVE ✦' : '✨ Pakai Skin'}</button>` :
                            `<button class="event-btn buy-btn" onclick="buySkin('${char}')">🔮 Beli (${data.price}💎)</button>`
                        }
                        ${EventSystem.activeSkin === char ? '<div class="active-glow">ACTIVE</div>' : ''}
                    </div>
                `).join('')}
            </div>
            <div class="soul-gem-display">💎 Permata Jiwa: <span class="gem-count">${EventSystem.soulGems}</span>
                <div class="gem-progress-bar"><div class="gem-progress-fill" style="width: ${Math.min(100, (EventSystem.soulGems / 1300) * 100)}%"></div></div>
            </div>
        </div>`;
    }

    function renderDailyRiddles() {
        const difficulties = { easy: '🟢 Mudah', medium: '🟡 Sedang', hard: '🔴 Sulit' };
        const completedCount = EventSystem.dailySolved.length;
        return `<div class="glass-panel">
            <h2 class="event-title">🌙 TEKA-TEKI ARWAH HARIAN 🌙</h2>
            <div class="daily-progress"><span>Progress: ${completedCount}/3</span>
                <div class="daily-progress-bar"><div class="daily-progress-fill" style="width: ${(completedCount/3)*100}%"></div></div>
            </div>
            <div class="daily-riddles">
                ${EventSystem.dailyRiddles.map((riddle, idx) => `
                    <div class="daily-riddle-card ${riddle.solved ? 'solved' : ''}">
                        <div class="riddle-header"><span class="difficulty-badge ${riddle.difficulty}">${difficulties[riddle.difficulty]}</span>${riddle.solved ? '<span class="solved-badge">✓ SOLVED</span>' : ''}</div>
                        <div class="riddle-question">📖 ${riddle.question}</div>
                        ${!riddle.solved ? `
                            <div class="riddle-answer-area">
                                <input type="text" id="dailyAnswer_${idx}" class="daily-input" placeholder="Ketik jawaban...">
                                <button class="event-btn" onclick="submitDailyAnswer(${idx})">✨ Jawab</button>
                            </div>
                            <div class="riddle-hint">💡 ${riddle.hint}</div>
                        ` : `<div class="riddle-solved">✓ Teka-teki telah terjawab!</div>`}
                    </div>
                `).join('')}
            </div>
            ${completedCount === 3 ? '<div class="perfect-banner">✨ PERFECT CLEAR! Bonus Permata sudah diberikan! ✨</div>' : ''}
        </div>`;
    }

    function renderCursedBox() {
        const canOpen = EventSystem.canOpenCursedBox();
        return `<div class="glass-panel">
            <h2 class="event-title">🔮 KOTAK KUTUKAN 🔮</h2>
            <div class="cursed-box-container">
                <div class="cursed-box" onclick="${canOpen ? 'openCursedBox()' : ''}" style="${!canOpen ? 'opacity:0.6; cursor:default;' : ''}">
                    <div class="box-icon">📦</div>
                    <div class="box-status">${canOpen ? '<span class="clickable">✦ Klik untuk membuka ✦</span>' : '✓ Sudah dibuka hari ini'}</div>
                </div>
                <div class="box-streak">🔥 Streak: ${EventSystem.cursedBoxStreak} hari</div>
                <div class="box-info">💀 Bisa berisi hadiah langka... atau kutukan!</div>
            </div>
        </div>`;
    }

    function showEventTab(tab) {
        currentTab = tab;
        const contents = document.querySelectorAll('#tabContent > div');
        const tabMap = { skins: 0, daily: 1, cursed: 2 };
        contents.forEach((el, idx) => { el.style.display = idx === tabMap[tab] ? 'block' : 'none'; });
        document.querySelectorAll('.event-nav-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function showTutorial() {
        if(currentModal) { currentModal.remove(); currentModal = null; }
        const overlay = document.createElement('div'); overlay.className = 'overlay';
        const modal = document.createElement('div'); modal.className = 'tutorial-modal';
        modal.innerHTML = `
            <div class="tutorial-close"><button onclick="closeTutorial()">✕</button></div>
            <h2 style="text-align:center; color:#ffccaa;">📖 PANDUAN EVENT</h2>
            <hr>
            <h3>💎 Permata Jiwa (Currency Event)</h3>
            <ul><li>Dapat dari <strong>Daily Riddle</strong> dan <strong>Cursed Box</strong></li><li>Digunakan untuk membeli <strong>Skin Eksklusif</strong></li><li>Setiap skin berharga 1200-1300 Permata</li></ul>
            <h3>🌙 Daily Riddle</h3>
            <ul><li>3 teka-teki <strong>setiap hari</strong> (Easy, Medium, Hard)</li><li>Hadiah: 5, 10, 15 Permata</li><li><strong>Perfect Clear</strong> (3 jawaban benar) → +10 Permata bonus</li><li>Reset otomatis setiap 24 jam</li></ul>
            <h3>🔮 Cursed Box</h3>
            <ul><li>Bisa dibuka <strong>1x per hari</strong></li><li>Isi random: Permata Jiwa, Ghost Coin, Ghost Key, Apel... atau Kutukan!</li><li>Semakin panjang <strong>streak</strong>, peluang hadiah bagus meningkat</li></ul>
            <h3>🎨 Skin Shop</h3>
            <ul><li>Beli skin menggunakan Permata Jiwa</li><li>Skin yang sudah dibeli bisa <strong>diaktifkan</strong> dan digunakan di game utama</li><li>Skin akan mengubah <strong>tampilan karakter</strong> di semua layar</li></ul>
            <hr>
            <p style="text-align:center; font-size:0.7rem;">✨ Kumpulkan Permata dan dapatkan skin favoritmu! ✨</p>
        `;
        document.body.appendChild(overlay); document.body.appendChild(modal);
        currentModal = { overlay, modal };
    }
    function closeTutorial() { if(currentModal) { currentModal.overlay.remove(); currentModal.modal.remove(); currentModal = null; } }
    window.showTutorial = showTutorial;
    window.closeTutorial = closeTutorial;

    function renderEventPage() {
        const app = document.getElementById('eventApp');
        app.innerHTML = `
            <div class="event-header">
                <h1>🎪 EVENT PERMANEN 🎪</h1>
                <a href="index.html" class="back-btn">← Kembali ke Game</a>
            </div>
            <div class="event-nav">
                <button class="event-nav-btn ${currentTab === 'skins' ? 'active' : ''}" onclick="showEventTab('skins')">🎭 Skin Shop</button>
                <button class="event-nav-btn ${currentTab === 'daily' ? 'active' : ''}" onclick="showEventTab('daily')">🌙 Daily Riddle</button>
                <button class="event-nav-btn ${currentTab === 'cursed' ? 'active' : ''}" onclick="showEventTab('cursed')">🔮 Cursed Box</button>
            </div>
            <div id="tabContent">
                ${renderSkinShop()}
                ${renderDailyRiddles()}
                ${renderCursedBox()}
            </div>
        `;
        const tabMap = { skins: 0, daily: 1, cursed: 2 };
        document.querySelectorAll('#tabContent > div').forEach((el, idx) => { el.style.display = idx === tabMap[currentTab] ? 'block' : 'none'; });
    }

    function createParticles() {
        const count = Math.min(40, Math.floor(window.innerWidth / 30));
        for(let i = 0; i < count; i++) {
            const p = document.createElement('div'); p.className = 'particle';
            p.style.width = Math.random() * 4 + 2 + 'px'; p.style.height = p.style.width;
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = Math.random() * 15 + 10 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            document.body.appendChild(p);
        }
    }

    window.buySkin = buySkin;
    window.equipSkin = equipSkin;
    window.submitDailyAnswer = submitDailyAnswer;
    window.openCursedBox = openCursedBox;
    window.showEventTab = showEventTab;
    window.updateEventUI = updateEventUI;
    
    createParticles();
    renderEventPage();
    window.addEventListener('resize', () => { document.querySelectorAll('.particle').forEach(p => p.remove()); createParticles(); });
</script>
</body>
</html>
