<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Hoshizora Otome</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:black;
}

body{
  color:white;
  touch-action:manipulation;
}

.screen{
  width:100%;
  height:100dvh;
  position:relative;
  overflow:hidden;
}

.bg-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.25);
  z-index:-1;
}

/* START SCREEN */

.start-screen{
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:20px;
}

.logo{
  width:min(520px,90vw);
  animation:float 3s ease-in-out infinite;
}

.tap-start{
  width:min(320px,80vw);
  margin-top:25px;
  cursor:pointer;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

.fade-out{
  animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
  to{
    opacity:0;
    visibility:hidden;
  }
}

/* LOBBY */

.lobby-screen{
  display:none;
}

/* PROFILE */

.profile-card{
  position:absolute;
  top:12px;
  left:12px;
  width:min(260px,70vw);
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  padding:10px;
  border-radius:18px;
  display:flex;
  gap:12px;
  align-items:center;
  z-index:10;
}

.profile-card img{
  width:60px;
  height:60px;
  border-radius:50%;
}

.profile-card h2{
  font-size:18px;
}

/* TOP BAR */

.top-bar{
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  width:95%;
  z-index:10;
}

.currency{
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  padding:8px 14px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
  font-weight:bold;
}

.currency img{
  width:22px;
  height:22px;
}

/* SIDE MENU */

.side-menu{
  position:absolute;
  left:12px;
  top:110px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:10;
}

.menu-btn{
  width:60px;
  height:60px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border-radius:18px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.menu-btn img{
  width:30px;
  height:30px;
}

/* CHARACTER */

.character{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:0;
  height:88%;
  max-width:95vw;
  object-fit:contain;
  animation:float 4s ease-in-out infinite;
}

/* RIGHT BUTTON */

.right-buttons{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:10;
}

.feature-btn{
  width:110px;
  height:110px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
  border-radius:22px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.feature-btn img{
  width:46px;
  height:46px;
  margin-bottom:8px;
}

.feature-btn span{
  font-size:15px;
  font-weight:bold;
}

/* BANNER */

.banner-slider{
  position:absolute;
  left:12px;
  right:12px;
  bottom:12px;
  display:flex;
  gap:12px;
  overflow-x:auto;
  z-index:10;
  scrollbar-width:none;
}

.banner-slider::-webkit-scrollbar{
  display:none;
}

.banner-slider img{
  width:280px;
  height:155px;
  object-fit:cover;
  border-radius:20px;
  flex-shrink:0;
}

/* QUEST */

.quest-btn{
  position:absolute;
  right:16px;
  bottom:22px;
  width:min(220px,36vw);
  z-index:10;
  animation:pulse 2s infinite;
}

/* TABLET */

@media(max-width:1024px){

  .feature-btn{
    width:95px;
    height:95px;
  }

  .character{
    height:78%;
  }

}

/* MOBILE */

@media(max-width:768px){

  .profile-card{
    width:180px;
  }

  .profile-card img{
    width:48px;
    height:48px;
  }

  .profile-card h2{
    font-size:15px;
  }

  .top-bar{
    top:80px;
  }

  .currency{
    font-size:12px;
    padding:6px 10px;
  }

  .currency img{
    width:18px;
    height:18px;
  }

  .side-menu{
    top:auto;
    bottom:120px;
    left:8px;
    flex-direction:row;
    flex-wrap:wrap;
    width:120px;
  }

  .menu-btn{
    width:50px;
    height:50px;
  }

  .menu-btn img{
    width:24px;
    height:24px;
  }

  .right-buttons{
    top:auto;
    transform:none;
    bottom:120px;
    gap:8px;
  }

  .feature-btn{
    width:78px;
    height:78px;
  }

  .feature-btn img{
    width:30px;
    height:30px;
  }

  .feature-btn span{
    font-size:11px;
  }

  .character{
    height:62%;
  }

  .banner-slider img{
    width:210px;
    height:118px;
  }

  .quest-btn{
    width:140px;
    bottom:120px;
  }

}

/* SMALL MOBILE */

@media(max-width:480px){

  .logo{
    width:88vw;
  }

  .tap-start{
    width:75vw;
  }

  .character{
    height:55%;
  }

  .banner-slider img{
    width:180px;
    height:100px;
  }

}

</style>
</head>

<body>

<!-- START SCREEN -->

<div class="screen start-screen" id="startScreen">

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://files.catbox.moe/k0x9h1.mp4">
  </video>

  <div class="overlay"></div>

  <img class="logo"
  src="https://files.catbox.moe/09zcs2.png">

  <img class="tap-start"

  </div>

  <div class="top-bar">

    <div class="currency">
      <img src="https://files.catbox.moe/m1el12.png">

    </div>

    <div class="currency">
      <img src="https://files.catbox.moe/sw6qzn.png">
      123,456
    </div>

    <div class="currency">
      <img src="https://files.catbox.moe/iu7jh9.png">
      8,910
    </div>

  </div>

  <div class="side-menu">

    <div class="menu-btn">
      <img src="https://files.catbox.moe/ahuv24.png">
    </div>

    <div class="menu-btn">
      <img src="https://files.catbox.moe/oh2crc.png">
    </div>

    <div class="menu-btn">
      <img src="https://files.catbox.moe/t2tq8v.png">
    </div>

    <div class="menu-btn">
      <img src="https://files.catbox.moe/ienh9z.png">
    </div>

    <div class="menu-btn">
      <img src="https://files.catbox.moe/ehpdje.png">
    </div>

  </div>

  <img class="character"
  src="https://files.catbox.moe/wowim7.png">

  <div class="right-buttons">

    <div class="feature-btn">
      <img src="https://files.catbox.moe/gtj2an.png">
      <span>Shop</span>
    </div>

    <div class="feature-btn">
      <img src="https://files.catbox.moe/t4u1jm.png">
      <span>Gacha</span>
    </div>

    <div class="feature-btn">
      <img src="https://files.catbox.moe/n2xxtz.png">
      <span>Event</span>
    </div>

    <div class="feature-btn">
      <img src="https://files.catbox.moe/g5bg2d.png">
      <span>Story</span>
    </div>

  </div>

  <div class="banner-slider">

    <img src="https://files.catbox.moe/ayzel7.jpg">

    <img src="https://files.catbox.moe/qw3xtr.png">

    <img src="https://files.catbox.moe/tnd2up.png">

  </div>

  <img class="quest-btn"
  src="https://files.catbox.moe/8kfqeu.png">

</div>

<script>

const startBtn=document.getElementById("startBtn");
const startScreen=document.getElementById("startScreen");
const lobbyScreen=document.getElementById("lobbyScreen");

startBtn.addEventListener("click",()=>{

  startScreen.classList.add("fade-out");

  setTimeout(()=>{
    startScreen.style.display="none";
    lobbyScreen.style.display="block";
  },1000);

});

</script>

</body>
</html>
