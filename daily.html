<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>YUREI KAKU · Daily Reward & Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0a1a 0%, #1a0a2a 100%);
            font-family: 'Courier New', 'Segoe UI', 'Poppins', monospace;
            padding: clamp(8px, 2vw, 16px);
            position: relative;
            overflow-x: hidden;
        }
        .particle {
            position: fixed;
            background: rgba(200,180,150,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle linear infinite;
            z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        .game-container { max-width: 1300px; margin: 0 auto; position: relative; z-index: 2; width: 100%; }
        .glass-panel {
            background: rgba(10, 8, 22, 0.92);
            backdrop-filter: blur(12px);
            border-radius: clamp(20px, 5vw, 28px);
            border: 1px solid rgba(220, 180, 140, 0.4);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: clamp(16px, 4vw, 24px);
            margin-bottom: 20px;
        }
        h2, h3 { color: #f5e6d0; margin-bottom: 16px; font-size: clamp(1.1rem, 5vw, 1.8rem); }
        .nav-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(30,20,45,0.9); border: 1px solid #e8aa88; padding: 8px 20px;
            border-radius: 40px; color: #ffefdf; cursor: pointer; text-decoration: none; display: inline-block;
            font-size: 0.85rem;
        }
        .nav-btn:hover { background: #c96a8a; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: clamp(6px, 1.5vw, 12px); margin: 20px 0; }
        .day-card {
            background: rgba(20,12,35,0.92); border-radius: clamp(12px,3vw,20px); padding: clamp(8px,2vw,16px) clamp(4px,1.5vw,8px);
            text-align: center; border: 1px solid #6a4a6a; cursor: pointer; position: relative;
        }
        .day-card.claimable { border: 2px solid #ffaa88; animation: pulse 1.5s infinite; }
        .day-card.claimed { opacity: 0.6; filter: grayscale(0.3); cursor: default; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
        .day-number { font-size: clamp(0.7rem,3vw,1rem); font-weight: bold; color: #ffccaa; }
        .reward-icon { font-size: clamp(1.2rem,5vw,2rem); margin: 6px 0; }
        .day-reward { font-size: clamp(0.55rem,2.5vw,0.7rem); color: #ddcbb0; }
        .bonus-badge { position: absolute; top: -6px; right: -6px; background: #ff7799; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; }
        .rarity-common { color: #ccbbaa; }
        .rarity-rare { color: #88aaff; }
        .rarity-epic { color: #cc88ff; }
        .rarity-legendary { color: #ffcc66; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
        .shop-category { background: rgba(15,10,28,0.85); border-radius: 20px; padding: 16px; border-left: 4px solid #ff99aa; }
        .shop-item { background: rgba(0,0,0,0.45); border-radius: 16px; padding: 12px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; cursor: pointer; }
        .shop-item:hover { background: rgba(60,40,70,0.7); }
        .btn-buy { background: #5a3a5a; border: none; padding: 5px 16px; border-radius: 40px; color: #ffefdf; cursor: pointer; font-weight: bold; }
        .btn-buy:hover { background: #ff88aa; }
        .btn-claim { background: linear-gradient(135deg, #8a4a6a, #aa6a8a); border: none; padding: 10px 30px; border-radius: 60px; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 16px auto; display: block; }
        .btn-claim:disabled { opacity: 0.5; cursor: not-allowed; }
        .countdown { text-align: center; font-size: 1.2rem; color: #ffbb99; margin: 16px 0; }
        .inventory-summary { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; justify-content: center; }
        .inv-tag { background: rgba(0,0,0,0.55); padding: 5px 12px; border-radius: 40px; font-size: 0.8rem; }
        .overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.85); z-index: 999; }
        .inventory-popup { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: rgba(10,6,22,0.98); backdrop-filter:blur(20px); border-radius: 28px; padding: 24px; z-index:1000; min-width:280px; text-align:center; border:2px solid #ffaa88; }
        @media (max-width:650px){ .calendar-grid{ gap:5px; } .reward-icon{ font-size:1.2rem; } .day-number{ font-size:0.7rem; } }
    </style>
</head>
<body>
<div class="game-container" id="app"></div>

<script>
    const REWARD_TEMPLATES = {
        day1: { name: 'Potion HP 20%', icon: '🧪', type: 'potion', value: 20, baseQty: 5, rarity: 'common' },
        day2: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 10, baseQty: 10, rarity: 'common' },
        day3: { name: 'Topeng Tua Kuno', icon: '🎭', type: 'topeng', value: 2, baseQty: 2, rarity: 'rare' },
        day4: { name: 'Roti Stamina', icon: '🍞', type: 'stamina_bread', value: 10, baseQty: 5, rarity: 'common' },
        day5: { name: 'Apel Pengetahuan', icon: '🍎', type: 'apple', value: 1, baseQty: 1, rarity: 'epic' },
        day6: { name: 'Ghost Coin', icon: '🪙', type: 'coin', value: 5, baseQty: 5, rarity: 'common' },
        day7: { name: 'Ghost Key', icon: '🔑', type: 'ghost_key', value: 1, baseQty: 1, rarity: 'legendary' }
    };
    const SHOP_ITEMS = {
        potion: [
            { name: 'Potion 5% ×3', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% HP ×3' },
            { name: 'Potion 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% HP ×5' }
        ],
        stamina: [
            { name: 'Roti 5% ×3', price: 10, currency: 'ghost_coin', value: 5, qty: 3, desc: 'Pulihkan 5% Stamina ×3' },
            { name: 'Roti 10% ×5', price: 30, currency: 'ghost_coin', value: 10, qty: 5, desc: 'Pulihkan 10% Stamina ×5' }
        ],
        topengToPotion: [
            { name: 'Potion 15% ×2', price: 10, currency: 'topeng', value: 15, qty: 2, desc: 'Tukar 10 Topeng' }
        ],
        ghostKey: [
            { name: 'Apel Pengetahuan', price: 5, currency: 'ghost_key', value: 1, qty: 1, desc: 'Buff hint' }
        ]
    };

    let rewardState = {
        streak: 0, lastClaimDate: null, claimedDays: [], weeklyRewards: [],
        inventory: { potion_hp: 0, ghost_coin: 0, topeng: 0, stamina_bread: 0, apple: 0, ghost_key: 0 }
    };

    function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
    function generateWeeklyRewards(){
        let days=[1,2,3,4,5,6,7];
        for(let i=days.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[days[i],days[j]]=[days[j],days[i]];}
        let rewards=[];
        for(let i=0;i<7;i++){
            let template={...REWARD_TEMPLATES[`day${days[i]}`]};
            template.qty=Math.max(1,template.baseQty+randomInt(-1,2));
            let bonus=Math.random()<0.3?{icon:'✨',name:'Bonus +3 Coin',type:'coin',qty:3}:null;
            rewards.push({day:i+1,reward:template,bonus});
        }
        return rewards;
    }
    function syncWithMain(){
        let main=localStorage.getItem('yureiKakuSave');
        if(main){
            try{
                let data=JSON.parse(main);
                if(data.inventory){
                    rewardState.inventory.ghost_coin=data.inventory.ghost_coin||0;
                    rewardState.inventory.topeng=data.inventory.topeng||0;
                    rewardState.inventory.potion_hp=data.inventory.potion_hp||0;
                    rewardState.inventory.stamina_bread=data.inventory.stamina_bread||0;
                    rewardState.inventory.apple=data.inventory.apple||0;
                    rewardState.inventory.ghost_key=data.inventory.ghost_key||0;
                }
            }catch(e){}
        }
    }
    function saveReward(){
        localStorage.setItem('yureiRewardSystem',JSON.stringify(rewardState));
        let main=localStorage.getItem('yureiKakuSave');
        if(main){
            try{
                let data=JSON.parse(main);
                data.inventory={...data.inventory, ghost_coin:rewardState.inventory.ghost_coin, topeng:rewardState.inventory.topeng, potion_hp:rewardState.inventory.potion_hp, stamina_bread:rewardState.inventory.stamina_bread, apple:rewardState.inventory.apple, ghost_key:rewardState.inventory.ghost_key};
                localStorage.setItem('yureiKakuSave',JSON.stringify(data));
            }catch(e){}
        }
    }
    function loadReward(){
        let saved=localStorage.getItem('yureiRewardSystem');
        if(saved){
            try{
                let loaded=JSON.parse(saved);
                rewardState={...rewardState,...loaded};
                if(!rewardState.weeklyRewards||!rewardState.weeklyRewards.length) rewardState.weeklyRewards=generateWeeklyRewards();
                if(rewardState.claimedDays&&rewardState.claimedDays.length>=7) resetWeek();
            }catch(e){resetWeek(true);}
        }else{resetWeek(true);}
        syncWithMain();
    }
    function resetWeek(isNew=false){
        rewardState.weeklyRewards=generateWeeklyRewards();
        rewardState.claimedDays=[];
        if(!isNew) rewardState.streak=0;
        saveReward();
    }
    function addInv(type,val,qty){
        if(type==='potion') rewardState.inventory.potion_hp+=val*qty;
        else if(type==='coin') rewardState.inventory.ghost_coin+=val*qty;
        else if(type==='topeng') rewardState.inventory.topeng+=val*qty;
        else if(type==='stamina_bread') rewardState.inventory.stamina_bread+=val*qty;
        else if(type==='apple') rewardState.inventory.apple+=val*qty;
        else if(type==='ghost_key') rewardState.inventory.ghost_key+=val*qty;
        saveReward();
    }
    let currentPopup=null;
    function showPopup(msg){
        if(currentPopup){currentPopup.overlay?.remove();currentPopup.popup?.remove();}
        let ov=document.createElement('div');ov.className='overlay';
        let pop=document.createElement('div');pop.className='inventory-popup';
        pop.innerHTML=`<p style="margin:16px 0;color:#ffdfc0;">${msg}</p><button class="btn-claim" onclick="closePopup()">Tutup</button>`;
        document.body.appendChild(ov);document.body.appendChild(pop);
        currentPopup={overlay:ov,popup:pop};
        setTimeout(()=>{if(currentPopup) closePopup();},3000);
    }
    window.closePopup=function(){if(currentPopup){currentPopup.overlay.remove();currentPopup.popup.remove();currentPopup=null;}};
    function claimReward(dayIdx){
        let today=new Date().toDateString();
        if(rewardState.claimedDays.includes(dayIdx)){showPopup('Reward sudah diklaim!');return false;}
        if(dayIdx!==0&&!rewardState.claimedDays.includes(dayIdx-1)){showPopup('Klaim berurutan dari Hari 1!');return false;}
        let r=rewardState.weeklyRewards[dayIdx].reward;
        addInv(r.type,r.value,r.qty);
        if(rewardState.weeklyRewards[dayIdx].bonus) addInv(rewardState.weeklyRewards[dayIdx].bonus.type,rewardState.weeklyRewards[dayIdx].bonus.qty,1);
        rewardState.claimedDays.push(dayIdx);
        rewardState.lastClaimDate=today;
        rewardState.streak++;
        saveReward();
        showPopup(`🎁 CLAIMED! ${r.icon} ${r.name} x${r.qty}`);
        if(rewardState.claimedDays.length>=7){showPopup('🎉 MINGGU SELESAI! Reward direset!');resetWeek();}
        render();return true;
    }
    function buyItem(cat,idx){
        let item=SHOP_ITEMS[cat][idx];
        if(rewardState.inventory[item.currency]>=item.price){
            rewardState.inventory[item.currency]-=item.price;
            addInv(cat==='potion'?'potion':cat==='stamina'?'stamina_bread':cat==='ghostKey'?'apple':'potion',item.value,item.qty);
            saveReward();
            showPopup(`✅ Membeli: ${item.name}!`);
            render();
        }else{showPopup(`❌ ${item.currency.toUpperCase()} tidak cukup!`);}
    }
    function getNextReset(){let t=new Date();t.setDate(t.getDate()+1);t.setHours(0,0,0,0);return t;}
    function render(){
        let app=document.getElementById('app');
        let now=new Date(),next=getNextReset(),diff=next-now,h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000);
        let canClaim=rewardState.lastClaimDate!==now.toDateString()&&rewardState.claimedDays.length<7&&(rewardState.claimedDays.length===0||rewardState.claimedDays.includes(rewardState.claimedDays.length-1));
        let nextDay=rewardState.claimedDays.length;
        app.innerHTML=`
            <div class="glass-panel">
                <div class="nav-buttons">
                    <a href="index.html" class="nav-btn">🎮 Game Utama</a>
                    <a href="characters.html" class="nav-btn">👥 Karakter</a>
                </div>
                <h2>🎁 DAILY REWARD</h2>
                <div style="display:flex; gap:12px; justify-content:center;"><div class="inv-tag">🔥 Streak: ${rewardState.streak} hari</div></div>
                <div class="calendar-grid">
                    ${rewardState.weeklyRewards.map((rw,idx)=>{
                        let claimed=rewardState.claimedDays.includes(idx);
                        let claimable=!claimed&&idx===nextDay&&canClaim;
                        let r=rw.reward;
                        return `<div class="day-card ${claimable?'claimable':''} ${claimed?'claimed':''}" onclick="${claimable?`claimReward(${idx})`:''}">
                            <div class="day-number">Hari ${idx+1}</div>
                            <div class="reward-icon">${r.icon}</div>
                            <div class="day-reward ${r.rarity?`rarity-${r.rarity}`:''}">${r.name}<br>x${r.qty}</div>
                            ${rw.bonus?'<div class="bonus-badge">✨</div>':''}
                            ${claimed?'✓':''}
                        </div>`;
                    }).join('')}
                </div>
                <div class="countdown">⏰ Reset: ${h} jam ${m} menit</div>
                <button class="btn-claim" ${!canClaim?'disabled':''} onclick="if(${canClaim}) claimReward(${nextDay})">${canClaim?'🎁 KLAIM HADIAH 🎁':'⏳ Tunggu besok'}</button>
            </div>
            <div class="glass-panel"><h3>🎒 Inventori</h3><div class="inventory-summary">
                <div class="inv-tag">🧪 Potion: ${rewardState.inventory.potion_hp}%</div>
                <div class="inv-tag">🪙 Coin: ${rewardState.inventory.ghost_coin}</div>
                <div class="inv-tag">🎭 Topeng: ${rewardState.inventory.topeng}</div>
                <div class="inv-tag">🍞 Roti: ${rewardState.inventory.stamina_bread}%</div>
                <div class="inv-tag">🍎 Apel: ${rewardState.inventory.apple}</div>
                <div class="inv-tag">🔑 Ghost Key: ${rewardState.inventory.ghost_key}</div>
            </div></div>
            <div class="glass-panel"><h2>🏪 SHOP</h2><div class="shop-grid">
                <div class="shop-category"><h3>🪙 Ghost Coin</h3>
                    ${SHOP_ITEMS.potion.map((it,i)=>`<div class="shop-item" onclick="buyItem('potion',${i})"><div>🧪 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🪙 <button class="btn-buy">Beli</button></div></div>`).join('')}
                    ${SHOP_ITEMS.stamina.map((it,i)=>`<div class="shop-item" onclick="buyItem('stamina',${i})"><div>🍞 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🪙 <button class="btn-buy">Beli</button></div></div>`).join('')}
                </div>
                <div class="shop-category"><h3>🎭 Topeng Exchange</h3>
                    ${SHOP_ITEMS.topengToPotion.map((it,i)=>`<div class="shop-item" onclick="buyItem('topengToPotion',${i})"><div>🧪 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🎭 <button class="btn-buy">Tukar</button></div></div>`).join('')}
                </div>
                <div class="shop-category"><h3>🔑 Ghost Key</h3>
                    ${SHOP_ITEMS.ghostKey.map((it,i)=>`<div class="shop-item" onclick="buyItem('ghostKey',${i})"><div>🍎 ${it.name}<br><small>${it.desc}</small></div><div>${it.price} 🔑 <button class="btn-buy">Tukar</button></div></div>`).join('')}
                </div>
            </div></div>
        `;
    }
    function createParticles(){for(let i=0;i<30;i++){let p=document.createElement('div');p.className='particle';p.style.width=Math.random()*4+2+'px';p.style.height=p.style.width;p.style.left=Math.random()*100+'%';p.style.animationDuration=Math.random()*15+10+'s';p.style.animationDelay=Math.random()*10+'s';document.body.appendChild(p);}}
    window.claimReward=claimReward;window.buyItem=buyItem;
    loadReward();createParticles();render();setInterval(()=>{render();},60000);
</script>
</body>
</html>
